<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Live</title>
    <script src="protection.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* LOBBY */
        #lobby { max-width: 400px; margin: auto; width: 100%; padding: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        input { 
            width: 100%; background: var(--card); border: 1px solid #30363d; color: white; 
            padding: 15px; border-radius: 12px; font-size: 1rem; outline: none; margin-top: 5px;
        }
        .room-list { 
            background: #010409; border: 1px solid #30363d; border-radius: 15px; 
            margin: 20px 0; max-height: 180px; overflow-y: auto; padding: 10px;
        }
        .room-item { 
            background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; 
            display: flex; justify-content: space-between; border-left: 4px solid var(--accent); cursor: pointer;
        }
        .btn-join { 
            background: var(--accent); color: #fff; 
            padding: 18px; border-radius: 15px; font-weight: 800; border: none; width: 100%; 
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* GAME SCREEN - CALAGE IDENTIQUE LOCAL */
        #game-screen { 
            display: none; height: 100dvh; flex-direction: column; padding: 10px; 
            padding-bottom: 80px; /* Espace pour le footer fixe */
            gap: 5px; 
        }
        
        .header { height: 18dvh; display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .p-card { background: var(--card); border-radius: 12px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; transition: 0.3s; padding: 5px; }
        .p-card.active { opacity: 1; border-color: var(--accent); border-width: 3px; box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        
        .p-name { font-size: 0.9rem; color: #8b949e; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .score-val { font-size: 2.4rem; font-weight: 900; color: #fff; line-height: 1; margin: 5px 0; }
        .avg-info { font-size: 0.8rem; color: var(--accent); font-weight: bold; font-family: 'Courier New', monospace; }

        .ia-last-volley { height: 3dvh; text-align: center; font-size: 0.75rem; color: var(--d-color); font-weight: bold; }
        .turn-tracking { display: flex; justify-content: center; gap: 8px; height: 7dvh; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #484f58; font-size: 1.1rem; }

        /* GRILLE CLAVIER */
        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; height: 12%; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; }
        .grid.mode-s .num-btn { border-bottom: 3px solid var(--s-color); }
        .grid.mode-d .num-btn { border-bottom: 3px solid var(--d-color); }
        .grid.mode-t .num-btn { border-bottom: 3px solid var(--t-color); }

        .special-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; height: 12%; }
        .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 4px; height: 15%; }

        button { border: none; border-radius: 6px; font-weight: 700; color: #fff; cursor: pointer; }
        button:disabled { opacity: 0.1 !important; filter: grayscale(1); }

        .btn-mod { background: #21262d; font-size: 1.1rem; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }
        
        .num-btn { background: #21262d; font-size: 1.2rem; }
        .btn-valid { background: var(--accent) !important; font-size: 0.9rem; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.6rem; }
        .btn-undo-all { background: #161b22; color: #f85149; font-size: 0.6rem; text-transform: uppercase; }

        /* FOOTER FIXE IDENTIQUE LOCAL */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 12px 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
            text-align: center; z-index: 100; border-top: 1px solid #161b22;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; padding: 5px 15px; border: 1px solid #333; border-radius: 20px; }

        /* VICTOIRE */
        #victory-layer { 
            display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); 
            z-index:9999; flex-direction:column; justify-content:center; align-items:center; padding: 20px;
        }
        .stats-table { width: 100%; border-collapse: collapse; margin: 20px 0; color: #fff; font-size: 0.9rem; }
        .stats-table th { color: var(--accent); border-bottom: 1px solid #30363d; padding: 10px; }
        .stats-table td { padding: 12px; border-bottom: 1px solid #21262d; text-align: center; }
        .winner-row { background: rgba(35, 134, 54, 0.15); color: var(--s-color); font-weight: bold; }
        .btn-finish { background: var(--t-color); color: #fff; padding: 18px; border-radius: 12px; width: 100%; max-width: 250px; font-weight: bold; border: none; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="lobby">
        <div style="font-size: 3rem; margin-bottom: 10px;">📡</div>
        <h1 style="color: var(--accent); margin-bottom: 30px; letter-spacing: 2px; font-weight: 800;">DARTS LIVE</h1>
        <div class="input-group">
            <label>Pseudo</label>
            <input type="text" id="nameInput" placeholder="VOTRE NOM...">
        </div>
        <div id="roomList" class="room-list"></div>
        <div class="input-group">
            <label>ID Stand</label>
            <input type="text" id="roomInput" placeholder="NOM DU STAND...">
        </div>
        <button class="btn-join" onclick="joinRoom()">REJOINDRE / CRÉER</button>
    </div>

    <footer id="main-footer">
        <a href="index.html" class="back-btn">⬅ Menu Principal</a>
    </footer>

    <div id="game-screen">
        <div class="header" id="gamePlayers"></div>
        <div class="ia-last-volley" id="ia-history">EN ATTENTE...</div>    
        <div class="turn-tracking">
            <div class="dart-slot" id="d0">-</div>
            <div class="dart-slot" id="d1">-</div>
            <div class="dart-slot" id="d2">-</div>
        </div>

        <div class="grid mode-s" id="gameGrid">
            <div class="mod-row">
                <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
                <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
                <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div class="special-row">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div class="action-row">
                <button class="btn-undo-all" onclick="undoLastTurn()">ANNULER<br>VOLÉE<br>PRÉCÉDENTE</button>
                <button class="btn-valid" onclick="finishTurn()">VALIDER VOLÉE</button>
                <button class="btn-del" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <div id="victory-layer">
        <div style="font-size: 4rem; margin-bottom: 10px;">🏆</div>
        <h1 id="winner-name" style="color:var(--s-color); font-size: 2rem; text-align: center;">GAGNANT !</h1>
        <div id="stats-container" style="width: 100%;"></div>
        <button class="btn-finish" onclick="closeRoom()">FERMER LE STAND</button>
        <a href="index.html" style="margin-top:20px; color:#888; text-decoration:none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">RETOUR MENU</a>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomName, myName, myIndex = -1, dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;
        let gameState = { players: [], currentPlayer: 0, status: "active", lastVolleyText: "Prêt à jouer" };

        window.onload = () => {
            const pad = document.getElementById('numPad'); 
            pad.innerHTML = "";
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
        };

        db.ref('rooms').on('value', (snapshot) => {
            const listDiv = document.getElementById('roomList');
            if(!listDiv) return;
            listDiv.innerHTML = "";
            const rooms = snapshot.val();
            if (rooms) {
                Object.keys(rooms).forEach(key => {
                    if(rooms[key].status !== "finished") {
                        const item = document.createElement('div');
                        item.className = 'room-item';
                        item.innerHTML = `<span>${key}</span><span>${rooms[key].players?.length || 0}/4 👤</span>`;
                        item.onclick = () => { document.getElementById('roomInput').value = key; joinRoom(); };
                        listDiv.appendChild(item);
                    }
                });
            }
        });

        function joinRoom() {
            roomName = document.getElementById('roomInput').value.trim().toUpperCase();
            myName = document.getElementById('nameInput').value.trim().toUpperCase();
            if(!roomName || !myName) return alert("Pseudo et ID Stand requis !");
            
            db.ref('rooms/' + roomName).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data && myIndex === -1) {
                    db.ref('rooms/' + roomName).set({ 
                        status: "active", currentPlayer: 0, lastVolleyText: "Début de partie",
                        players: [{ name: myName, score: 501, totalDarts: 0, totalPoints: 0 }] 
                    });
                } else if (data) {
                    gameState = data;
                    if (gameState.status === "finished") showVictory(gameState.winner);
                    else {
                        document.getElementById('victory-layer').style.display = 'none';
                        document.getElementById('game-screen').style.display = 'flex';
                        document.getElementById('ia-history').innerText = gameState.lastVolleyText || "-";
                        syncUI();
                    }
                }
            });
            document.getElementById('lobby').style.display = 'none';
        }

        function syncUI() {
            myIndex = gameState.players.findIndex(p => p.name === myName);
            if (myIndex === -1 && gameState.players.length < 4) {
                gameState.players.push({ name: myName, score: 501, totalDarts: 0, totalPoints: 0 });
                db.ref('rooms/' + roomName + '/players').set(gameState.players);
                return;
            }
            const container = document.getElementById('gamePlayers');
            container.innerHTML = gameState.players.map((p, i) => {
                const active = (i === gameState.currentPlayer) ? "active" : "";
                const avg = p.totalDarts > 0 ? ((p.totalPoints / (p.totalDarts/3))).toFixed(1) : "0.0";
                return `
                    <div class="p-card ${active}">
                        <div class="p-name">${p.name}</div>
                        <div class="score-val">${p.score}</div>
                        <div class="avg-info">AVG:${avg} | FLE:${p.totalDarts}</div>
                    </div>`;
            }).join('');

            const isMyTurn = (gameState.currentPlayer === myIndex);
            document.querySelectorAll('#game-screen button').forEach(btn => {
                btn.disabled = !isMyTurn;
            });
        }

        function addDart(val) {
            if (dartsInTurn.length >= 3 || isBust) return;
            let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
            let pts = (val === 50) ? 50 : val * m;
            let p = gameState.players[myIndex];
            const slot = document.getElementById(`d${dartsInTurn.length}`);

            if (p.score - pts < 0 || p.score - pts === 1 || (p.score - pts === 0 && m !== 2 && val !== 50)) {
                isBust = true; 
                visualDarts.push("BUST");
                slot.innerText = "BUST"; slot.style.color = "var(--t-color)";
            } else {
                p.score -= pts;
                let label = (val === 50) ? "BULL" : (val === 0) ? "0" : (m === 3 ? "T" : m === 2 ? "D" : "") + val;
                visualDarts.push(label); slot.innerText = label;
                slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
                
                // Décompte temps réel Firebase
                db.ref('rooms/' + roomName + '/players/' + myIndex + '/score').set(p.score);

                if(p.score === 0) { 
                    p.totalDarts += (dartsInTurn.length + 1);
                    p.totalPoints += 501;
                    dartsInTurn.push(pts); 
                    setTimeout(() => finishTurn(true), 300); 
                    return; 
                }
            }
            dartsInTurn.push(pts); 
            setMod(1);
        }

        function undoLastDart() {
            if (dartsInTurn.length === 0) return;
            let lastPts = dartsInTurn.pop(); visualDarts.pop();
            if (!isBust) {
                gameState.players[myIndex].score += lastPts;
                db.ref('rooms/' + roomName + '/players/' + myIndex + '/score').set(gameState.players[myIndex].score);
            }
            isBust = false;
            document.getElementById(`d${dartsInTurn.length}`).innerText = "-";
            document.getElementById(`d${dartsInTurn.length}`).style.color = "#484f58";
            setMod(1);
        }

        function finishTurn(victory = false) {
            if (dartsInTurn.length === 0 && !isBust) return;
            let p = gameState.players[myIndex];
            let ptsTurn = isBust ? 0 : dartsInTurn.reduce((a,b)=>a+b,0);
            let volleyLabels = [...visualDarts];
            while(volleyLabels.length < 3) volleyLabels.push("-");
            
            gameState.lastVolleyText = `${p.name} : ${volleyLabels.join(" • ")}`;
            
            if (!victory) {
                p.totalDarts = (p.totalDarts || 0) + 3;
                p.totalPoints = (p.totalPoints || 0) + ptsTurn;
                if(!gameState.history) gameState.history = [];
                gameState.history.push({ playerIdx: myIndex, points: ptsTurn, wasBust: isBust, prevLastVolley: document.getElementById('ia-history').innerText });
                gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.players.length;
            } else {
                gameState.status = "finished"; 
                gameState.winner = p.name;
            }
            
            db.ref('rooms/' + roomName).set(gameState);
            resetLocalTurnUI();
        }

        function undoLastTurn() {
            if(!gameState.history || gameState.history.length === 0) return;
            let last = gameState.history.pop();
            let p = gameState.players[last.playerIdx];
            if(!last.wasBust) p.score += last.points;
            p.totalDarts -= 3; p.totalPoints -= last.points;
            gameState.currentPlayer = last.playerIdx;
            gameState.lastVolleyText = last.prevLastVolley || "-";
            db.ref('rooms/' + roomName).set(gameState);
            resetLocalTurnUI();
        }

        function showVictory(name) {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            
            let html = `<table class="stats-table"><tr><th>JOUEUR</th><th>FLE.</th><th>MOY.</th></tr>`;
            gameState.players.forEach(p => {
                let pointsMarques = 501 - p.score; 
                const avg = p.totalDarts > 0 ? ((pointsMarques / p.totalDarts) * 3).toFixed(1) : "0.0";
                html += `<tr class="${p.name === name ? 'winner-row' : ''}">
                            <td>${p.name}</td>
                            <td>${p.totalDarts}</td>
                            <td>${avg}</td>
                         </tr>`;
            });
            
            document.getElementById('stats-container').innerHTML = html + `</table>`;
            document.getElementById('winner-name').innerText = name + " GAGNE !";
            document.getElementById('victory-layer').style.display = 'flex';
        }

        function closeRoom() { db.ref('rooms/' + roomName).remove().then(() => location.reload()); }
        
        function resetLocalTurnUI() {
            for(let i=0; i<3; i++) { 
                document.getElementById(`d${i}`).innerText = "-"; 
                document.getElementById(`d${i}`).style.color = "#484f58"; 
            }
            dartsInTurn = []; visualDarts = []; isBust = false; setMod(1);
        }

        function setMod(m) {
            multiplier = m;
            document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
            document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
            document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
        }
    </script>
</body>
</html>
