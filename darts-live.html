<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Live</title>
    <script src="protection.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* LOBBY */
        #lobby { max-width: 400px; margin: 0 auto; width: 100%; padding: 20px; text-align: center; overflow-y: auto; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        input { width: 100%; background: var(--card); border: 1px solid #30363d; color: white; padding: 15px; border-radius: 12px; font-size: 1rem; outline: none; margin-top: 5px; }
        
        .qualif-box { background: rgba(88, 166, 255, 0.05); border: 1px dashed #30363d; padding: 12px; border-radius: 12px; margin-bottom: 20px; }

        /* Grille des Stands */
        .stand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stand-btn { 
            background: var(--card); border: 1px solid #30363d; padding: 15px 10px; border-radius: 12px; 
            display: flex; flex-direction: column; gap: 5px; cursor: pointer; transition: 0.2s;
        }
        .stand-btn.free { border-left: 4px solid var(--s-color); }
        .stand-btn.joinable { border-left: 4px solid var(--accent); background: rgba(88, 166, 255, 0.1); }
        .stand-btn.locked { border-left: 4px solid var(--t-color); opacity: 0.6; cursor: not-allowed; }
        .stand-name { font-weight: 800; font-size: 0.85rem; color: #fff; }
        .stand-status { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        /* GAME SCREEN */
        #game-screen { display: none; height: 100dvh; flex-direction: column; padding: 10px; padding-bottom: 90px; gap: 5px; }
        .header { height: 22dvh; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .p-card { background: var(--card); border-radius: 12px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; transition: 0.3s; padding: 5px; }
        .p-card.active { opacity: 1; border-color: var(--accent); border-width: 3px; box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        .p-name { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; text-align: center; }
        .score-val { font-size: 2.1rem; font-weight: 900; color: #fff; line-height: 1; margin: 4px 0; }
        .last-volley-box { font-size: 0.6rem; color: var(--d-color); font-weight: 800; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; margin-bottom: 4px; letter-spacing: 0.5px; }
        .avg-info { font-size: 0.6rem; color: var(--accent); font-family: 'Courier New', monospace; text-align: center; line-height: 1.3; font-weight: bold; }

        .turn-tracking { display: flex; justify-content: center; gap: 8px; height: 7dvh; margin-top: 5px; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #484f58; font-size: 1.1rem; }

        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; height: 12%; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; }
        .grid.mode-s .num-btn { border-bottom: 3px solid var(--s-color); }
        .grid.mode-d .num-btn { border-bottom: 3px solid var(--d-color); }
        .grid.mode-t .num-btn { border-bottom: 3px solid var(--t-color); }
        .special-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; height: 12%; }
        .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 4px; height: 15%; }

        button { border: none; border-radius: 6px; font-weight: 700; color: #fff; cursor: pointer; }
        button:disabled { opacity: 0.1 !important; }
        .btn-mod { background: #21262d; font-size: 1.1rem; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }
        .num-btn { background: #21262d; font-size: 1.2rem; }
        .btn-valid { background: var(--accent) !important; font-size: 0.9rem; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.6rem; }
        .btn-undo-all { background: #161b22; color: #f85149; font-size: 0.6rem; text-transform: uppercase; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 15px 0; padding-bottom: calc(env(safe-area-inset-bottom) + 15px); text-align: center; z-index: 100; border-top: 1px solid #161b22; }
        .back-btn { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; padding: 6px 18px; border: 1px solid #333; border-radius: 20px; }

        #victory-layer { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:9999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .stats-table { width: 100%; border-collapse: collapse; margin: 20px 0; color: #fff; font-size: 0.9rem; }
        .stats-table th { color: var(--accent); border-bottom: 1px solid #30363d; padding: 10px; }
        .stats-table td { padding: 12px; border-bottom: 1px solid #21262d; text-align: center; }
        .winner-row { background: rgba(35, 134, 54, 0.15); color: var(--s-color); font-weight: bold; }
        .btn-finish { background: var(--t-color); color: #fff; padding: 18px; border-radius: 12px; width: 100%; max-width: 250px; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div id="lobby">
        <div style="font-size: 2.5rem; margin-bottom: 5px;">🎯</div>
        <h1 style="color: var(--accent); margin-bottom: 20px; letter-spacing: 2px; font-weight: 800; font-size: 1.2rem;">DARTS CLUB LIVE</h1>
        
        <div class="input-group">
            <label>1. Votre Pseudo</label>
            <input type="text" id="nameInput" placeholder="PSEUDO...">
        </div>
        
        <div class="qualif-box">
            <div class="input-group" style="margin-bottom:0">
                <label>2. Score Bulle (Ordre des joueurs)</label>
                <input type="text" id="qualifInput" inputmode="numeric" pattern="[0-9]*" placeholder="EX: 50, 25, 12, ..., 0" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
        </div>

        <label style="display:block; text-align:left; margin-bottom:10px;">3. Choisissez votre Stand</label>
        <div id="standGrid" class="stand-grid">
            </div>
    </div>

    <footer id="main-footer"><a href="index.html" class="back-btn">⬅ Menu Principal</a></footer>

    <div id="game-screen">
        <div class="header" id="gamePlayers"></div>
        <div class="turn-tracking">
            <div class="dart-slot" id="d0">-</div>
            <div class="dart-slot" id="d1">-</div>
            <div class="dart-slot" id="d2">-</div>
        </div>

        <div class="grid mode-s" id="gameGrid">
            <div class="mod-row">
                <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
                <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
                <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div class="special-row">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div class="action-row">
                <button class="btn-undo-all" onclick="undoLastTurn()">ANNULER<br>VOLÉE<br>PRÉCÉDENTE</button>
                <button class="btn-valid" onclick="finishTurn()">VALIDER VOLÉE</button>
                <button class="btn-del" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <div id="victory-layer">
        <div style="font-size: 4rem; margin-bottom: 10px;">🏆</div>
        <h1 id="winner-name" style="color:var(--s-color); font-size: 2rem; text-align: center;">GAGNANT !</h1>
        <div id="stats-container" style="width: 100%;"></div>
        <button class="btn-finish" onclick="closeRoom()">LIBÉRER LE STAND</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const STANDS_NAMES = ["1 - Littler", "2 - Humphries", "3 - Price", "4 - Van Veen", "5 - Van Gerwen", "6 - Tricole"];
        let roomName, myName, myIndex = -1, dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;
        let gameState = { players: [], currentPlayer: 0, status: "active" };

        window.onload = () => {
            const pad = document.getElementById('numPad'); 
            pad.innerHTML = "";
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
        };

        // ÉCOUTEUR DES STANDS
        db.ref('rooms').on('value', (snapshot) => {
            const rooms = snapshot.val() || {};
            const grid = document.getElementById('standGrid');
            if(!grid) return;
            grid.innerHTML = "";

            STANDS_NAMES.forEach(name => {
                const room = rooms[name];
                let cssClass = "free";
                let statusText = "Libre";
                let count = 0;
                let locked = false;

                if (room) {
                    count = room.players?.length || 0;
                    locked = (room.history && room.history.length > 0);
                    if (locked) { cssClass = "locked"; statusText = "En match"; }
                    else { cssClass = "joinable"; statusText = "Rejoindre"; }
                }

                const btn = document.createElement('div');
                btn.className = `stand-btn ${cssClass}`;
                btn.innerHTML = `
                    <span class="stand-name">${name}</span>
                    <span class="stand-status" style="color:${locked ? 'var(--t-color)' : (count>0 ? 'var(--accent)' : 'var(--s-color)')}">
                        ${statusText} (${count}/3🙎‍♂)
                    </span>
                `;
                btn.onclick = () => selectStand(name, count, locked);
                grid.appendChild(btn);
            });
        });

        function selectStand(name, count, locked) {
            const pseudo = document.getElementById('nameInput').value.trim().toUpperCase();
            if (!pseudo) return alert("Veuillez entrer un pseudo.");
            if (locked) return alert("Ce stand est verrouillé, une partie est en cours.");
            if (count >= 3) return alert("Ce stand est complet.");
            
            roomName = name;
            myName = pseudo;
            joinRoom();
        }

        function joinRoom() {
            let myQualif = parseInt(document.getElementById('qualifInput').value) || 0;
            
            db.ref('rooms/' + roomName).once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    db.ref('rooms/' + roomName).set({ 
                        status: "active", currentPlayer: 0, 
                        players: [{ name: myName, score: 501, totalDarts: 0, lastDarts: "- • - • -", q: myQualif }] 
                    });
                } else {
                    let found = data.players.findIndex(p => p.name === myName);
                    if (found === -1) {
                        let newPlayers = [...data.players, { name: myName, score: 501, totalDarts: 0, lastDarts: "- • - • -", q: myQualif }];
                        newPlayers.sort((a, b) => (b.q || 0) - (a.q || 0));
                        db.ref('rooms/' + roomName + '/players').set(newPlayers);
                    }
                }
            });

            db.ref('rooms/' + roomName).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    gameState = data;
                    if (gameState.status === "finished") showVictory(gameState.winner);
                    else {
                        document.getElementById('lobby').style.display = 'none';
                        document.getElementById('game-screen').style.display = 'flex';
                        syncUI();
                    }
                }
            });
        }

        function syncUI() {
            myIndex = gameState.players.findIndex(p => p.name === myName);
            const container = document.getElementById('gamePlayers');
            container.innerHTML = gameState.players.map((p, i) => {
                const active = (i === gameState.currentPlayer) ? "active" : "";
                const avg = p.totalDarts > 0 ? (((501 - p.score) / p.totalDarts) * 3).toFixed(1) : "0.0";
                return `
                    <div class="p-card ${active}">
                        <div class="p-name">${p.name}<br><span style="font-size:0.5rem; color:var(--accent)">BULLE: ${p.q || 0}</span></div>
                        <div class="score-val">${p.score}</div>
                        <div class="last-volley-box">${p.lastDarts || "- • - • -"}</div>
                        <div class="avg-info">AVG: ${avg}<br>FLE: ${p.totalDarts}</div>
                    </div>`;
            }).join('');
            const isMyTurn = (gameState.currentPlayer === myIndex);
            document.querySelectorAll('#game-screen button').forEach(btn => { btn.disabled = !isMyTurn; });
        }

        function addDart(val) {
            if (dartsInTurn.length >= 3 || isBust) return;
            let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
            let pts = (val === 50) ? 50 : val * m;
            let p = gameState.players[myIndex];
            const slot = document.getElementById(`d${dartsInTurn.length}`);
            if (p.score - pts < 0 || p.score - pts === 1 || (p.score - pts === 0 && m !== 2 && val !== 50)) {
                isBust = true; visualDarts.push("BUST"); slot.innerText = "BUST"; slot.style.color = "var(--t-color)";
            } else {
                p.score -= pts;
                let label = (val === 50) ? "BULL" : (val === 0) ? "0" : (m === 3 ? "T" : m === 2 ? "D" : "") + val;
                visualDarts.push(label); slot.innerText = label; slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
                db.ref('rooms/' + roomName + '/players/' + myIndex + '/score').set(p.score);
                if(p.score === 0) { 
                    p.totalDarts += (dartsInTurn.length + 1); 
                    dartsInTurn.push(pts); 
                    setTimeout(() => finishTurn(true), 300); 
                    return; 
                }
            }
            dartsInTurn.push(pts); setMod(1);
        }

        function finishTurn(victory = false) {
            if (dartsInTurn.length === 0 && !isBust) return;
            let p = gameState.players[myIndex];
            let volleyLabels = [...visualDarts];
            while(volleyLabels.length < 3) volleyLabels.push("-");
            p.lastDarts = volleyLabels.join(" • ");
            if (!victory) {
                p.totalDarts = (p.totalDarts || 0) + 3;
                if(!gameState.history) gameState.history = [];
                gameState.history.push({ playerIdx: myIndex, ptsArray: [...dartsInTurn], wasBust: isBust });
                gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.players.length;
            } else { gameState.status = "finished"; gameState.winner = p.name; }
            db.ref('rooms/' + roomName).set(gameState);
            resetLocalTurnUI();
        }

        function undoLastTurn() {
            if(!gameState.history || gameState.history.length === 0) return;
            let last = gameState.history.pop();
            let p = gameState.players[last.playerIdx];
            if(!last.wasBust) { p.score += last.ptsArray.reduce((a,b)=>a+b,0); }
            p.totalDarts -= 3;
            p.lastDarts = "- • - • -";
            gameState.currentPlayer = last.playerIdx;
            db.ref('rooms/' + roomName).set(gameState);
            resetLocalTurnUI();
        }

        function undoLastDart() {
            if (dartsInTurn.length === 0) return;
            let lastPts = dartsInTurn.pop(); visualDarts.pop();
            if (!isBust) { gameState.players[myIndex].score += lastPts; db.ref('rooms/' + roomName + '/players/' + myIndex + '/score').set(gameState.players[myIndex].score); }
            isBust = false; document.getElementById(`d${dartsInTurn.length}`).innerText = "-"; document.getElementById(`d${dartsInTurn.length}`).style.color = "#484f58"; setMod(1);
        }

        function closeRoom() { db.ref('rooms/' + roomName).remove().then(() => location.reload()); }
        function resetLocalTurnUI() { for(let i=0; i<3; i++) { document.getElementById(`d${i}`).innerText = "-"; document.getElementById(`d${i}`).style.color = "#484f58"; } dartsInTurn = []; visualDarts = []; isBust = false; setMod(1); }
        function setMod(m) { multiplier = m; document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected')); document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected'); document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1]; }
        
        function showVictory(name) {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            let html = `<table class="stats-table"><tr><th>JOUEUR</th><th>FLE.</th><th>AVG.</th></tr>`;
            gameState.players.forEach(p => {
                const avg = p.totalDarts > 0 ? (((501 - p.score) / p.totalDarts) * 3).toFixed(1) : "0.0";
                html += `<tr class="${p.name === name ? 'winner-row' : ''}"><td>${p.name}</td><td>${p.totalDarts}</td><td>${avg}</td></tr>`;
            });
            document.getElementById('stats-container').innerHTML = html + `</table>`;
            document.getElementById('winner-name').innerText = name + " GAGNE !";
            document.getElementById('victory-layer').style.display = 'flex';
        }
    </script>
</body>
</html>
