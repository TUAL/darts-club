<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Live</title>
    <script src="protection.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        #connection-status { position: fixed; top: 10px; right: 10px; font-size: 0.6rem; display: flex; align-items: center; gap: 5px; color: #8b949e; z-index: 1000; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .status-dot.online { background: var(--s-color); box-shadow: 0 0 5px var(--s-color); }

        #lobby { max-width: 400px; margin: 0 auto; width: 100%; padding: 20px; text-align: center; overflow-y: auto; flex: 1; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; background: var(--card); border: 1px solid #30363d; color: white; padding: 15px; border-radius: 12px; font-size: 1rem; outline: none; margin-top: 5px; }
        
        .stand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stand-btn { background: var(--card); border: 1px solid #30363d; padding: 15px 10px; border-radius: 12px; display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
        .stand-btn.free { border-left: 4px solid var(--s-color); }
        .stand-btn.joinable { border-left: 4px solid var(--accent); background: rgba(88, 166, 255, 0.1); }
        .stand-btn.locked { border-left: 4px solid var(--t-color); opacity: 0.6; }
        .stand-name { font-weight: 800; font-size: 0.85rem; color: #fff; }
        .stand-status { font-size: 0.6rem; text-transform: uppercase; font-weight: bold; }

        #game-screen { display: none; height: 100dvh; flex-direction: column; padding: 10px; padding-bottom: 90px; gap: 5px; }
        .header { height: 22dvh; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .p-card { background: var(--card); border-radius: 12px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; transition: 0.3s; padding: 5px; overflow: hidden; }
        .p-card.active { opacity: 1; border-color: var(--accent); border-width: 3px; }
        .p-name { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; font-weight: 900; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; }
        .score-val { font-size: 2.1rem; font-weight: 900; color: #fff; margin: 4px 0; }
        
        .turn-tracking { display: flex; justify-content: center; gap: 8px; height: 7dvh; margin: 5px 0; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #484f58; }

        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; }
        .num-btn { background: #21262d; position: relative; font-size: 1.2rem; border: none; border-radius: 6px; color: #fff; font-weight: 700; }
        .num-btn::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: transparent; }
        .grid.mode-s .num-btn::after { background: var(--s-color); }
        .grid.mode-d .num-btn::after { background: var(--d-color); }
        .grid.mode-t .num-btn::after { background: var(--t-color); }

        footer { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 20px 0; border-top: 1px solid #161b22; display: flex; justify-content: center; }
        .back-btn { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; padding: 8px 25px; border: 1px solid #333; border-radius: 20px; }

        #victory-layer { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:9999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
    </style>
</head>
<body>

    <div id="connection-status"><div id="status-dot" class="status-dot"></div><span id="status-text">OFFLINE</span></div>

    <div id="lobby">
        <div style="font-size: 2.5rem; margin-top:20px;">🎯</div>
        <h1 style="color: var(--accent); letter-spacing: 2px; font-size: 1.2rem;">DARTS CLUB LIVE</h1>
        <div class="input-group">
            <label>Pseudo</label>
            <input type="text" id="nameInput" placeholder="TON NOM...">
        </div>
        <div class="input-group">
            <label>Score Bulle (Optionnel)</label>
            <input type="number" id="qualifInput" placeholder="EX: 50">
        </div>
        <div id="standGrid" class="stand-grid"></div>
    </div>

    <footer id="main-footer"><a href="menu.html" class="back-btn">⬅ Menu Principal</a></footer>

    <div id="game-screen">
        <div class="header" id="gamePlayers"></div>
        <div class="turn-tracking">
            <div class="dart-slot" id="d0">-</div>
            <div class="dart-slot" id="d1">-</div>
            <div class="dart-slot" id="d2">-</div>
        </div>
        <div class="grid mode-s" id="gameGrid">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; height:12%;">
                <button class="num-btn" id="modS" style="background:var(--s-color)" onclick="setMod(1)">S</button>
                <button class="num-btn" id="modD" onclick="setMod(2)">D</button>
                <button class="num-btn" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; height:12%;">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 2fr 1fr; gap:4px; height:15%;">
                <button style="background:#161b22; color:#555; font-size:0.5rem;" onclick="undoLastTurn()">ANNULER<br>VOLÉE</button>
                <button id="btn-validate" style="background:var(--accent); font-weight:bold;" onclick="finishTurn()" disabled>VALIDER</button>
                <button style="background:#21262d; font-size:1.5rem;" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <div id="victory-layer">
        <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center; width:90%;">
            <h2 id="winner-name" style="color:var(--s-color); font-size:2rem;"></h2>
            <div id="stats-container"></div>
            <button style="background:var(--t-color); color:white; padding:15px; width:100%; border:none; border-radius:10px; margin-top:15px; font-weight:bold;" onclick="closeRoom()">LIBÉRER LE STAND</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomName, myName, myIndex = -1, dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;
        let gameState = { players: [], currentPlayer: 0, status: "active" };

        // État de connexion
        db.ref(".info/connected").on("value", (snap) => {
            document.getElementById("status-dot").className = snap.val() ? "status-dot online" : "status-dot";
            document.getElementById("status-text").innerText = snap.val() ? "ONLINE" : "OFFLINE";
        });

        // Liste des stands
        const STANDS = ["1 - Littler", "2 - Humphries", "3 - Price", "4 - Van Veen", "5 - Van Gerwen", "6 - Tricole"];
        db.ref('rooms').on('value', (snap) => {
            const rooms = snap.val() || {};
            const grid = document.getElementById('standGrid');
            grid.innerHTML = "";
            STANDS.forEach(name => {
                const r = rooms[name] || {};
                const players = r.players ? Object.values(r.players) : [];
                const isLocked = r.status === "playing";
                let status = players.length + "/3";
                let colorClass = players.length > 0 ? "joinable" : "free";
                if(isLocked) { colorClass = "locked"; status = "MATCH"; }

                grid.innerHTML += `<div class="stand-btn ${colorClass}" onclick="join('${name}', ${players.length}, ${isLocked})">
                    <span class="stand-name">${name}</span>
                    <span class="stand-status">${status}</span>
                </div>`;
            });
        });

        function join(name, count, locked) {
            myName = document.getElementById('nameInput').value.trim().toUpperCase();
            if(!myName || locked || count >= 3) return;
            roomName = name;
            let q = parseInt(document.getElementById('qualifInput').value) || 0;

            // On s'enregistre
            const playerRef = db.ref(`rooms/${name}/players`).push();
            playerRef.set({ name: myName, score: 501, totalDarts: 0, lastDarts: "- • - • -", q: q });
            
            // Écouter la room
            db.ref(`rooms/${name}`).on('value', snap => {
                const data = snap.val();
                if(!data) return;
                
                // Transformer l'objet players en tableau trié par Q
                const pArray = Object.entries(data.players || {}).map(([id, p]) => ({...p, id}));
                pArray.sort((a,b) => b.q - a.q);
                
                gameState = {...data, players: pArray};
                if(gameState.status === "finished") return showVictory();
                
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                syncUI();
            });
        }

        function syncUI() {
            myIndex = gameState.players.findIndex(p => p.name === myName);
            const container = document.getElementById('gamePlayers');
            container.innerHTML = gameState.players.map((p, i) => {
                const active = (i === (gameState.currentPlayer || 0)) ? "active" : "";
                return `<div class="p-card ${active}"><div class="p-name">${p.name}</div><div class="score-val">${p.score}</div><div style="font-size:0.5rem; color:var(--accent)">${p.lastDarts}</div></div>`;
            }).join('');
            
            const isMyTurn = (gameState.currentPlayer === myIndex);
            document.querySelectorAll('#gameGrid button').forEach(b => b.disabled = !isMyTurn);
        }

        function addDart(val) {
            if(dartsInTurn.length >= 3 || isBust) return;
            let pts = (val === 50 || val === 25) ? val : val * multiplier;
            let p = gameState.players[myIndex];
            
            if(p.score - pts < 0 || p.score - pts === 1) {
                isBust = true; visualDarts.push("BUST");
            } else {
                p.score -= pts;
                visualDarts.push((multiplier === 3 ? "T":"") + (multiplier === 2 ? "D":"") + val);
                db.ref(`rooms/${roomName}/players/${p.id}/score`).set(p.score);
                if(p.score === 0) return finishTurn(true);
            }
            dartsInTurn.push(pts);
            document.getElementById(`d${dartsInTurn.length-1}`).innerText = visualDarts[visualDarts.length-1];
            document.getElementById('btn-validate').disabled = !(dartsInTurn.length === 3 || isBust);
            setMod(1);
        }

        function finishTurn(win = false) {
            let p = gameState.players[myIndex];
            let label = visualDarts.join(" • ");
            db.ref(`rooms/${roomName}/players/${p.id}`).update({
                score: p.score,
                totalDarts: p.totalDarts + dartsInTurn.length,
                lastDarts: label
            });

            if(win) {
                db.ref(`rooms/${roomName}`).update({ status: "finished", winner: myName });
            } else {
                let next = (gameState.currentPlayer + 1) % gameState.players.length;
                db.ref(`rooms/${roomName}`).update({ currentPlayer: next, status: "playing" });
            }
            resetTurn();
        }

        function resetTurn() {
            dartsInTurn = []; visualDarts = []; isBust = false;
            for(let i=0; i<3; i++) document.getElementById(`d${i}`).innerText = "-";
            document.getElementById('btn-validate').disabled = true;
        }

        function setMod(m) {
            multiplier = m;
            document.getElementById('modS').style.background = m===1 ? 'var(--s-color)':'#21262d';
            document.getElementById('modD').style.background = m===2 ? 'var(--d-color)':'#21262d';
            document.getElementById('modT').style.background = m===3 ? 'var(--t-color)':'#21262d';
            document.getElementById('gameGrid').className = "grid mode-" + (m===1?'s':m===2?'d':'t');
        }

        function showVictory() {
            document.getElementById('victory-layer').style.display = 'flex';
            document.getElementById('winner-name').innerText = gameState.winner;
        }

        function closeRoom() { db.ref(`rooms/${roomName}`).remove().then(() => location.reload()); }

        window.onload = () => {
            const pad = document.getElementById('numPad');
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
        };
    </script>
</body>
</html>
