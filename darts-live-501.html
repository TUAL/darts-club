<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Live</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; 
            position: fixed; width: 100%;
        }

        /* SETUP SCREEN */
        #setup-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; overflow-y: auto; }
        .setup-box { width: 100%; max-width: 320px; text-align: center; }
        label { display: block; text-align: left; font-size: 0.65rem; font-weight: 900; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; background: var(--card); border: 1px solid #30363d; color: white; padding: 12px; border-radius: 12px; font-size: 1rem; outline: none; margin-bottom: 15px; }

        .stand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 10px; }
        .stand-btn { background: var(--card); border: 1px solid #30363d; padding: 12px; border-radius: 10px; text-align: left; cursor: pointer; }
        .stand-btn.free { border-left: 4px solid var(--s-color); }
        .stand-btn.joinable { border-left: 4px solid var(--accent); }
        .stand-btn.locked { border-left: 4px solid var(--t-color); opacity: 0.5; pointer-events: none; }
        .stand-name { display: block; font-weight: 800; font-size: 0.75rem; color: #fff; }
        .stand-status { font-size: 0.6rem; font-weight: bold; color: #8b949e; }

        /* GAME SCREEN - STRICT LOCAL UI */
        #game-screen { display: none; height: 100dvh; flex-direction: column; padding: 8px; padding-bottom: 60px; gap: 4px; }
        .app-brand { height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .app-title { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        .header { height: 95px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex-shrink: 0; }
        .p-card { background: var(--card); border-radius: 8px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; opacity: 0.4; }
        .p-card.active { border-color: var(--accent); border-width: 2px; opacity: 1; }
        .p-name { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; font-weight: 900; }
        .score-val { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; margin: 2px 0; }
        .avg-label { font-size: 0.55rem; color: var(--accent); font-weight: bold; }
        .last-turn-label { font-size: 0.55rem; color: #6e7681; margin-top: 2px; height: 12px; }

        .turn-tracking { display: flex; justify-content: center; gap: 6px; height: 35px; flex-shrink: 0; margin: 5px 0; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #484f58; }

        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); height: 50px; gap: 4px; flex-shrink: 0; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); flex: 1; gap: 4px; }
        .special-row { display: grid; grid-template-columns: repeat(3, 1fr); height: 55px; gap: 4px; flex-shrink: 0; }
        .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; height: 65px; gap: 4px; flex-shrink: 0; }

        button { border: none; border-radius: 8px; font-weight: 700; color: #fff; cursor: pointer; height: 100%; }
        .btn-mod { background: #21262d; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }

        .num-btn { background: #21262d; position: relative; overflow: hidden; font-size: 1.1rem; }
        .num-btn::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: transparent; }
        .grid.mode-s .num-btn::after { background: var(--s-color); }
        .grid.mode-d .num-btn::after { background: var(--d-color); }
        .grid.mode-t .num-btn::after { background: var(--t-color); }
        
        .btn-valid { background: #1a2a3a; color: #484f58; border: 1px solid #30363d; font-size: 0.7rem; text-transform: uppercase; }
        .btn-valid.ready { background: var(--accent) !important; color: white; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.4rem; }
        .btn-undo-all { background: #161b22; color: #8b949e; font-size: 0.55rem; border: 1px solid #30363d; text-transform: uppercase; line-height: 1.2; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 15px 0; text-align: center; border-top: 1px solid #161b22; z-index: 9999; }
        .back-btn { color: #888; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; padding: 8px 20px; border: 1px solid #333; border-radius: 20px; font-weight: 600; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:10000; flex-direction:column; justify-content:center; align-items:center; }
        .final-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; width: 90%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h1 style="color:var(--accent); font-size:1.2rem; letter-spacing:2px; margin-bottom:20px;">🎯 DARTS CLUB LIVE</h1>
            <label>NOM DU JOUEUR</label>
            <input type="text" id="pName" placeholder="EX: MOMO" autocomplete="off">
            <label>SCORE BULLE (ORDRE)</label>
            <input type="number" id="qualifInput" value="0">
            <div id="standGrid" class="stand-grid"></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="app-brand"><span class="app-title">DARTS CLUB — LIVE</span></div>
        <div class="header" id="gamePlayers"></div>
        <div class="turn-tracking"><div class="dart-slot" id="d0">-</div><div class="dart-slot" id="d1">-</div><div class="dart-slot" id="d2">-</div></div>
        <div class="grid mode-s" id="gameGrid">
            <div class="mod-row">
                <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
                <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
                <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div class="special-row">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div class="action-row">
                <button class="btn-undo-all" onclick="undoLastTurn()">ANNULER<br>VOLÉE<br>PRÉCÉDENTE</button>
                <button class="btn-valid" id="btn-validate" onclick="finishTurn()" disabled>VALIDER VOLÉE</button>
                <button class="btn-del" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <footer id="main-footer">
        <a href="menu.html" class="back-btn">⬅ MENU PRINCIPAL</a>
    </footer>

    <div id="end-screen" class="overlay">
        <div class="final-box">
            <h1 style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin: 0;">MATCH TERMINÉ</h1>
            <div id="final-result" style="font-size: 2rem; font-weight: 900; margin: 5px 0; color: var(--s-color);">VICTOIRE</div>
            <p id="winner-display" style="font-size: 0.8rem; color: #fff; margin-bottom: 15px; font-weight: bold;"></p>
            
            <div id="stats-summary" style="margin: 10px 0; width: 100%; font-size: 0.75rem;">
                <div id="local-stats-list" style="background: #0d1117; border-radius: 8px; padding: 12px; border: 1px solid #30363d; text-align: left;"></div>
            </div>

            <div style="display: flex; flex-direction: column; width: 100%; gap: 10px; margin-top: 15px;">
                <button id="btn-save-only" class="btn-valid ready" style="height: 45px; display:none;" onclick="saveGameData()">ENREGISTRER MOYENNE</button>
                <button class="btn-valid" style="height: 45px; background: #21262d;" onclick="closeRoom()">LIBÉRER LE STAND</button>
                <a href="menu.html" style="color: #555; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; margin-top: 5px;">⬅ RETOUR AU MENU</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
			apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
            authDomain: "dartsclub-1aab9.firebaseapp.com",
            databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dartsclub-1aab9",
            storageBucket: "dartsclub-1aab9.firebasestorage.app",
            messagingSenderId: "769714266505",
            appId: "1:769714266505:web:ea1758db2c96702979c158"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomName, myName, myIndex = -1, dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;
        let gameState = { players: [], currentPlayer: 0, status: "waiting" };
        const STANDS = ["1 - LITTLER", "2 - HUMPHRIES", "3 - PRICE", "4 - VAN VEEN", "5 - VAN GERWEN", "6 - TRICOLE"];

        window.onload = () => {
            const saved = localStorage.getItem('darts_pseudo');
            if(saved) {
                document.getElementById('pName').value = saved;
                myName = saved.toUpperCase();
            }
            const pad = document.getElementById('numPad'); 
            pad.innerHTML = "";
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
            refreshStands();
        };

        function refreshStands() {
            db.ref('rooms').on('value', snap => {
                const rooms = snap.val() || {};
                const grid = document.getElementById('standGrid');
                if(!grid) return; grid.innerHTML = "";
                STANDS.forEach(name => {
                    const r = rooms[name] || {};
                    const players = r.players ? Object.values(r.players) : [];
                    let colorClass = (players.length > 0 && r.status === "playing") ? "joinable" : "free";
                    if(r.status === "finished" || players.length >= 3) colorClass = "locked";
                    grid.innerHTML += `<div class="stand-btn ${colorClass}" onclick="joinStand('${name}', ${players.length})">
                        <span class="stand-name">${name}</span>
                        <span class="stand-status">${players.length}/3 EN LIGNE</span>
                    </div>`;
                });
            });
        }

        function joinStand(name, count) {
            myName = document.getElementById('pName').value.trim().toUpperCase();
            if(!myName) return alert("PSEUDO REQUIS");
            roomName = name;
            localStorage.setItem('darts_pseudo', myName);
            let q = parseInt(document.getElementById('qualifInput').value) || 0;

            if(count === 0) db.ref(`rooms/${name}`).set({ status: "playing", currentPlayer: 0, lastAction: Date.now() });
            const playerRef = db.ref(`rooms/${name}/players`).push();
            playerRef.set({ name: myName, score: 501, q: q, totalDarts: 0, totalPoints: 0, lastTurn: "" });

            db.ref(`rooms/${name}`).on('value', snap => {
                const data = snap.val();
                if(!data || !data.players) return;
                const pArray = Object.entries(data.players).map(([id, p]) => ({...p, id})).sort((a,b) => b.q - a.q);
                gameState = {...data, players: pArray};
                
                if(gameState.status === "finished") {
                    document.getElementById('game-screen').style.display = 'none';
                    document.getElementById('end-screen').style.display = 'flex';
                    document.getElementById('winner-display').innerText = gameState.winner + " GAGNE !";
                    showFinalStats();
                    if(gameState.winner === myName) document.getElementById('btn-save-only').style.display = 'block';
                } else {
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'flex';
                    syncUI();
                }
            });
        }

        function setMod(m) {
            multiplier = m;
            document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
            document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
            document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
        }

        function addDart(val) {
            if (dartsInTurn.length >= 3 || isBust) return;
            let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
            let pts = (val === 50) ? 50 : val * m;
            let p = gameState.players[myIndex];
            const slot = document.getElementById(`d${dartsInTurn.length}`);

            if (p.score - pts < 0 || p.score - pts === 1 || (p.score - pts === 0 && m !== 2 && val !== 50)) {
                isBust = true; visualDarts.push("BUST");
                slot.innerText = "BUST"; slot.style.color = "var(--t-color)";
            } else {
                p.score -= pts;
                let label = (val === 50) ? "BULL" : (m === 3 ? "T" : m === 2 ? "D" : "S") + val;
                visualDarts.push(label); slot.innerText = label;
                slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
                if(p.score === 0) { db.ref(`rooms/${roomName}`).update({ status: "finished", winner: myName }); return; }
            }
            dartsInTurn.push(pts); setMod(1); syncUI();
            const btn = document.getElementById('btn-validate');
            if(dartsInTurn.length === 3 || isBust) { btn.disabled = false; btn.classList.add('ready'); }
        }

        function finishTurn() {
            let p = gameState.players[myIndex];
            let ptsTurn = dartsInTurn.reduce((acc, val, idx) => (isBust && idx === dartsInTurn.length - 1) ? acc : acc + val, 0);
            db.ref(`rooms/${roomName}/players/${p.id}`).update({ 
                score: p.score, totalDarts: p.totalDarts + dartsInTurn.length,
                totalPoints: p.totalPoints + ptsTurn, lastTurn: isBust ? "BUST" : visualDarts.join(" ")
            });
            db.ref(`rooms/${roomName}`).update({ currentPlayer: (gameState.currentPlayer + 1) % gameState.players.length, lastPlayerIdx: myIndex });
            resetTurn();
        }

        function undoLastDart() {
            if (dartsInTurn.length === 0) return;
            let lastPts = dartsInTurn.pop(); visualDarts.pop();
            if (!isBust) gameState.players[myIndex].score += lastPts;
            isBust = false;
            document.getElementById(`d${dartsInTurn.length}`).innerText = "-";
            document.getElementById(`d${dartsInTurn.length}`).style.color = "#484f58";
            const btn = document.getElementById('btn-validate');
            btn.disabled = true; btn.classList.remove('ready');
            syncUI();
        }

        function undoLastTurn() {
            if(gameState.lastPlayerIdx !== undefined) db.ref(`rooms/${roomName}`).update({ currentPlayer: gameState.lastPlayerIdx });
        }

        function syncUI() {
            myIndex = gameState.players.findIndex(p => p.name === myName);
            const container = document.getElementById('gamePlayers');
            container.innerHTML = gameState.players.map((p, i) => {
                let avg = p.totalDarts > 0 ? ((p.totalPoints / p.totalDarts) * 3).toFixed(1) : "0.0";
                return `<div class="p-card ${i === gameState.currentPlayer ? 'active' : ''}">
                    <div class="p-name">${p.name}</div>
                    <div class="score-val">${p.score}</div>
                    <div class="avg-label">AVG: ${avg} — FL: ${p.totalDarts}</div>
                    <div class="last-turn-label">${p.lastTurn || ""}</div>
                </div>`;
            }).join('');
            const isMyTurn = (gameState.currentPlayer === myIndex);
            document.querySelectorAll('#gameGrid button').forEach(b => { if(!b.classList.contains('btn-undo-all')) b.disabled = !isMyTurn; });
        }

        function resetTurn() {
            dartsInTurn = []; visualDarts = []; isBust = false; 
            for(let i=0; i<3; i++) { document.getElementById(`d${i}`).innerText = "-"; document.getElementById(`d${i}`).style.color = "#484f58"; }
            setMod(1); const btn = document.getElementById('btn-validate');
            btn.disabled = true; btn.classList.remove('ready');
        }

        function closeRoom() { db.ref(`rooms/${roomName}`).remove().then(() => location.reload()); }

        function saveGameData() {
            const p = gameState.players[myIndex];
            if (!p) return;
            const finalAvg = p.totalDarts > 0 ? parseFloat(((p.totalPoints / p.totalDarts) * 3).toFixed(2)) : 0;
            const dateStr = new Date().toLocaleDateString('fr-FR');
            
            // ARCHIVE LOCALE
            const storageKey = `top_scores_${p.name}`;
            let topScores = JSON.parse(localStorage.getItem(storageKey)) || [];
            topScores.push({ avg: finalAvg, date: dateStr, darts: p.totalDarts });
            topScores.sort((a, b) => b.avg - a.avg);
            const isTopThree = topScores.findIndex(s => s.avg === finalAvg) < 3;
            localStorage.setItem(storageKey, JSON.stringify(topScores.slice(0, 3)));

            // ARCHIVE FIREBASE (users/NAME/games/live_multi)
            const liveGamesRef = db.ref(`users/${p.name}/games/live_multi`);
            liveGamesRef.once('value').then(snap => {
                let d = snap.val() || {};
                let top = d.top || [];
                top.push({ avg: finalAvg, darts: p.totalDarts, date: dateStr });
                top.sort((a, b) => b.avg - a.avg);
                return liveGamesRef.update({
                    top: top.slice(0, 5),
                    wins: (gameState.winner === p.name ? (d.wins || 0) + 1 : (d.wins || 0)),
                    last_game: dateStr,
                    total_points: (d.total_points || 0) + p.totalPoints,
                    total_darts: (d.total_darts || 0) + p.totalDarts
                });
            }).then(() => {
                const btn = document.getElementById('btn-save-only');
                btn.innerText = "✅ PROFIL SYNCHRONISÉ";
                btn.style.background = "#238636";
                btn.disabled = true;
                showFinalStats();
            });
        }

        function showFinalStats() {
            const list = document.getElementById('local-stats-list');
            const nameToSearch = (gameState.players[myIndex] ? gameState.players[myIndex].name : myName);
            if(!nameToSearch) return;
            const topScores = JSON.parse(localStorage.getItem(`top_scores_${nameToSearch}`)) || [];
            const p = gameState.players[myIndex];
            let currentAvg = p ? ((p.totalPoints / p.totalDarts) * 3).toFixed(2) : "0.00";
            let html = `<div style="border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:10px;"><strong>MATCH :</strong> ${currentAvg} AVG</div>`;
            topScores.forEach((s, i) => {
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:2px; font-size:0.7rem; ${i===0?'color:var(--d-color)':''}">
                    <span>#${i+1} - ${s.date}</span><span><strong>${s.avg}</strong> (${s.darts} fl.)</span>
                </div>`;
            });
            list.innerHTML = html;
        }
    </script>
</body>
</html>
