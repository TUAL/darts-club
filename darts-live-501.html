<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Live Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --bg-dark: #121916;
            --accent-orange: #f39c12; --accent-green: #2ecc71; --accent-red: #e74c3c;
            --mode-color: var(--accent);
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%;
        }
        #setup-screen { flex:1; display:flex; flex-direction:column; align-items:center; padding:20px; overflow-y:auto; }
        .setup-box { width: 100%; max-width: 320px; text-align: center; }
        .input-field { width: 100%; background: var(--card); border: 1px solid #30363d; color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; outline: none; }
        .stand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 15px; }
        .stand-btn { background: var(--card); border: 1px solid #30363d; padding: 12px; border-radius: 10px; text-align: left; cursor: pointer; border-left: 4px solid #30363d; }
        .stand-btn.active-room { border-left-color: var(--accent-green); }
        .stand-name { display: block; font-weight: 800; font-size: 0.75rem; color: #fff; text-transform: uppercase; }
        .stand-status { font-size: 0.6rem; color: #8b949e; }
        #game-screen { display: none; height: 100dvh; flex-direction: column; background: #000; }
        .top-bar { height: 45px; background: #1a1a1a; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; }
        .top-title { flex: 1; text-align: center; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; color: var(--accent); }
        .score-section { height: 40dvh; display: flex; flex-direction: column; background: var(--bg-dark); padding: 10px 0; }
        .header-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 10px; flex: 1; }
        .p-column { 
            background: #1a1a1a; border: 2px solid #333; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 8px 4px; opacity: 0.4; transition: 0.3s; color: #fff;
        }
        .p-column.active { border-color: var(--accent); opacity: 1; border-width: 3px; }
        .p-name { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; }
        .p-score { font-size: 2.2rem; font-weight: 900; line-height: 1; margin: 4px 0; }
        .p-stats { font-size: 0.55rem; font-weight: 800; color: var(--accent); }
        .input-info { height: 70px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 10px; background: #000; }
        .dart-val { width: 65px; height: 50px; background: white; color: black; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; }
        .dart-val small { font-size: 0.5rem; color: #555; }
        .btn-valid-darts { flex: 1; height: 50px; background: #222; border: none; color: #444; border-radius: 25px; font-weight: 900; font-size: 0.8rem; }
        .btn-valid-darts.ready { background: var(--accent-green); color: #000; }
        .keyboard { height: 55dvh; background: #1a1a1a; display: flex; flex-direction: column; padding: 2px; border-top: 3px solid var(--mode-color); }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #333; }
        .btn-m { background: #1a1a1a; color: #888; padding: 12px; border: none; font-weight: 900; font-size: 0.8rem; }
        .btn-m.active { color: #fff; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); flex: 1; gap: 1px; background: #333; }
        .key { background: #121916; border: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .key span { font-size: 1.2rem; font-weight: 900; }
        .key small { font-size: 0.6rem; color: #555; } 
        .special-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; height: 60px; gap: 1px; background: #333; }
        .sp-key { background: #121916; color: white; border: none; font-weight: bold; font-size: 0.75rem; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding:20px; }
        .final-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h2 style="color:var(--accent); font-size:0.9rem; letter-spacing:2px;">DARTS CLUB LIVE PREMIUM</h2>
            <input type="text" id="pName" class="input-field" placeholder="TON PSEUDO..." autocomplete="off">
            <input type="number" id="qualifInput" class="input-field" placeholder="SCORE BULLE (ORDRE)">
            <div id="standGrid" class="stand-grid"></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="top-bar">
            <div class="top-title" id="room-display">CHARGEMENT...</div>
        </div>
        <div class="score-section"><div class="header-scores" id="gamePlayers"></div></div>
        <div class="input-info">
            <div class="dart-val" id="v0">--<small>-</small></div>
            <div class="dart-val" id="v1">--<small>-</small></div>
            <div class="dart-val" id="v2">--<small>-</small></div>
            <button class="btn-valid-darts" id="btn-validate" onclick="finishTurn()" disabled>VALIDER</button>
        </div>
        <div class="keyboard">
            <div class="mod-row">
                <button class="btn-m active" id="m1" onclick="setMod(1)">SIMPLE</button>
                <button class="btn-m" id="m2" onclick="setMod(2)">DOUBLE</button>
                <button class="btn-m" id="m3" onclick="setMod(3)">TRIPLE</button>
            </div>
            <div id="pad" class="num-grid"></div>
            <div class="special-row">
                <button class="sp-key" onclick="undoLastDart()">⌫</button>
                <button class="sp-key" onclick="addDart(0)">OUT (0)</button>
                <button class="sp-key" onclick="addDart(25)">25</button>
                <button class="sp-key" onclick="addDart(50)">BULL</button>
            </div>
            <button class="sp-key" onclick="undoLastTurn()" style="height:40px; background:#1a1a1a; color:#666; font-size:0.6rem; width:100%; grid-column: span 4;">ANNULER VOLÉE PRÉCÉDENTE</button>
        </div>
    </div>

    <div id="end-screen" class="overlay">
        <div class="final-box">
            <h1 style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase;">MATCH TERMINÉ</h1>
            <div id="winner-display" style="font-size: 1.8rem; font-weight: 900; margin: 10px 0; color:var(--accent-green);">VICTOIRE</div>
            <div id="stats-list" style="background: #0b1410; border-radius: 8px; padding: 10px; border: 1px solid #30363d; text-align: left; font-size: 0.75rem; margin-bottom:15px;"></div>
            <button id="btn-save-only" class="btn-valid-darts ready" style="display:none; width:100%; margin-bottom:10px;" onclick="saveVictory()">ENREGISTRER LA VICTOIRE</button>
            <button class="btn-valid-darts ready" style="width:100%; background:#30363d; color:white;" onclick="resetStand()">VIDER LE STAND / MENU</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
        authDomain: "dartsclub-1aab9.firebaseapp.com",
        databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dartsclub-1aab9",
        storageBucket: "dartsclub-1aab9.firebasestorage.app",
        messagingSenderId: "769714266505",
        appId: "1:769714266505:web:ea1758db2c96702979c158"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let roomName, myName, myId, myIndex = -1, lastProcessedTurn = -1;
    let dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;
    let scoreAtTurnStart = 501, localDisplayScore = 501;
    let gameState = { players: [], currentPlayer: 0, status: "open" };
    const STANDS = ["1 - LITTLER", "2 - HUMPHRIES", "3 - PRICE", "4 - VAN VEEN", "5 - VAN GERWEN", "6 - TRICOLE"];

    window.onload = () => {
        const saved = localStorage.getItem('darts_pseudo');
        if(saved) document.getElementById('pName').value = saved;
        renderPad();
        auth.signInAnonymously().then(() => {
            initStands();
        }).catch(err => console.error("Erreur Firebase:", err));
    };

    function renderPad() {
        const pad = document.getElementById('pad');
        pad.innerHTML = "";
        for(let i=1; i<=20; i++) {
            let sub = (multiplier > 1) ? (i * multiplier) : "&nbsp;";
            pad.innerHTML += `<button class="key" onclick="addDart(${i})"><span>${i}</span><small>${sub}</small></button>`;
        }
    }

    function setMod(m) {
        multiplier = m;
        document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('active'));
        document.getElementById('m'+m).classList.add('active');
        const colors = ["", "var(--accent-green)", "var(--accent-orange)", "var(--accent-red)"];
        document.documentElement.style.setProperty('--mode-color', colors[m]);
        renderPad();
    }

    function initStands() {
        db.ref('rooms').on('value', snap => {
            const rooms = snap.val() || {};
            const grid = document.getElementById('standGrid');
            if(!grid) return;
            grid.innerHTML = "";
            STANDS.forEach(name => {
                const r = rooms[name] || {};
                const players = r.players ? Object.values(r.players) : [];
                let colorClass = (players.length > 0) ? "active-room" : "";
                grid.innerHTML += `<div class="stand-btn ${colorClass}" onclick="joinStand('${name}', ${players.length})">
                    <span class="stand-name">${name}</span>
                    <span class="stand-status">${players.length}/3 JOUEURS</span>
                </div>`;
            });
        });
    }

    function joinStand(name, count) {
        myName = document.getElementById('pName').value.trim().toUpperCase();
        if(!myName) return alert("ENTRE TON PSEUDO");
        localStorage.setItem('darts_pseudo', myName);
        roomName = name;
        document.getElementById('room-display').innerText = "LIVE : " + name;
        
        if(count === 0) db.ref(`rooms/${name}`).set({ status: "playing", currentPlayer: 0 });
        
        const playerRef = db.ref(`rooms/${name}/players`).push();
        myId = playerRef.key;
        playerRef.set({ name: myName, score: 501, q: parseInt(document.getElementById('qualifInput').value)||0, totalDarts: 0, totalPoints: 0 });

        db.ref(`rooms/${name}`).on('value', snap => {
            const data = snap.val();
            if(!data || !data.players) return;
            
            const pArray = Object.entries(data.players).map(([id, p]) => ({...p, id})).sort((a,b) => b.q - a.q);
            gameState = {...data, players: pArray};
            myIndex = gameState.players.findIndex(p => p.id === myId);

            if (data.status === "finished") {
                showVictoryUI(gameState.players.find(p => p.score === 0));
                return;
            }

            if (data.currentPlayer !== lastProcessedTurn) {
                dartsInTurn = []; visualDarts = []; isBust = false;
                lastProcessedTurn = data.currentPlayer;
                if (gameState.currentPlayer === myIndex) {
                    scoreAtTurnStart = gameState.players[myIndex].score;
                    localDisplayScore = scoreAtTurnStart;
                }
            }
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            syncUI();
        });
    }

    function addDart(val) {
        // Ajout du blocage si le score est déjà à 0
        if (gameState.currentPlayer != myIndex || dartsInTurn.length >= 3 || isBust || localDisplayScore === 0) return;
        let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
        let pts = val * m;

        if (localDisplayScore - pts < 0 || localDisplayScore - pts === 1 || (localDisplayScore - pts === 0 && m !== 2 && val !== 50)) {
            isBust = true; localDisplayScore = scoreAtTurnStart;
            visualDarts.push("BUST"); dartsInTurn.push(0);
        } else {
            localDisplayScore -= pts;
            let label = (val === 50) ? "BULL" : (val === 25) ? "B25" : (val === 0) ? "Out" : (m === 3 ? "T" : m === 2 ? "D" : "S") + val;
            visualDarts.push(label); dartsInTurn.push(pts);
        }
        setMod(1); syncUI();
    }

    function undoLastDart() {
        if (dartsInTurn.length === 0) return;
        dartsInTurn.pop(); visualDarts.pop();
        isBust = false; localDisplayScore = scoreAtTurnStart;
        dartsInTurn.forEach(p => localDisplayScore -= p);
        syncUI();
    }

    function finishTurn() {
        if (gameState.currentPlayer != myIndex) return;
        const p = gameState.players[myIndex];
        const finalScore = isBust ? scoreAtTurnStart : localDisplayScore;
        const ptsTurn = isBust ? 0 : dartsInTurn.reduce((a, b) => a + b, 0);

        db.ref(`rooms/${roomName}/players/${myId}`).update({
            score: finalScore,
            beforeTurnScore: scoreAtTurnStart,
            totalDarts: p.totalDarts + dartsInTurn.length,
            totalPoints: p.totalPoints + ptsTurn,
            lastTurn: isBust ? "BUST" : visualDarts.join(" | ")
        }).then(() => {
            if (finalScore === 0) {
                db.ref(`rooms/${roomName}`).update({ status: "finished" });
            } else {
                db.ref(`rooms/${roomName}`).update({ 
                    currentPlayer: (gameState.currentPlayer + 1) % gameState.players.length,
                    lastPlayerId: myId
                });
            }
        });
    }

    function showVictoryUI(winner) {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('winner-display').innerText = winner ? winner.name + " GAGNE !" : "MATCH TERMINÉ";
        document.getElementById('stats-list').innerHTML = gameState.players.map(p => {
            const avg = p.totalDarts > 0 ? ((p.totalPoints / p.totalDarts) * 3).toFixed(1) : "0";
            return `<div style="display:flex; justify-content:space-between; margin-bottom:5px; color:${p.score === 0 ? '#2ecc71':'#fff'}">
                <span>${p.name}</span><span><b>${avg}</b> AVG (${p.totalDarts} fl.)</span>
            </div>`;
        }).join('');
        if (winner && winner.id === myId) {
             document.getElementById('btn-save-only').style.display = 'block';
        }
    }

    async function resetStand() {
        if(confirm("Vider le stand et revenir au menu ?")) {
            await db.ref(`rooms/${roomName}`).remove();
            location.reload();
        }
    }

    function undoLastTurn() {
        const lastId = gameState.lastPlayerId; 
        if (!lastId) return;
        const p = gameState.players.find(x => x.id === lastId);
        if (p && p.beforeTurnScore !== undefined) {
            db.ref(`rooms/${roomName}/players/${lastId}`).update({ score: p.beforeTurnScore });
            db.ref(`rooms/${roomName}`).update({ 
                currentPlayer: gameState.players.findIndex(x => x.id === lastId),
                lastPlayerId: "" 
            });
        }
    }

    function syncUI() {
        const container = document.getElementById('gamePlayers');
        if(!container) return;
        container.innerHTML = gameState.players.map((p, i) => {
            const isMe = (i === myIndex);
            const score = isMe ? localDisplayScore : p.score;
            const tF = p.totalDarts + (isMe ? dartsInTurn.length : 0);
            const tP = p.totalPoints + (isMe ? (scoreAtTurnStart - localDisplayScore) : 0);
            const avg = tF > 0 ? ((tP / tF) * 3).toFixed(1) : "0.0";
            return `<div class="p-column ${i == gameState.currentPlayer ? 'active' : ''}">
                <div class="p-name">${p.name}</div>
                <div class="p-score">${score}</div>
                <div class="p-stats">AVG: ${avg}</div>
                <div style="font-size:0.5rem; margin-top:5px; color:#555">${p.lastTurn || "---"}</div>
            </div>`;
        }).join('');
        for(let i=0; i<3; i++) {
            const el = document.getElementById('v'+i);
            el.innerHTML = visualDarts[i] ? `${dartsInTurn[i]}<small>${visualDarts[i]}</small>` : `--<small>-</small>`;
        }
        const btn = document.getElementById('btn-validate');
        const isMyTurn = (gameState.currentPlayer == myIndex);
        btn.disabled = !(isMyTurn && (dartsInTurn.length === 3 || isBust || localDisplayScore === 0));
        if(!btn.disabled) btn.classList.add('ready'); else btn.classList.remove('ready');
    }

    async function saveVictory() {
        const winner = gameState.players.find(p => p.id === myId);
        const avg = parseFloat(((winner.totalPoints / winner.totalDarts) * 3).toFixed(2));
        const btn = document.getElementById('btn-save-only');
        
        try {
            btn.disabled = true; btn.innerText = "ENREGISTREMENT...";
            const ref = db.ref(`users/${winner.name}/games/live_501`);
            
            // Top Scores
            const snap = await ref.child('top').once('value');
            let top = snap.val() || [];
            top.push({ avg: avg, darts: winner.totalDarts, date: new Date().toLocaleDateString('fr-FR') });
            top.sort((a, b) => b.avg - a.avg);
            await ref.child('top').set(top.slice(0, 3));
            
            // Incrémentation Stats Win
            await db.ref(`users/${winner.name}/stats/wins`).transaction(c => (c || 0) + 1);
            
            btn.innerText = "✅ ARCHIVÉ";
            setTimeout(() => resetStand(), 1000);
        } catch(e) { 
            alert("Erreur"); 
            btn.disabled = false; btn.innerText = "ERREUR";
        }
    }
</script>
</body>
</html>
