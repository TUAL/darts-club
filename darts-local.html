<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Local</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; 
            position: fixed; width: 100%;
        }

        /* SETUP SCREEN */
        #setup-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .setup-box { width: 100%; max-width: 320px; text-align: center; }
        .player-input-group { background: var(--card); padding: 8px; border-radius: 12px; border: 1px solid #30363d; display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 1rem; outline: none; }
        .btn-add { background: var(--s-color); color: #fff; border: none; width: 45px; border-radius: 8px; font-weight: 900; }
        .suggest-p { background: #21262d; border: 1px dashed var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8rem; cursor: pointer; display: none; }
        .player-tag { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--accent); font-weight: bold; }
        .btn-start { background: var(--accent); color: #fff; padding: 15px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; }

        /* GAME SCREEN */
        #game-screen { display: none; height: 100dvh; flex-direction: column; padding: 8px; padding-bottom: 60px; gap: 4px; }
        .app-brand { height: 30px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
        .app-title { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        .header { height: 95px; display: grid; grid-template-columns: repeat(auto-fit, minmax(0, 1fr)); gap: 6px; flex-shrink: 0; }
        .p-card { background: var(--card); border-radius: 8px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; padding: 5px; opacity: 0.4; }
        .p-card.active { border-color: var(--accent); border-width: 2px; opacity: 1; }
        .p-name { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; font-weight: 900; }
        .score-val { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1; margin: 2px 0; }
        .avg-label { font-size: 0.55rem; color: var(--accent); font-weight: bold; }
        .last-turn-label { font-size: 0.55rem; color: #6e7681; margin-top: 2px; height: 12px; }

        .turn-tracking { display: flex; justify-content: center; gap: 6px; height: 35px; flex-shrink: 0; margin: 5px 0; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #484f58; }

        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .mod-row, .num-grid, .special-row, .action-row { display: grid; gap: 4px; }
        .mod-row { grid-template-columns: repeat(3, 1fr); height: 50px; }
        .num-grid { grid-template-columns: repeat(4, 1fr); flex: 1; }
        .special-row { grid-template-columns: repeat(3, 1fr); height: 55px; }
        .action-row { grid-template-columns: 1fr 2fr 1fr; height: 65px; }

        button { border: none; border-radius: 8px; font-weight: 700; color: #fff; cursor: pointer; }
        .btn-mod { background: #21262d; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }

        /* BOUTONS AVEC BARRES DE COULEURS */
        .num-btn { background: #21262d; position: relative; overflow: hidden; font-size: 1.1rem; }
        .num-btn::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: transparent; }
        .grid.mode-s .num-btn::after { background: var(--s-color); }
        .grid.mode-d .num-btn::after { background: var(--d-color); }
        .grid.mode-t .num-btn::after { background: var(--t-color); }
        
        .btn-valid { background: var(--accent) !important; font-size: 0.85rem; text-transform: uppercase; }
        .btn-valid:disabled { opacity: 0.2; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.4rem; }
        .btn-undo-all { background: #161b22; color: #8b949e; font-size: 0.55rem; border: 1px solid #30363d; line-height: 1.2; text-transform: uppercase; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 8px 0; text-align: center; border-top: 1px solid #161b22; }
        .back-btn { color: #888; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; padding: 4px 12px; border: 1px solid #333; border-radius: 20px; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .final-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 300px; text-align: center; }
        .btn-save { background: var(--accent) !important; font-size: 0.85rem; font-weight: 800; border-radius: 10px; height: 50px; width: 100%; margin: 10px 0; color: white; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h1 style="color:var(--accent); font-size:1.2rem; letter-spacing:2px; margin-bottom:20px;">🎯 MODE LOCAL</h1>
            <div id="suggest-box" class="suggest-p" onclick="addSuggestedPlayer()">AJOUTER : <b id="suggest-name"></b> ?</div>
            <div class="player-input-group">
                <input type="text" id="pName" placeholder="NOM DU JOUEUR..." autocomplete="off">
                <button class="btn-add" onclick="addPlayerToGame()">+</button>
            </div>
            <div id="pList"></div>
            <button class="btn-start" id="startBtn" onclick="startGame()" style="display: none;">LANCER LA PARTIE</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="app-brand"><span class="app-title">DARTS CLUB — LOCAL</span></div>
        <div class="header" id="gamePlayers"></div>
        <div class="turn-tracking"><div class="dart-slot" id="d0">-</div><div class="dart-slot" id="d1">-</div><div class="dart-slot" id="d2">-</div></div>
        <div class="grid mode-s" id="gameGrid">
            <div class="mod-row">
                <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
                <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
                <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div class="special-row">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div class="action-row">
                <button class="btn-undo-all" onclick="undoLastTurn()">ANNULER<br>VOLÉE<br>PRÉCÉDENTE</button>
                <button class="btn-valid" id="btn-validate" onclick="finishTurn()" disabled>VALIDER VOLÉE</button>
                <button class="btn-del" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <footer id="main-footer"><a href="menu.html" class="back-btn">⬅ Menu Principal</a></footer>

    <div id="end-screen" class="overlay">
        <div class="final-box">
            <h1 style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase;">MATCH TERMINÉ</h1>
            <div id="final-result" style="font-size: 2rem; font-weight: 900; margin: 5px 0; color:var(--s-color);">VICTOIRE</div>
            <p id="winner-display" style="font-size: 0.8rem; color: #fff; margin-bottom:15px; font-weight:bold;"></p>
        </div>

        <div id="stats-summary" style="margin: 10px 0; width: 100%; max-width: 260px; font-size: 0.75rem;">
            <div style="color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px;"></div>
            <div id="local-stats-list" style="background: var(--card); border-radius: 8px; padding: 10px; border: 1px solid #30363d;"></div>
        </div>

        <div class="end-btn-container" style="display: flex; flex-direction: column; width: 100%; max-width: 260px; gap: 10px; margin-top: 15px;">
            <button id="btn-save-only" class="btn-save" style="display:none;" onclick="saveGameData()">ENREGISTRER MOYENNE</button>
            <button class="btn-valid" style="height:50px; border-radius:10px;" onclick="location.reload()">REJOUER</button>
            <a href="menu.html" style="color: #555; text-decoration: none; font-size: 0.75rem; text-align: center; margin-top:5px;">RETOUR AU MENU</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8AIw0f3L65XMZM9OBX8wDWNbSvl4ACZM",
            authDomain: "dartsclub-1aab9.firebaseapp.com",
            databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dartsclub-1aab9",
            storageBucket: "dartsclub-1aab9.firebasestorage.app",
            messagingSenderId: "769714266505",
            appId: "1:769714266505:web:ea1758db2c96702979c158"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const currentPseudo = localStorage.getItem('darts_pseudo');
        let players = [], currentPlayer = 0, turnHistory = [];
        let dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;

        window.onload = () => {
            if(currentPseudo && currentPseudo !== "INVITÉ") {
                document.getElementById('suggest-box').style.display = 'block';
                document.getElementById('suggest-name').innerText = currentPseudo;
            }
            const pad = document.getElementById('numPad'); 
            pad.innerHTML = "";
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
        };

        function addSuggestedPlayer() { addPlayerToGame(currentPseudo); document.getElementById('suggest-box').style.display = 'none'; }

        function addPlayerToGame(forcedName = null) {
            const input = document.getElementById('pName');
            const name = (forcedName || input.value).trim().toUpperCase();
            if(name && players.length < 4) {
                players.push({ name: name, score: 501, totalDarts: 0, totalPoints: 0, lastTurn: "" });
                input.value = ""; renderSetup();
            }
        }

        function renderSetup() {
            const list = document.getElementById('pList');
            list.innerHTML = players.map((p, i) => `<div class="player-tag"><span>${p.name}</span><span onclick="players.splice(${i},1);renderSetup()" style="color:var(--t-color); cursor:pointer">✕</span></div>`).join('');
            document.getElementById('startBtn').style.display = players.length > 0 ? 'block' : 'none';
        }

        function startGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            syncUI();
        }

        function setMod(m) {
            multiplier = m;
            document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
            document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
            document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
        }

        function addDart(val) {
            if (dartsInTurn.length >= 3 || isBust) return;
            let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
            let pts = (val === 50) ? 50 : val * m;
            let p = players[currentPlayer];
            const slot = document.getElementById(`d${dartsInTurn.length}`);

            if (p.score - pts < 0 || p.score - pts === 1 || (p.score - pts === 0 && m !== 2 && val !== 50)) {
                isBust = true; visualDarts.push("BUST");
                slot.innerText = "BUST"; slot.style.color = "var(--t-color)";
            } else {
                p.score -= pts;
                let label = (val === 50) ? "BULL" : (val === 0) ? "0" : (m === 3 ? "T" : m === 2 ? "D" : "S") + val;
                visualDarts.push(label); slot.innerText = label;
                slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
                
                if(p.score === 0) { 
                    dartsInTurn.push(pts);
                    p.totalDarts += dartsInTurn.length;
                    p.totalPoints += 501;
                    setTimeout(() => showVictory(p.name), 300); 
                    return; 
                }
            }
            dartsInTurn.push(pts); setMod(1);
            document.getElementById('btn-validate').disabled = !(dartsInTurn.length === 3 || isBust);
            syncUI();
        }

        function finishTurn() {
            let p = players[currentPlayer];
            let ptsTurn = isBust ? 0 : dartsInTurn.reduce((a,b)=>a+b, 0);
            p.lastTurn = isBust ? "BUST" : visualDarts.join(' ');
            turnHistory.push({ playerIdx: currentPlayer, points: ptsTurn, wasBust: isBust });
            
            p.totalDarts += isBust ? 3 : dartsInTurn.length;
            p.totalPoints += ptsTurn;
            currentPlayer = (currentPlayer + 1) % players.length; 
            resetTurn(); syncUI(); 
        }

        function undoLastDart() {
            if (dartsInTurn.length === 0) return;
            let lastPts = dartsInTurn.pop(); visualDarts.pop();
            if (!isBust) players[currentPlayer].score += lastPts;
            isBust = false;
            document.getElementById(`d${dartsInTurn.length}`).innerText = "-";
            document.getElementById(`d${dartsInTurn.length}`).style.color = "#484f58";
            document.getElementById('btn-validate').disabled = true;
            syncUI();
        }

        function undoLastTurn() {
            if(turnHistory.length === 0) return;
            let last = turnHistory.pop();
            currentPlayer = last.playerIdx;
            if(!last.wasBust) players[currentPlayer].score += last.points;
            players[currentPlayer].totalDarts -= 3; 
            players[currentPlayer].totalPoints -= last.points;
            players[currentPlayer].lastTurn = "";
            resetTurn(); syncUI();
        }

        function syncUI() {
            const container = document.getElementById('gamePlayers');
            container.innerHTML = players.map((p, i) => {
                let avg = p.totalDarts > 0 ? ((p.totalPoints / p.totalDarts) * 3).toFixed(1) : "0.0";
                return `<div class="p-card ${i === currentPlayer ? 'active' : ''}">
                    <div class="p-name">${p.name}</div>
                    <div class="score-val">${p.score}</div>
                    <div class="avg-label">AVG: ${avg} — FL: ${p.totalDarts}</div>
                    <div class="last-turn-label">${p.lastTurn}</div>
                </div>`;
            }).join('');
        }

        function resetTurn() {
            dartsInTurn = []; visualDarts = []; isBust = false; 
            for(let i=0; i<3; i++) { document.getElementById(`d${i}`).innerText = "-"; document.getElementById(`d${i}`).style.color = "#484f58"; }
            setMod(1); document.getElementById('btn-validate').disabled = true;
        }

        function showVictory(name) {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            const savedPseudo = localStorage.getItem('darts_pseudo');
            const btnSave = document.getElementById('btn-save-only');
            document.getElementById('winner-display').innerText = name + " GAGNE LA PARTIE !";

            if (players.length === 1 || (savedPseudo && name === savedPseudo.toUpperCase())) {
                btnSave.style.display = 'block';
            } else {
                btnSave.style.display = 'none';
            }

            let html = "";
            players.forEach(p => {
                let avg = p.totalDarts > 0 ? ((p.totalPoints / p.totalDarts) * 3).toFixed(1) : "0.0";
                html += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #21262d; color:${p.name === name ? 'var(--s-color)' : '#fff'}">
                    <span>${p.name}</span><span><b>${avg}</b> <small>AVG</small> (${p.totalDarts} FL.)</span>
                </div>`;
            });
            document.getElementById('local-stats-list').innerHTML = html;
        }

        function saveGameData() {
            const btn = document.getElementById('btn-save-only');
            const date = new Date().toLocaleDateString('fr-FR');
            const isSolo = players.length === 1;
            const winnerName = players[currentPlayer].name; 

            if (isSolo) {
                const p = players[0];
                const avg = parseFloat(((p.totalPoints / p.totalDarts) * 3).toFixed(2));
                const ref = firebase.database().ref(`users/${p.name}/games/local_solo/top`);
                ref.once('value', snap => {
                    let scores = snap.val() || [];
                    scores.push({ avg: avg, darts: p.totalDarts, date: date });
                    scores.sort((a,b) => b.avg - a.avg);
                    ref.set(scores.slice(0, 2)); 
                });
            } else {
                const p = players.find(player => player.name === winnerName);
                const avg = parseFloat(((p.totalPoints / p.totalDarts) * 3).toFixed(2));
                const ref = firebase.database().ref(`users/${p.name}/games/local_multi/top`);
                ref.once('value', snap => {
                    let scores = snap.val() || [];
                    scores.push({ avg: avg, darts: p.totalDarts, date: date });
                    scores.sort((a,b) => b.avg - a.avg);
                    ref.set(scores.slice(0, 3)); 
                });
                players.forEach(player => {
                    const isWinner = (player.name === winnerName);
                    const refCount = firebase.database().ref(`users/${player.name}/games/local_multi/stats`);
                    refCount.once('value', snap => {
                        let data = snap.val() || { wins: 0, total_games: 0 };
                        refCount.set({ wins: data.wins + (isWinner ? 1 : 0), total_games: data.total_games + 1 });
                    });
                });
            }
            btn.innerText = "ENREGISTRÉ !"; btn.disabled = true; btn.style.opacity = "0.5";
        }
    </script>
</body>
</html>
