<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Local</title>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; 
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden; 
        }

        /* SETUP SCREEN */
        #setup-screen { max-width: 400px; margin: 0 auto; width: 100%; padding: 40px 20px; text-align: center; }
        .player-input-group { background: var(--card); padding: 8px; border-radius: 12px; border: 1px solid #30363d; display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 1rem; outline: none; }
        .btn-add { background: var(--s-color); color: #fff; border: none; width: 40px; border-radius: 8px; font-weight: 900; }
        .player-tag { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--accent); font-weight: bold; }
        .btn-start { background: var(--accent); color: #fff; padding: 15px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 15px; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 15px 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 15px);
            text-align: center; z-index: 100; border-top: 1px solid #161b22;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; padding: 6px 18px; border: 1px solid #333; border-radius: 20px; }

        /* GAME SCREEN */
        #game-screen { display: none; height: 100dvh; flex-direction: column; padding: 10px; padding-bottom: 90px; gap: 5px; }
        
        .header { height: 22dvh; display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .p-card { background: var(--card); border-radius: 12px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; transition: 0.3s; padding: 5px; }
        .p-card.active { opacity: 1; border-color: var(--accent); border-width: 3px; box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        
        .p-name { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .score-val { font-size: 2.1rem; font-weight: 900; color: #fff; line-height: 1; margin: 4px 0; }
        
        /* Box 3 fléchettes dans le cadre */
        .last-volley-box { font-size: 0.6rem; color: var(--d-color); font-weight: 800; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; margin-bottom: 4px; letter-spacing: 0.5px; }
        
        /* AVG et FLE l'un sous l'autre */
        .avg-info { font-size: 0.6rem; color: var(--accent); font-family: 'Courier New', monospace; text-align: center; line-height: 1.3; font-weight: bold; }

        /* Ligne HHJ centrale supprimée */
        .ia-last-volley { display: none; }

        .turn-tracking { display: flex; justify-content: center; gap: 8px; height: 7dvh; margin-top: 5px; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; color: #484f58; }

        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; height: 12%; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; }
        
        .grid.mode-s .num-btn { border-bottom: 3px solid var(--s-color); }
        .grid.mode-d .num-btn { border-bottom: 3px solid var(--d-color); }
        .grid.mode-t .num-btn { border-bottom: 3px solid var(--t-color); }

        .special-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; height: 12%; }
        .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 4px; height: 15%; }

        button { border: none; border-radius: 6px; font-weight: 700; color: #fff; cursor: pointer; }
        .btn-mod { background: #21262d; font-size: 1.1rem; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }

        .num-btn { background: #21262d; font-size: 1.2rem; }
        .btn-valid { background: var(--accent) !important; font-size: 1rem; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.6rem; }
        .btn-undo-all { background: #161b22; color: #f85149; font-size: 0.65rem; text-transform: uppercase; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .stats-table { width: 100%; border-collapse: collapse; margin: 20px 0; color: #fff; font-size: 0.9rem; }
        .stats-table th { color: var(--accent); border-bottom: 1px solid #30363d; padding: 10px; }
        .stats-table td { padding: 12px; border-bottom: 1px solid #21262d; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div style="font-size: 3.5rem; margin-bottom: 5px;">🎯</div>
        <h1 style="color: var(--accent); margin-bottom: 25px; font-size: 1.8rem; letter-spacing: 2px;">DARTS LOCAL</h1>
        <div class="player-input-group">
            <input type="text" id="pName" placeholder="NOM DU JOUEUR..." autocomplete="off">
            <button class="btn-add" onclick="addPlayerToGame()">OK</button>
        </div>
        <div id="pList"></div>
        <button class="btn-start" id="startBtn" onclick="startGame()" style="display: none;">COMMENCER LA PARTIE</button>
    </div>

    <footer id="main-footer">
        <a href="index.html" class="back-btn">⬅ Menu Principal</a>
    </footer>

    <div id="game-screen">
        <div class="header" id="gamePlayers"></div>
        <div class="ia-last-volley" id="ia-history"></div> <div class="turn-tracking"><div class="dart-slot" id="d0">-</div><div class="dart-slot" id="d1">-</div><div class="dart-slot" id="d2">-</div></div>

        <div class="grid mode-s" id="gameGrid">
            <div class="mod-row">
                <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
                <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
                <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div class="special-row">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div class="action-row">
                <button class="btn-undo-all" onclick="undoLastTurn()">ANNULER<br>VOLÉE<br>PRÉCÉDENTE</button>
                <button class="btn-valid" onclick="finishTurn()">VALIDER VOLÉE</button>
                <button class="btn-del" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <div id="victory-layer" class="overlay">
        <h1 id="winner-name" style="color:var(--s-color); font-size: 2rem; margin-bottom: 0;">GAGNANT !</h1>
        <div id="stats-container" style="width: 100%;"></div>
        <button class="btn-start" onclick="location.reload()" style="max-width:200px">REJOUER</button>
        <a href="index.html" style="margin-top:25px; color:#888; text-decoration:none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; border: 1px solid #333; padding: 8px 20px; border-radius: 20px;">⬅ Menu Principal</a>
    </div>

    <script>
        let players = [], currentPlayer = 0, turnHistory = [];
        let dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;

        window.onload = () => {
            const pad = document.getElementById('numPad'); 
            pad.innerHTML = "";
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
        };

        function addPlayerToGame() {
            const input = document.getElementById('pName');
            const name = input.value.trim();
            if(name && players.length < 4) {
                players.push({ name: name.toUpperCase(), score: 501, totalDarts: 0, totalPoints: 0, lastDarts: "- • - • -" });
                input.value = "";
                renderSetup();
            }
        }

        function renderSetup() {
            const list = document.getElementById('pList');
            list.innerHTML = players.map((p, i) => `<div class="player-tag"><span>${p.name}</span><span onclick="players.splice(${i},1);renderSetup()" style="color:var(--t-color); cursor:pointer">✕</span></div>`).join('');
            document.getElementById('startBtn').style.display = players.length > 0 ? 'block' : 'none';
        }

        function startGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            syncUI();
        }

        function setMod(m) {
            multiplier = m;
            document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
            document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
            document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
        }

        function addDart(val) {
            if (dartsInTurn.length >= 3 || isBust) return;
            let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
            let pts = (val === 50) ? 50 : val * m;
            let p = players[currentPlayer];
            const slot = document.getElementById(`d${dartsInTurn.length}`);

            if (p.score - pts < 0 || p.score - pts === 1 || (p.score - pts === 0 && m !== 2 && val !== 50)) {
                isBust = true; visualDarts.push("BUST");
                slot.innerText = "BUST"; slot.style.color = "var(--t-color)";
            } else {
                p.score -= pts;
                let label = (val === 50) ? "BULL" : (val === 0) ? "0" : (m === 3 ? "T" : m === 2 ? "D" : "") + val;
                visualDarts.push(label); slot.innerText = label;
                slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
                syncUI();

                if(p.score === 0) { 
                    p.totalDarts += (dartsInTurn.length + 1);
                    p.totalPoints += 501;
                    dartsInTurn.push(pts);
                    setTimeout(() => finishTurn(true), 300); 
                    return; 
                }
            }
            dartsInTurn.push(pts); setMod(1);
        }

        function finishTurn(victory = false) {
            if (dartsInTurn.length === 0 && !isBust) return;
            let p = players[currentPlayer];
            let ptsTurn = isBust ? 0 : dartsInTurn.reduce((a,b)=>a+b, 0);
            
            let volleyLabels = [...visualDarts];
            while(volleyLabels.length < 3) volleyLabels.push("-");
            p.lastDarts = volleyLabels.join(" • ");
            
            turnHistory.push({ playerIdx: currentPlayer, points: ptsTurn, wasBust: isBust, prevLast: p.lastDarts });
            
            if (!victory) {
                p.totalDarts += 3;
                p.totalPoints += ptsTurn;
                currentPlayer = (currentPlayer + 1) % players.length; 
                resetTurn(); 
                syncUI(); 
            } else { showVictory(p.name); }
        }

        function undoLastDart() {
            if (dartsInTurn.length === 0) return;
            let lastPts = dartsInTurn.pop(); visualDarts.pop();
            if (!isBust) players[currentPlayer].score += lastPts;
            isBust = false;
            document.getElementById(`d${dartsInTurn.length}`).innerText = "-";
            document.getElementById(`d${dartsInTurn.length}`).style.color = "#484f58";
            setMod(1); syncUI();
        }

        function undoLastTurn() {
            if(turnHistory.length === 0) return;
            let last = turnHistory.pop();
            currentPlayer = last.playerIdx;
            if(!last.wasBust) players[currentPlayer].score += last.points;
            players[currentPlayer].totalDarts -= 3; 
            players[currentPlayer].totalPoints -= last.points;
            players[currentPlayer].lastDarts = "- • - • -";
            resetTurn(); syncUI();
        }

        function syncUI() {
            const container = document.getElementById('gamePlayers');
            container.innerHTML = players.map((p, i) => {
                let avg = p.totalDarts > 0 ? (p.totalPoints / (p.totalDarts / 3)).toFixed(1) : "0.0";
                return `
                <div class="p-card ${i === currentPlayer ? 'active' : ''}">
                    <div class="p-name">${p.name}</div>
                    <div class="score-val">${p.score}</div>
                    <div class="last-volley-box">${p.lastDarts || "- • - • -"}</div>
                    <div class="avg-info">AVG: ${avg}<br>FLE: ${p.totalDarts}</div>
                </div>`;
            }).join('');
        }

        function resetTurn() {
            dartsInTurn = []; visualDarts = []; isBust = false; 
            for(let i=0; i<3; i++) { 
                document.getElementById(`d${i}`).innerText = "-"; 
                document.getElementById(`d${i}`).style.color = "#484f58";
            }
            setMod(1);
        }

        function showVictory(name) {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('main-footer').style.display = 'none';
            let html = `<table class="stats-table"><tr><th>JOUEUR</th><th>FLE.</th><th>MOY.</th></tr>`;
            players.forEach(p => {
                let avg = p.totalDarts > 0 ? ((p.totalPoints / p.totalDarts) * 3).toFixed(1) : "0.0";
                html += `<tr style="${p.name === name ? 'color:var(--s-color); font-weight:bold;' : ''}"><td>${p.name}</td><td>${p.totalDarts}</td><td>${avg}</td></tr>`;
            });
            document.getElementById('stats-container').innerHTML = html + `</table>`;
            document.getElementById('winner-name').innerText = name + " GAGNE !";
            document.getElementById('victory-layer').style.display = 'flex';
        }
    </script>
</body>
</html>
