<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Checkout Training</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --bg-dark: #121916;
            --accent-orange: #f39c12; --accent-green: #2ecc71; --accent-red: #e74c3c;
            --mode-color: var(--accent);
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; 
    height: 91%; 
    min-height: 91%; 
    max-height: 91%;
    flex-shrink: 0;   /* Empêche le flexbox parent de réduire ce bloc */		
            display: flex; flex-direction: column; 
			overflow: hidden; 
            position: fixed; width: 100%;
		
        }

        .top-bar { height: 50px; background: #1a1a1a; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; border-bottom: 1px solid #333; }
        .back-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .top-title { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; color: #ccc; }

.score-section { 
    height: 40%; 
    min-height: 40%; 
    max-height: 40%;
    display: flex; 
    flex-direction: column; 
    background: var(--bg-dark); 
    padding: 10px 0;
    overflow: hidden; /* Empêche le contenu interne de pousser les bords */
    flex-shrink: 0;   /* Empêche le flexbox parent de réduire ce bloc */
}   

        .header-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 10px; flex: 1; }
        
        .p-column { 
            background: #1a1a1a; border: 3px solid #333; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 10px 5px; opacity: 0.4; transition: 0.3s; color: #fff;
        }
        
        .p-column.active-0 { background: var(--accent-orange); border-color: #fff; opacity: 1; color: #000; }
        .p-column.active-1 { background: var(--accent-green); border-color: #fff; opacity: 1; color: #000; }
        
        .p-name { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; }
        .p-score { font-size: 3.2rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        .p-last-v { font-size: 0.65rem; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        .p-stats { font-size: 0.6rem; font-weight: 900; width: 90%; }

        .turn-announcer { height: 35px; display: flex; align-items: center; justify-content: center; color: var(--accent-orange); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }

.input-info { 
    height: 60px !important; 
    min-height: 60px !important;
    max-height: 60px !important;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 10px; 
    padding: 0 15px; 
    background: #000;
    flex-shrink: 0; /* Empêche la section de se faire écraser */
}

        .dart-val { 
            width: 70px; height: 55px; background: white; color: black; 
            border-radius: 30px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem;
        }
        .dart-val small { font-size: 0.55rem; font-weight: bold; color: #555; }
        
        .btn-valid-darts { flex: 1; height: 55px; background: #222; border: none; color: #444; border-radius: 30px; font-weight: 900; font-size: 0.85rem; }
        .btn-valid-darts.ready { color: #fff; cursor: pointer; }

        .keyboard { 

			background: #1a1a1a; 
			display: flex; 
			flex-direction: column; 
			padding: 2px;
            border-top: 4px solid var(--mode-color); 
			transition: border-color 0.2s;
    height: 49%; 
    min-height: 49%; 
    max-height: 49%;
    overflow: hidden; /* Empêche le contenu interne de pousser les bords */
    flex-shrink: 0;   /* Empêche le flexbox parent de réduire ce bloc */						
        }
		
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #333; }
        .btn-m { background: #1a1a1a; color: #888; padding: 15px; border: none; font-weight: 900; font-size: 0.9rem; }
        .btn-m.active { color: #fff; border-bottom: 4px solid var(--accent); }

        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); flex: 1; gap: 1px; background: #333; }
        .key { background: #121916; border: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .key span { font-size: 1.4rem; font-weight: 900; }
        .key small { font-size: 0.75rem; color: #555; font-weight: 900; display: block; min-height: 1.2em; } 

        .special-row { display: grid; grid-template-columns: 1fr 1.2fr 1.2fr 1.2fr; height: 70px; gap: 1px; background: #333; }
        .sp-key { background: #121916; color: white; border: none; font-weight: bold; font-size: 0.8rem; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .final-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 260px; text-align: center; }
        .end-btn-container { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 260px; margin-top: 15px; }
        .end-btn { height: 50px; border-radius: 10px; font-size: 0.85rem; text-transform: uppercase; font-weight: 800; border: none; color: white; cursor: pointer; }
        .btn-save { background: var(--accent-green) !important; }
        .btn-valid { background: var(--accent) !important; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="back-icon" onclick="window.location.href='menu.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="top-title" id="title-label">🏁 CHECKOUT</div>
    </div>

    <div class="score-section">
        <div class="header-scores">
            <div class="p-column active-0">
                <div class="p-name">RESTE</div>
                <div id="val-reste" class="p-score">--</div>
                <div id="last-label" class="p-last-v">---</div>
                <div class="p-stats">&nbsp;<br>&nbsp;</div>
            </div>
            <div class="p-column active-1">
                <div class="p-name">JETS</div>
                <div id="val-jets" class="p-score">0/6</div>
                <div class="p-last-v">&nbsp;</div>
                <div id="target-info" class="p-stats">CIBLE : --<br>MODE : D-OUT</div>
            </div>
            <div style="visibility: hidden;"></div>
        </div>
        <div class="turn-announcer" id="msg-txt">À TOI DE JOUER !</div>
    </div>
    
    <div class="input-info">
        <div class="dart-val" id="v0">--<small>-</small></div>
        <div class="dart-val" id="v1">--<small>-</small></div>
        <div class="dart-val" id="v2">--<small>-</small></div>
        <button class="btn-valid-darts" id="btn-validate" onclick="finishTurn()" disabled>VALIDER</button>
    </div>

    <div class="keyboard" id="kb-frame">
        <div class="mod-row">
            <button class="btn-m active" id="m1" onclick="setMod(1)">SIMPLE</button>
            <button class="btn-m" id="m2" onclick="setMod(2)">DOUBLE</button>
            <button class="btn-m" id="m3" onclick="setMod(3)">TRIPLE</button>
        </div>
        <div id="pad" class="num-grid"></div>
        <div class="special-row">
            <button class="sp-key" onclick="undo()" style="font-size:1.5rem;">↩</button>
            <button class="sp-key" onclick="addDart(0)">Out<br>0</button>
            <button class="sp-key" onclick="addDart(25)">25</button>
            <button class="sp-key" onclick="addDart(50)">BULL</button>
        </div>
    </div>

    <div id="end-screen" class="overlay">
		<div class="top-bar" style="width: 100%; position: absolute; top: 0; left: 0;">
			<div class="back-icon" onclick="window.location.href='menu.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
			<div class="top-title">🏁 CHECKOUT</div>
		</div>	
	
        <div class="final-box">
            <h1 id="end-title-label" style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin: 0;">Résultat</h1>
            <div id="final-score-display" style="font-size: 3.5rem; font-weight: 900; margin: 5px 0; line-height: 1;">--</div>
            <p id="end-msg" style="font-size: 0.85rem; color: #fff; font-weight: bold; margin: 10px 0 0 0; background: #1a1a1a; display: inline-block; padding: 4px 12px; border-radius: 4px;"></p>
            <p id="end-avg-display" style="font-size: 0.85rem; color: #fff; font-weight: bold; margin: 8px 0 0 0; background: #004ab3; padding: 4px 12px; border-radius: 4px; display: none;"></p>
        </div>
        
        <div id="top-scores" style="margin: 15px 0; width: 100%; max-width: 260px; font-size: 0.75rem;">
            <div style="color: var(--accent-orange); font-weight: bold; text-align: center; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">🏆 Top 3 Moyennes (PPR)</div>
            <div id="top-list" style="background: var(--card); border-radius: 10px; padding: 5px 10px; border: 1px solid #333;">...</div>
        </div>

        <div class="end-btn-container">
            <button id="btn-save-only" class="end-btn btn-save" style="display:none;" onclick="handleJustSave()">ENREGISTRER LE SCORE</button>
            <button class="end-btn btn-valid" onclick="location.reload()">REJOUER</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
        authDomain: "dartsclub-1aab9.firebaseapp.com",
        databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dartsclub-1aab9",
        storageBucket: "dartsclub-1aab9.firebasestorage.app",
        messagingSenderId: "769714266505",
        appId: "1:769714266505:web:ea1758db2c96702979c158"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => { if (!user) await auth.signInAnonymously(); });

    const pseudo = localStorage.getItem('darts_pseudo') || "INVITÉ";
    const isGuest = localStorage.getItem('is_guest') === 'true' || pseudo === "INVITÉ";

    const exclusions = [169, 168, 166, 165, 163, 162, 159];
    let initialScore, reste, totalDarts = 0, dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;
    let scoreAtTurnStart, gameOver = false;

    window.onload = () => {
        document.getElementById('title-label').innerText = "🏁 DARTS CHECKOUT";
        initGame();
        renderPad();
    };

    function initGame() {
        do { initialScore = Math.floor(Math.random() * (170 - 61 + 1)) + 61; } 
        while (exclusions.includes(initialScore));
        
        reste = initialScore;
        scoreAtTurnStart = reste;
        document.getElementById('val-reste').innerText = reste;
        document.getElementById('target-info').innerHTML = `CIBLE : ${initialScore}<br>MODE : D-OUT`;
        updateUI();
    }

    function renderPad() {
        const pad = document.getElementById('pad');
        pad.innerHTML = "";
        for(let i=1; i<=20; i++) {
            let sub = (multiplier > 1) ? (i * multiplier) : "&nbsp;"; 
            pad.innerHTML += `<button class="key" onclick="addDart(${i})"><span>${i}</span><small>${sub}</small></button>`;
        }
    }

    function setMod(m) {
        if(gameOver) return;
        multiplier = m;
        document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('active'));
        document.getElementById('m'+m).classList.add('active');
        document.documentElement.style.setProperty('--mode-color', m===1 ? 'var(--accent)' : m===2 ? 'var(--accent-orange)' : 'var(--accent-red)');
        renderPad();
    }

    function addDart(val) {
        if (dartsInTurn.length >= 3 || isBust || totalDarts >= 6 || gameOver) return;
        let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
        let pts = (val === 50) ? 50 : val * m;

        if (reste - pts < 0 || reste - pts === 1 || (reste - pts === 0 && m !== 2 && val !== 50)) {
            isBust = true; 
            visualDarts.push("BUST"); 
            dartsInTurn.push(0);
        } else {
            reste -= pts;
            let label = (val === 50) ? "BULL" : (val === 25) ? "B25" : (val === 0) ? "Out" : (m === 3 ? "T" : m === 2 ? "D" : "S") + val;
            visualDarts.push(label); 
            dartsInTurn.push(pts);
        }
        totalDarts++; 
        setMod(1); 
        updateUI();
    }

    function updateUI() {
        document.getElementById('val-reste').innerText = isBust ? scoreAtTurnStart : reste;
        document.getElementById('val-jets').innerText = totalDarts + "/6";
        
        for(let i=0; i<3; i++) {
            document.getElementById('v'+i).innerHTML = visualDarts[i] ? `${dartsInTurn[i]}<small>${visualDarts[i]}</small>` : `--<small>-</small>`;
        }
        
        const btn = document.getElementById('btn-validate');
        const isThreeDarts = (dartsInTurn.length === 3);
        const isVictory = (reste === 0);
        const isLastChance = (totalDarts === 6);
        const isFault = isBust;

        btn.disabled = !(isThreeDarts || isVictory || isLastChance || isFault);
        
        if(!btn.disabled) { 
            btn.classList.add('ready'); 
            btn.style.background = "var(--accent-orange)"; 
            btn.style.color = "#000"; 
        } else { 
            btn.classList.remove('ready'); 
            btn.style.background = "#222"; 
            btn.style.color = "#444"; 
        }
    }

    function finishTurn() {
        if (gameOver) return;
        if (reste === 0 || totalDarts >= 6) { 
            showEnd(); 
            return; 
        }
        document.getElementById('last-label').innerText = visualDarts.join(' | ');
        if (isBust) reste = scoreAtTurnStart;
        scoreAtTurnStart = reste;
        dartsInTurn = []; visualDarts = []; isBust = false; 
        updateUI();
    }

    function undo() {
        if (dartsInTurn.length === 0 || gameOver) return;
        let p = dartsInTurn.pop(); 
        visualDarts.pop();
        if (!isBust) reste += p;
        isBust = false; totalDarts--; 
        updateUI();
    }

    function showEnd() {
        gameOver = true;
        document.getElementById('end-screen').style.display = 'flex';
        const win = (reste === 0);
        const fs = document.getElementById('final-score-display');
        fs.innerText = win ? initialScore : initialScore - reste;
        fs.style.color = win ? "var(--accent-green)" : "var(--accent-red)";
        
        // Message principal
        document.getElementById('end-msg').innerText = win ? `Fini en ${totalDarts} fléchettes.` : `Il restait ${reste} pts sur ${initialScore}.`;
        
        // Affichage de la moyenne (PPR) si gagné
        const avgEl = document.getElementById('end-avg-display');
        if(win) {
            const estimationDartsAvant = 16; 
            const moyenne501 = parseFloat(((501 / (estimationDartsAvant + totalDarts)) * 3).toFixed(2));
            avgEl.innerText = `${moyenne501} avg`;
            avgEl.style.display = 'inline-block';
        } else {
            avgEl.style.display = 'none';
        }

        if(win && !isGuest) document.getElementById('btn-save-only').style.display = 'block';
        displayTop3();
    }
	
    async function handleJustSave() {
        if(isGuest) return;
        const btn = document.getElementById('btn-save-only');
        const estimationDartsAvant = 16; 
        const moyenne501 = parseFloat(((501 / (estimationDartsAvant + totalDarts)) * 3).toFixed(2));
        try {
            btn.disabled = true; btn.innerText = "ENREGISTREMENT...";
            const pseudoUpper = pseudo.toUpperCase().trim();
            const ref = db.ref(`users/${pseudoUpper}/games/checkouts/top`);
            const snap = await ref.once('value');
            
            let topScores = [];
            if(snap.exists()) {
                const val = snap.val();
                topScores = Array.isArray(val) ? val : Object.values(val);
            }

            topScores.push({ date: new Date().toLocaleDateString('fr-FR'), moyenne: moyenne501, score_ferme: initialScore, darts: totalDarts });
            topScores.sort((a, b) => b.moyenne - a.moyenne);
            await ref.set(topScores.slice(0, 3));
            btn.innerText = "✅ ARCHIVÉ";
            displayTop3();
        } catch (e) { 
            console.error(e);
            btn.disabled = false; 
            btn.innerText = "ERREUR"; 
        }
    }

    function displayTop3() {
        const listDiv = document.getElementById('top-list');
        if (isGuest) { listDiv.innerHTML = "Mode Invité"; return; }
        db.ref(`users/${pseudo.toUpperCase()}/games/checkouts/top`).once('value', (snapshot) => {
            const scores = snapshot.val() || [];
            let html = "";
            const scoreArray = Array.isArray(scores) ? scores : Object.values(scores);
            if(scoreArray.length === 0) html = "Aucun record.";
            scoreArray.forEach((s, i) => {
                html += `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:${i===scoreArray.length-1?'none':'1px solid #222'};">
                    <span>${i+1}. <b style="color:var(--accent-green)">${s.moyenne}</b> <small>avg</small></span>
                    <span style="color:#8b949e;">${s.score_ferme} <small>(${s.darts} fl.)</small></span>
                </div>`;
            });
            listDiv.innerHTML = html;
        });
    }
</script>
</body>
</html>
