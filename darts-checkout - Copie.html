<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Check-out Challenge</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; 
        }

        .app-brand { height: 30px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
        .app-title { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 8px 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
            text-align: center; z-index: 100; border-top: 1px solid #161b22;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; padding: 4px 12px; border: 1px solid #333; border-radius: 20px; }

        #game-screen { display: flex; height: 100dvh; flex-direction: column; padding: 8px; padding-bottom: 60px; gap: 4px; }
        
        .header { height: 65px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex-shrink: 0; }
        .p-card { background: var(--card); border-radius: 8px; border: 1px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .p-name { font-size: 0.55rem; color: #8b949e; text-transform: uppercase; }
        .score-val { font-size: 1.6rem; font-weight: 900; color: #fff; line-height: 1; }

        .turn-tracking { display: flex; justify-content: center; gap: 6px; height: 35px; flex-shrink: 0; margin-top: 5px; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #484f58; }

        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
        .mod-row, .num-grid, .special-row, .action-row { display: grid; gap: 4px; }
        
        .mod-row { grid-template-columns: repeat(3, 1fr); }
        .num-grid { grid-template-columns: repeat(4, 1fr); }
        .special-row { grid-template-columns: repeat(3, 1fr); }
        .action-row { grid-template-columns: 1fr 2fr 1fr; }

        button { border: none; border-radius: 8px; font-weight: 700; color: #fff; cursor: pointer; height: 60px; width: 100%; font-size: 1.1rem; }
        
        .btn-mod { background: #21262d; border: 1px solid #30363d; height: 50px; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }

        .num-btn { background: #21262d; border-bottom: 3px solid transparent; }
        .grid.mode-s .num-btn { border-bottom-color: var(--s-color); }
        .grid.mode-d .num-btn { border-bottom-color: var(--d-color); }
        .grid.mode-t .num-btn { border-bottom-color: var(--t-color); }

        .btn-valid { background: var(--accent) !important; font-size: 0.9rem; text-transform: uppercase; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.4rem; }
        .btn-undo-all { background: #161b22; color: #8b949e; font-size: 0.7rem; border: 1px solid #30363d; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .final-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 260px; text-align: center; }
        
        .end-btn-container { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 260px; margin-top: 15px; }
        .end-btn { height: 50px; border-radius: 10px; font-size: 0.85rem; text-transform: uppercase; font-weight: 800; }
        .btn-save { background: var(--s-color) !important; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div class="app-brand">
            <span class="app-logo">🎯</span>
            <span class="app-title" id="title-label">CHECKOUT</span>
        </div>

        <div class="header">
            <div class="p-card">
                <div class="p-name">RESTE</div>
                <div class="score-val" id="scoreDisplay">--</div>
            </div>
            <div class="p-card">
                <div class="p-name">JETS</div>
                <div class="score-val" id="dartCountDisplay">0/6</div>
            </div>
        </div>

        <div class="turn-tracking">
            <div class="dart-slot" id="d0">-</div>
            <div class="dart-slot" id="d1">-</div>
            <div class="dart-slot" id="d2">-</div>
        </div>

        <div class="grid mode-s" id="gameGrid">
            <div class="mod-row">
                <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
                <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
                <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div class="special-row">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div class="action-row">
                <button class="btn-undo-all" onclick="location.reload()">REJOUER</button>
                <button class="btn-valid" onclick="finishTurn()">VALIDER</button>
                <button class="btn-del" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="menu.html" class="back-btn">⬅ Menu Principal</a>
    </footer>

    <div id="end-screen" class="overlay">
        <div class="final-box">
            <h1 id="end-title-label" style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase;">Résultat</h1>
            <div id="final-score-display" style="font-size: 3.5rem; font-weight: 900; margin: 5px 0;">--</div>
            <p id="end-msg" style="font-size: 0.85rem; color: #fff; font-weight: bold;"></p>
        </div>

        <div id="top-scores" style="margin: 10px 0; width: 100%; max-width: 260px; font-size: 0.75rem;">
            <div style="color: var(--d-color); font-weight: bold; text-align: center; margin-bottom: 5px;">🏆 TOP 3 MOYENNES (PPR)</div>
            <div id="top-list">...</div>
        </div>

        <div class="end-btn-container">
            <button id="btn-save-only" class="end-btn btn-save" style="display:none;" onclick="handleJustSave()">ENREGISTRER LE SCORE</button>
            <button class="end-btn btn-valid" onclick="location.reload()">RECOMMENCER</button>
            <a href="menu.html" style="color: #555; text-decoration: none; font-size: 0.75rem; text-align: center;">RETOUR AU MENU</a>
        </div>
    </div>
	
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
			apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
            authDomain: "dartsclub-1aab9.firebaseapp.com",
            databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dartsclub-1aab9",
            storageBucket: "dartsclub-1aab9.firebasestorage.app",
            messagingSenderId: "769714266505",
            appId: "1:769714266505:web:ea1758db2c96702979c158"
        };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth(); // Ajoute cette ligne
const db = firebase.database(); // Ajoute cette ligne

// AJOUTE CE BLOC : Force la connexion pour valider les permissions
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        await auth.signInAnonymously();
    }
});

        const pseudo = localStorage.getItem('darts_pseudo') || "INVITÉ";
        const isGuest = localStorage.getItem('is_guest') === 'true' || pseudo === "INVITÉ";

        let score, initialScore, totalDartsUsed = 0, multiplier = 1, dartsInTurn = [], gameOver = false, isBust = false;
        const exclusions = [169, 168, 166, 165, 163, 162, 159];

        window.onload = () => {
            document.getElementById('title-label').innerText = "CHECKOUT - " + pseudo;
            const pad = document.getElementById('numPad'); 
            pad.innerHTML = "";
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
            initGame();
        };

        function initGame() {
            do {
                score = Math.floor(Math.random() * (170 - 61 + 1)) + 61;
            } while (exclusions.includes(score));
            initialScore = score;
            document.getElementById('scoreDisplay').innerText = score;
        }

        function setMod(m) {
            if(gameOver || isBust) return;
            multiplier = m;
            document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
            document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
            document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
        }

        function updateCounter() {
            document.getElementById('dartCountDisplay').innerText = `${totalDartsUsed + dartsInTurn.length}/6`;
        }

        function addDart(val) {
            if (dartsInTurn.length >= 3 || (totalDartsUsed + dartsInTurn.length) >= 6 || isBust || score === 0) return;

            let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
            let pts = (val === 50) ? 50 : val * m;
            let label = (val === 50) ? "BULL" : (val === 0) ? "0" : (m === 3 ? "T" : m === 2 ? "D" : "S") + val;
            
            const slot = document.getElementById(`d${dartsInTurn.length}`);

            if (score - pts < 0 || score - pts === 1 || (score - pts === 0 && m !== 2 && val !== 50)) {
                isBust = true;
                slot.innerText = "BUST";
                slot.style.color = "var(--t-color)";
                dartsInTurn.push(0);
                updateCounter();
                return; 
            }

            score -= pts;
            document.getElementById('scoreDisplay').innerText = score;
            slot.innerText = label;
            slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
            
            dartsInTurn.push(pts);
            updateCounter();
            setMod(1);
        }

        function finishTurn() {
            if (gameOver) return;
            totalDartsUsed += dartsInTurn.length;
            
            if (score === 0 || totalDartsUsed >= 6) {
                showEnd();
                return;
            }
            
            dartsInTurn = [];
            isBust = false;
            updateCounter();
            for(let i=0; i<3; i++) {
                const slot = document.getElementById(`d${i}`);
                slot.innerText = "-"; slot.style.color = "#484f58";
            }
        }

        function undoLastDart() {
            if (gameOver || dartsInTurn.length === 0) return;
            let lastPts = dartsInTurn.pop();
            if (!isBust) score += lastPts;
            isBust = false;
            document.getElementById('scoreDisplay').innerText = score;
            updateCounter();
            const slot = document.getElementById(`d${dartsInTurn.length}`);
            slot.innerText = "-"; slot.style.color = "#484f58";
        }

        function showEnd() {
            gameOver = true;
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            const win = score === 0;
            const fs = document.getElementById('final-score-display');
            const msg = document.getElementById('end-msg');
            const saveBtn = document.getElementById('btn-save-only');

            if (win) {
                document.getElementById('end-title-label').innerText = "RÉUSSI !";
                fs.innerText = initialScore; fs.style.color = "var(--s-color)";
                msg.innerText = `Fini en ${totalDartsUsed} fléchettes.`;
                // N'affiche le bouton que si ce n'est PAS un invité
                if(!isGuest) saveBtn.style.display = 'block';
            } else {
                document.getElementById('end-title-label').innerText = "ÉCHOUÉ";
                fs.innerText = initialScore - score; fs.style.color = "var(--t-color)";
                msg.innerText = `Il restait ${score} pts sur ${initialScore}.`;
                saveBtn.style.display = 'none';
            }
            displayTop3();
        }

        function handleJustSave() {
            if(isGuest) return; // Sécurité supplémentaire

            const finalDarts = totalDartsUsed;
            const moyenneMatch = parseFloat(((initialScore / finalDarts) * 3).toFixed(2));
            const topRef = firebase.database().ref(`users/${pseudo}/games/checkouts/top_moyennes`);
            
            topRef.once('value', (snapshot) => {
                let scores = snapshot.val() || [];
                scores.push({ 
                    date: new Date().toLocaleDateString('fr-FR'), 
                    moyenne: moyenneMatch, 
                    score_ferme: initialScore, 
                    darts: finalDarts 
                });
                scores.sort((a, b) => b.moyenne - a.moyenne);
                topRef.set(scores.slice(0, 3)).then(() => {
                    const sb = document.getElementById('btn-save-only');
                    sb.style.opacity = "0.5";
                    sb.innerText = "ENREGISTRÉ !";
                    sb.disabled = true;
                    displayTop3();
                });
            });
        }

        function displayTop3() {
            const listDiv = document.getElementById('top-list');
            if (isGuest) { 
                listDiv.innerHTML = "<div style='text-align:center; color:#555;'>Mode Invité</div>"; 
                return; 
            }
            firebase.database().ref(`users/${pseudo}/games/checkouts/top_moyennes`).once('value', (snapshot) => {
                const scores = snapshot.val() || [];
                if (scores.length === 0) { listDiv.innerHTML = "<div style='text-align:center; color:#555;'>Aucun record.</div>"; return; }
                let html = "";
                scores.forEach((s, i) => {
                    html += `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #222;">
                        <span>${i+1}. <b>${s.moyenne}</b> avg</span>
                        <span style="color:#8b949e;">${s.score_ferme} en ${s.darts} fl.</span>
                    </div>`;
                });
                listDiv.innerHTML = html;
            });
        }
    </script>
</body>
</html>
