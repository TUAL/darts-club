<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - 180 Challenge</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --bg-dark: #121916;
            --accent-orange: #f39c12; --accent-green: #2ecc71; --accent-red: #e74c3c;
            --mode-color: var(--accent);
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; 
            height: 91%; 
            min-height: 91%; 
            max-height: 91%;
            flex-shrink: 0;
            display: flex; flex-direction: column; 
            overflow: hidden; 
            position: fixed; width: 100%;
        }

        .top-bar { height: 50px; background: #1a1a1a; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; border-bottom: 1px solid #333; }
        .back-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .top-title { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; color: #ccc; }

        .score-section { 
            height: 32%; min-height: 32%; max-height: 32%;
            display: flex; flex-direction: column; 
            background: var(--bg-dark); padding: 10px 0;
            overflow: hidden; flex-shrink: 0;
        }

        .header-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 10px; flex: 1; }
        
        .p-column { 
            background: #1a1a1a; border: 3px solid #333; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 10px 5px; transition: 0.3s; color: #fff;
        }
        .p-column.active-reste { background: var(--accent-orange); border-color: #fff; opacity: 1; color: #000; }
        .p-column.active-jets  { background: var(--accent-green);  border-color: #fff; opacity: 1; color: #000; }
        .p-name { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; }
        .p-score { font-size: 3rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        .p-score-flech { font-size: 2rem; font-weight: 900; line-height: 0.70; margin: 5px 0; align-items: center; }
        .p-last-v { font-size: 0.65rem; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        .p-stats { font-size: 0.6rem; font-weight: 900; width: 90%; }
        .target-sub { font-size: 0.65rem; font-weight: 900; margin-top: 10px; text-transform: uppercase; opacity: 0.8; }

        .turn-announcer { height: 35px; display: flex; align-items: center; justify-content: center; color: var(--accent-orange); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }

        .input-info { 
            height: 60px !important; min-height: 60px !important; max-height: 60px !important;
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; padding: 0 15px; background: #000; flex-shrink: 0;
        }

        .dart-val { 
            width: 70px; height: 55px; background: white; color: black; 
            border-radius: 30px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem;
        }
        .dart-val small { font-size: 0.55rem; font-weight: bold; color: #555; }
        
        .btn-valid-darts { max-width: 80px; flex: 1; height: 55px; background: #222; border: none; color: #444; border-radius: 30px; font-weight: 900; font-size: 0.85rem; }
        .btn-valid-darts.ready { color: #fff; cursor: pointer; }

        /* --- BOUTON MODE --- */
        #mode-toggle-zone { display: flex; align-items: center; justify-content: center; min-width: 50px; height: 100%; }
        .btn-mode { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #333; background: #21262d; cursor: pointer; font-size: 1.3rem; }
        .btn-mode:active { background: #30363d; transform: scale(0.95); }

        /* --- CLAVIER --- */
        .keyboard { 
            background: #1a1a1a; display: flex; flex-direction: column; padding: 2px;
            border-top: 4px solid var(--mode-color); transition: border-color 0.2s;
            height: 49%; min-height: 49%; max-height: 49%;
            overflow: hidden; flex-shrink: 0;
        }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #333; }
        .btn-m { background: #1a1a1a; color: #888; padding: 15px; border: none; font-weight: 900; font-size: 0.9rem; }
        #m1.active { color: #fff; border-bottom: 4px solid var(--accent); }
        #m2.active { color: #fff; border-bottom: 4px solid var(--accent-orange); }
        #m3.active { color: #fff; border-bottom: 4px solid var(--accent-red); }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); flex: 1; gap: 1px; background: #333; }
        .key { background: #121916; border: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .key span { font-size: 1.4rem; font-weight: 900; }
        .key small { font-size: 0.75rem; color: #555; font-weight: 900; display: block; min-height: 1.2em; }
        .special-row { display: grid; grid-template-columns: 1fr 1.2fr 1.2fr 1.2fr; height: 70px; gap: 1px; background: #333; }
        .sp-key { background: #121916; color: white; border: none; font-weight: bold; font-size: 0.8rem; }

        /* --- MODE CIBLE SVG --- */
        #target-frame {
            display: none;
            height: 49%; min-height: 49%; max-height: 49%;
            background: #000;
            position: relative;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #dartboard-container {
            position: relative;
            width: min(45dvh, 90vw);
            height: min(45dvh, 90vw);
            max-width: 500px;
            max-height: 500px;
        }
		.btn-miss {
            position: absolute; bottom: 5px; right: 5px;
            width: 50px; height: 50px; background: #161b22;
            color: #fff; border: 1px solid #30363d; border-radius: 15px;
            font-weight: 900; z-index: 12;
        }
        .target-undo {
            position: absolute; bottom: 5px; left: 5px;
            width: 50px; height: 50px; background: #30363d;
            color: #fff; border: 1px solid #30363d; border-radius: 15px;
            font-size: 1.5rem; z-index: 12;
        }

        /* --- OVERLAY --- */
        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .final-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 260px; text-align: center; }
        .end-btn-container { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 260px; margin-top: 15px; }
        .end-btn { height: 50px; border-radius: 10px; font-size: 0.85rem; text-transform: uppercase; font-weight: 800; border: none; color: white; cursor: pointer; }
        .btn-save { background: var(--accent-green) !important; }
        .btn-valid { background: var(--accent) !important; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="back-icon" onclick="window.location.href='menu.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="top-title" id="title-label">🔥 180 !</div>
    </div>

    <div class="score-section">
        <div class="header-scores">
            <div class="p-column active-reste">
                <div class="p-name">RESTE</div>
                <div id="val-reste" class="p-score">180</div>
                <div id="last-label" class="p-last-v">---</div>
                <div class="p-stats">OBJ : 180</div>
            </div>
            <div class="p-column active-jets">
                <div class="p-name">JETS</div>
                <div id="val-jets" class="p-score-flech">0</div>
                <div class="target-sub">9 FLÉCHETTES MAX</div>
                <div id="target-info" class="p-stats">CIBLE : 180<br>MODE : LIBRE</div>
            </div>
            <div style="visibility: hidden;"></div>
        </div>
        <div class="turn-announcer" id="msg-txt">À TOI DE JOUER !</div>
    </div>
    
    <div class="input-info">
        <div id="mode-toggle-zone">
            <button class="btn-mode" id="btn-to-target" onclick="toggleInput('target')">🎯</button>
            <button class="btn-mode" id="btn-to-kb" onclick="toggleInput('kb')" style="display:none;">⌨️</button>
        </div>
        <div class="dart-val" id="v0">--<small>-</small></div>
        <div class="dart-val" id="v1">--<small>-</small></div>
        <div class="dart-val" id="v2">--<small>-</small></div>
        <button class="btn-valid-darts" id="btn-validate" onclick="finishTurn()" disabled>VALIDER</button>
    </div>

    <!-- MODE CIBLE -->
    <div id="target-frame">
        <button class="btn-miss" onclick="addDart(0)">MISS<br>0</button>
        <div id="dartboard-container"></div>
        <button class="target-undo" onclick="undo()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 4v7a4 4 0 0 1-4 4H4"/><path d="m9 10-5 5 5 5"/></svg></button>
    </div>

    <!-- CLAVIER -->
    <div class="keyboard" id="kb-frame">
        <div class="mod-row">
            <button class="btn-m active" id="m1" onclick="setMod(1)">SIMPLE</button>
            <button class="btn-m" id="m2" onclick="setMod(2)">DOUBLE</button>
            <button class="btn-m" id="m3" onclick="setMod(3)">TRIPLE</button>
        </div>
        <div id="pad" class="num-grid"></div>
        <div class="special-row">
            <button class="sp-key" onclick="undo()" style="font-size:1.5rem;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 4v7a4 4 0 0 1-4 4H4"/><path d="m9 10-5 5 5 5"/></svg></button>
            <button class="sp-key" onclick="addDart(0)">Out<br>0</button>
            <button class="sp-key" onclick="addDart(25)">25</button>
            <button class="sp-key" onclick="addDart(50)">BULL</button>
        </div>
    </div>

    <div id="end-screen" class="overlay">
        <div class="top-bar" style="width: 100%; position: absolute; top: 0; left: 0;">
            <div class="back-icon" onclick="window.location.href='menu.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
            <div class="top-title">🔥 180 !</div>
        </div>
        <div class="final-box">
            <h1 style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin: 0;">Résultat</h1>
            <div id="final-score-display" style="font-size: 3.5rem; font-weight: 900; margin: 5px 0; line-height: 1;">--</div>
            <p id="end-msg" style="font-size: 0.85rem; color: #fff; font-weight: bold; margin: 10px 0 0 0;"></p>
        </div>
        <div id="top-scores" style="margin: 15px 0; width: 100%; max-width: 260px; font-size: 0.75rem;">
            <div style="color: var(--accent-orange); font-weight: bold; text-align: center; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">🏆 Top 3 - Fléchettes</div>
            <div id="top-list" style="background: var(--card); border-radius: 10px; padding: 5px 10px; border: 1px solid #333;">...</div>
        </div>
        <div class="end-btn-container">
            <button id="btn-save-only" class="end-btn btn-save" style="display:none;" onclick="handleJustSave()">ENREGISTRER LE SCORE</button>
            <button class="end-btn btn-valid" onclick="location.reload()">RECOMMENCER</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
        authDomain: "dartsclub-1aab9.firebaseapp.com",
        databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dartsclub-1aab9",
        storageBucket: "dartsclub-1aab9.firebasestorage.app",
        messagingSenderId: "769714266505",
        appId: "1:769714266505:web:ea1758db2c96702979c158"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => { if (!user) await auth.signInAnonymously(); });

    const pseudo = (localStorage.getItem('darts_pseudo') || "INVITÉ").toUpperCase().trim();
    const isGuest = localStorage.getItem('is_guest') === 'true' || pseudo === "INVITÉ";

    let reste = 180, totalDarts = 0, dartsInTurn = [], visualDarts = [], multiplier = 1, gameOver = false;

    window.onload = () => {
        renderPad();
        buildSVGDartboard();
        updateUI();
    };

    // =============================================
    // TOGGLE CLAVIER / CIBLE
    // =============================================
    function toggleInput(mode) {
        const kb = document.getElementById('kb-frame');
        const target = document.getElementById('target-frame');
        if (mode === 'kb') {
            kb.style.display = 'flex';
            target.style.display = 'none';
            document.getElementById('btn-to-target').style.display = 'block';
            document.getElementById('btn-to-kb').style.display = 'none';
        } else {
            kb.style.display = 'none';
            target.style.display = 'flex';
            document.getElementById('btn-to-target').style.display = 'none';
            document.getElementById('btn-to-kb').style.display = 'block';
        }
    }

    // =============================================
    // SVG DARTBOARD
    // =============================================
    function buildSVGDartboard() {
        const dartOrder = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
        const cx = 160, cy = 160;
        const R_DOUBLE_OUT = 158, R_DOUBLE_IN = 125;
        const R_TRIPLE_OUT = 90,  R_TRIPLE_IN  = 50;
        const R_BULL_OUT   = 35,  R_BULL_IN    = 15;

        function polar(angleDeg, r) {
            const rad = (angleDeg - 90) * Math.PI / 180;
            return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
        }

        function arcPath(r1, r2, a1, a2) {
            const [x1o, y1o] = polar(a1, r2);
            const [x2o, y2o] = polar(a2, r2);
            const [x1i, y1i] = polar(a1, r1);
            const [x2i, y2i] = polar(a2, r1);
            const large = (a2 - a1) > 180 ? 1 : 0;
            return `M ${x1i.toFixed(3)} ${y1i.toFixed(3)} `
                 + `L ${x1o.toFixed(3)} ${y1o.toFixed(3)} `
                 + `A ${r2} ${r2} 0 ${large} 1 ${x2o.toFixed(3)} ${y2o.toFixed(3)} `
                 + `L ${x2i.toFixed(3)} ${y2i.toFixed(3)} `
                 + `A ${r1} ${r1} 0 ${large} 0 ${x1i.toFixed(3)} ${y1i.toFixed(3)} Z`;
        }

        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", "0 0 320 320");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", "100%");
        svg.style.display = "block";

        const bg = document.createElementNS(ns, "circle");
        bg.setAttribute("cx", cx); bg.setAttribute("cy", cy); bg.setAttribute("r", "160");
        bg.setAttribute("fill", "#111");
        svg.appendChild(bg);

        const segAngle = 18.0, half = 9.0;

        // Zones visuelles
        dartOrder.forEach((val, i) => {
            const centerA = i * segAngle;
            const a1 = centerA - half, a2 = centerA + half;
            const isEven = i % 2 === 0;
            const colSimple = isEven ? "#1a1a1a" : "#FFFFCC";
            const colRing   = isEven ? "#267F00" : "#BB0000";

            [
                { r1: R_TRIPLE_OUT + 1, r2: R_DOUBLE_IN - 1, color: colSimple },
                { r1: R_BULL_OUT + 1,   r2: R_TRIPLE_IN - 1, color: colSimple },
                { r1: R_TRIPLE_IN,      r2: R_TRIPLE_OUT,     color: colRing },
                { r1: R_DOUBLE_IN,      r2: R_DOUBLE_OUT,     color: colRing },
            ].forEach(z => {
                const p = document.createElementNS(ns, "path");
                p.setAttribute("d", arcPath(z.r1, z.r2, a1, a2));
                p.setAttribute("fill", z.color);
                svg.appendChild(p);
            });

            const [lx, ly] = polar(centerA, R_DOUBLE_IN + 16);
            const txt = document.createElementNS(ns, "text");
            txt.setAttribute("x", lx.toFixed(1));
            txt.setAttribute("y", ly.toFixed(1));
            txt.setAttribute("text-anchor", "middle");
            txt.setAttribute("dominant-baseline", "middle");
            txt.setAttribute("font-size", "18");
            txt.setAttribute("font-weight", "900");
            txt.setAttribute("fill", "white");
            txt.style.pointerEvents = "none";
            txt.textContent = val;
            svg.appendChild(txt);
        });

        [{ r: R_BULL_OUT, fill: "#267F00" }, { r: R_BULL_IN, fill: "#BB0000" }].forEach(b => {
            const c = document.createElementNS(ns, "circle");
            c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", b.r);
            c.setAttribute("fill", b.fill);
            svg.appendChild(c);
        });

        const border = document.createElementNS(ns, "circle");
        border.setAttribute("cx", cx); border.setAttribute("cy", cy); border.setAttribute("r", "159");
        border.setAttribute("fill", "none"); border.setAttribute("stroke", "#555"); border.setAttribute("stroke-width", "2");
        svg.appendChild(border);

        // Zones de clic
        dartOrder.forEach((val, i) => {
            const centerA = i * segAngle;
            const a1 = centerA - half, a2 = centerA + half;
            const isEven = i % 2 === 0;

            [
                { r1: R_TRIPLE_OUT + 1, r2: R_DOUBLE_IN - 1, m: 1 },
                { r1: R_BULL_OUT + 1,   r2: R_TRIPLE_IN - 1, m: 1 },
                { r1: R_TRIPLE_IN,      r2: R_TRIPLE_OUT,     m: 3 },
                { r1: R_DOUBLE_IN,      r2: R_DOUBLE_OUT,     m: 2 },
            ].forEach(z => {
                const p = document.createElementNS(ns, "path");
                p.setAttribute("d", arcPath(z.r1, z.r2, a1, a2));
                p.setAttribute("fill", "transparent");
                p.style.cursor = "pointer";
p.addEventListener("click", () => {
    const isEvenZone = p.getAttribute("data-even") === "1";
    const flashColor = (!isEvenZone && z.m === 1) ? "rgba(243,156,18,0.8)" : "rgba(243,156,18,0.8)";
    p.setAttribute("fill", flashColor);
    setTimeout(() => p.setAttribute("fill", "transparent"), 150);
    multiplier = z.m;
    addDart(val);
});
                svg.appendChild(p);
            });
        });

        [{ r: R_BULL_OUT, val: 25 }, { r: R_BULL_IN, val: 50 }].forEach(b => {
            const c = document.createElementNS(ns, "circle");
            c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", b.r);
            c.setAttribute("fill", "transparent");
            c.style.cursor = "pointer";
            c.addEventListener("click", (e) => {
                e.stopPropagation();
                c.setAttribute("fill", "rgba(243,156,18,0.8)");
                setTimeout(() => c.setAttribute("fill", "transparent"), 150);
                addDart(b.val);
            });
            svg.appendChild(c);
        });

        document.getElementById('dartboard-container').appendChild(svg);
    }

    // =============================================
    // CLAVIER
    // =============================================
    function renderPad() {
        const pad = document.getElementById('pad');
        pad.innerHTML = "";
        for(let i=1; i<=20; i++) {
            let sub = (multiplier > 1) ? (i * multiplier) : "&nbsp;"; 
            pad.innerHTML += `<button class="key" onclick="addDart(${i})"><span>${i}</span><small>${sub}</small></button>`;
        }
    }

    function setMod(m) {
        if(gameOver) return;
        multiplier = m;
        document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('active'));
        document.getElementById('m'+m).classList.add('active');
        document.documentElement.style.setProperty('--mode-color', m===1 ? 'var(--accent)' : m===2 ? 'var(--accent-orange)' : 'var(--accent-red)');
        renderPad();
    }

    // =============================================
    // LOGIQUE DE JEU
    // =============================================
    function addDart(val) {
        if (dartsInTurn.length >= 3 || (totalDarts + dartsInTurn.length) >= 9 || reste <= 0 || gameOver) return;
        
        let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
        let pts = (val === 50) ? 50 : val * m;

        if (reste - pts < 0) { pts = reste; reste = 0; }
        else { reste -= pts; }

        let label = (val === 50) ? "BULL" : (val === 25) ? "B25" : (val === 0) ? "Out" : (m === 3 ? "T" : m === 2 ? "D" : "S") + val;
        visualDarts.push(label); 
        dartsInTurn.push(pts);

        setMod(1); 
        updateUI();
    }

    function updateUI() {
        document.getElementById('val-reste').innerText = reste;
        document.getElementById('val-jets').innerText = (totalDarts + dartsInTurn.length) + "/9";
        
        for(let i=0; i<3; i++) {
            document.getElementById('v'+i).innerHTML = visualDarts[i] ? `${dartsInTurn[i]}<small>${visualDarts[i]}</small>` : `--<small>-</small>`;
        }
        
        const btn = document.getElementById('btn-validate');
        const isEndCondition = (reste === 0 || (totalDarts + dartsInTurn.length === 9));
        const canValidate = (dartsInTurn.length === 3 || isEndCondition);
        
        btn.disabled = !canValidate;
        if(!btn.disabled) { 
            btn.classList.add('ready'); 
            btn.style.background = "var(--accent-orange)"; 
            btn.style.color = "#000";
        } else { 
            btn.classList.remove('ready'); 
            btn.style.background = "#222"; 
            btn.style.color = "#444";
        }
        btn.innerText = "VALIDER";
    }

    function finishTurn() {
        if (gameOver) return;
        totalDarts += dartsInTurn.length;
        document.getElementById('last-label').innerText = visualDarts.join(' | ');

        if (reste === 0 || totalDarts >= 9) { 
            showEnd(); 
        } else {
            dartsInTurn = []; visualDarts = [];
            updateUI();
        }
    }

    function undo() {
        if (dartsInTurn.length === 0 || gameOver) return;
        reste += dartsInTurn.pop();
        visualDarts.pop();
        updateUI();
    }

    function showEnd() {
        gameOver = true;
        document.getElementById('end-screen').style.display = 'flex';
        const win = (reste === 0);
        const fs = document.getElementById('final-score-display');
        fs.innerText = win ? totalDarts : (180 - reste);
        fs.style.color = win ? "var(--accent-green)" : "var(--accent-red)";
        document.getElementById('end-msg').innerText = win ? `RÉUSSI EN ${totalDarts} FLÉCHETTES !` : `ÉCHEC : ${180 - reste} pts marqués.`;
        if(win && !isGuest) { document.getElementById('btn-save-only').style.display = 'block'; }
        displayTop3();
    }

    async function handleJustSave() {
        if(isGuest) return;
        const btn = document.getElementById('btn-save-only');
        try {
            btn.disabled = true; btn.innerText = "ARCHIVAGE...";
            const ref = db.ref(`users/${pseudo}/games/darts_180/top`);
            const snap = await ref.once('value');
            let scores = snap.exists() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())) : [];
            scores.push({ date: new Date().toLocaleDateString('fr-FR'), score: totalDarts });
            scores.sort((a, b) => a.score - b.score);
            await ref.set(scores.slice(0, 3));
            btn.innerText = "✅ RECORD ARCHIVÉ";
            displayTop3();
        } catch (e) { btn.disabled = false; btn.innerText = "ERREUR"; }
    }

    function displayTop3() {
        const listDiv = document.getElementById('top-list');
        if (isGuest) { listDiv.innerHTML = "Mode Invité"; return; }
        db.ref(`users/${pseudo}/games/darts_180/top`).once('value', (snapshot) => {
            const scores = snapshot.val() || [];
            let html = "";
            const scoreArray = Array.isArray(scores) ? scores : Object.values(scores);
            if(scoreArray.length === 0) {
                html = "Aucun record.";
            } else {
                scoreArray.sort((a,b) => a.score - b.score).forEach((s, i) => {
                    html += `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:${i === scoreArray.length - 1 ? 'none' : '1px solid #222'};">
                        <span>${i+1}. <b style="color:var(--accent-green)">${s.score}</b> <small>fl.</small></span>
                        <span style="color:#8b949e;">${s.date}</span>
                    </div>`;
                });
            }
            listDiv.innerHTML = html;
        });
    }
</script>
</body>
</html>
