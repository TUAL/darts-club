<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - 180 Challenge</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; 
        }

        .app-brand { height: 35px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
        .app-title { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; color: var(--d-color); text-transform: uppercase; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 10px 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
            text-align: center; z-index: 100; border-top: 1px solid #161b22;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; padding: 5px 15px; border: 1px solid #333; border-radius: 20px; }

        #game-screen { display: flex; height: 100dvh; flex-direction: column; padding: 10px; padding-bottom: 70px; gap: 4px; }
        
        .header { height: 10dvh; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
        .p-card { background: var(--card); border-radius: 10px; border: 1px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .p-name { font-size: 0.6rem; color: #8b949e; text-transform: uppercase; }
        .score-val { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }

        .ia-last-volley { height: 18px; text-align: center; font-size: 0.65rem; color: var(--d-color); font-weight: bold; flex-shrink: 0; }
        .turn-tracking { display: flex; justify-content: center; gap: 6px; height: 35px; flex-shrink: 0; }
        .dart-slot { width: 30%; background: #010409; border: 1px solid #30363d; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #484f58; }

        /* Ajustement taille boutons */
        .grid { flex: 1; display: flex; flex-direction: column; gap: 3px; min-height: 0; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; flex: 0.8; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); gap: 3px; flex: 4; } 
        .special-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; flex: 0.8; }
        .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 3px; flex: 1; }

        button { border: none; border-radius: 6px; font-weight: 700; color: #fff; cursor: pointer; height: 100%; width: 100%; font-size: 0.9rem; }
        .btn-mod { background: #21262d; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }

        .num-btn { background: #21262d; border-bottom: 2px solid transparent; }
        .grid.mode-s .num-btn { border-bottom-color: var(--s-color); }
        .grid.mode-d .num-btn { border-bottom-color: var(--d-color); }
        .grid.mode-t .num-btn { border-bottom-color: var(--t-color); }

        .btn-valid { background: var(--accent) !important; font-size: 0.8rem; text-transform: uppercase; }
        .btn-save { background: var(--s-color) !important; font-size: 0.8rem; text-transform: uppercase; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.2rem; }
        .btn-undo-all { background: #161b22; color: #8b949e; font-size: 0.65rem; border: 1px solid #30363d; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .final-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 260px; text-align: center; }
        
        #top-scores { margin: 10px 0; width: 100%; max-width: 260px; text-align: left; font-size: 0.7rem; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid #333; }
        
        /* Boutons fin de jeu plus compacts */
        .end-btn-container { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 260px; }
        .end-btn { padding: 12px; border-radius: 10px; font-size: 0.8rem; text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div class="app-brand">
            <span class="app-logo">🎯</span>
            <span class="app-title" id="title-label">180 Challenge</span>
        </div>

        <div class="header">
            <div class="p-card">
                <div class="p-name">RESTE</div>
                <div class="score-val" id="scoreDisplay">180</div>
            </div>
            <div class="p-card">
                <div class="p-name">JETS</div>
                <div class="score-val" id="dartCountDisplay" style="font-size: 1.6rem;">0/9</div>
            </div>
        </div>

        <div class="ia-last-volley" id="historyText">180 EN 9 JETS MAX</div>    
        
        <div class="turn-tracking">
            <div class="dart-slot" id="d0">-</div>
            <div class="dart-slot" id="d1">-</div>
            <div class="dart-slot" id="d2">-</div>
        </div>

        <div class="grid mode-s" id="gameGrid">
            <div class="mod-row">
                <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
                <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
                <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
            </div>
            <div id="numPad" class="num-grid"></div>
            <div class="special-row">
                <button class="num-btn" onclick="addDart(0)">0</button>
                <button class="num-btn" onclick="addDart(25)">25</button>
                <button class="num-btn" onclick="addDart(50)">BULL</button>
            </div>
            <div class="action-row">
                <button class="btn-undo-all" onclick="location.reload()">NEW</button>
                <button class="btn-valid" onclick="finishTurn()">VALIDER</button>
                <button class="btn-del" onclick="undoLastDart()">⌫</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="menu.html" class="back-btn">⬅ Menu Principal</a>
    </footer>

    <div id="end-screen" class="overlay">
        <div class="final-box">
            <h1 id="end-title-label" style="font-size: 0.7rem; color: #8b949e; letter-spacing: 2px; margin: 0; text-transform: uppercase;">Résultat</h1>
            <div id="final-score-display" style="font-size: 3.5rem; font-weight: 900; line-height: 1; margin: 5px 0;">180</div>
            <p id="end-msg" style="font-size: 0.8rem; color: #fff; font-weight: bold; margin-bottom: 5px;"></p>
        </div>

        <div id="top-scores">
            <div style="color: var(--accent); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; text-align: center;">🏆 Top 3 Records</div>
            <div id="top-list">...</div>
        </div>

        <div class="end-btn-container">
            <button id="btn-save-only" class="end-btn btn-save" style="display:none;" onclick="handleJustSave()">ENREGISTRER LE SCORE</button>
            <button class="end-btn btn-valid" onclick="location.reload()">RECOMMENCER</button>
            <a href="menu.html" style="color: #555; text-decoration: none; font-size: 0.75rem; text-align: center; margin-top: 5px;">RETOUR AU MENU</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8AIw0f3L65XMZM9OBX8wDWNbSvl4ACZM",
            authDomain: "dartsclub-1aab9.firebaseapp.com",
            databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dartsclub-1aab9",
            storageBucket: "dartsclub-1aab9.firebasestorage.app",
            messagingSenderId: "769714266505",
            appId: "1:769714266505:web:ea1758db2c96702979c158"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const pseudo = localStorage.getItem('darts_pseudo') || "ANONYME";
        const isGuest = localStorage.getItem('is_guest') === 'true';

        let score = 180, totalDartsUsed = 0, multiplier = 1, dartsInTurn = [], gameOver = false;

        window.onload = () => {
            document.getElementById('title-label').innerText = "180 - " + pseudo;
            const pad = document.getElementById('numPad'); 
            pad.innerHTML = "";
            for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
            updateCounter();
        };

        function setMod(m) {
            if(gameOver) return;
            multiplier = m;
            document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
            document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
            document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
        }

        function updateCounter() {
            document.getElementById('dartCountDisplay').innerText = `${totalDartsUsed + dartsInTurn.length}/9`;
        }

        function addDart(val) {
            if (gameOver || dartsInTurn.length >= 3 || (totalDartsUsed + dartsInTurn.length) >= 9) return;
            let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
            let pts = (val === 50) ? 50 : val * m;
            score -= pts;
            document.getElementById('scoreDisplay').innerText = Math.max(0, score);
            const slot = document.getElementById(`d${dartsInTurn.length}`);
            slot.innerText = (val === 50) ? "BULL" : (val === 0) ? "0" : (m === 3 ? "T" : m === 2 ? "D" : "") + val;
            slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
            dartsInTurn.push(pts);
            updateCounter();
            setMod(1);
            if (score <= 0) {
                gameOver = true;
                setTimeout(showEnd, 600);
            } else if (totalDartsUsed + dartsInTurn.length >= 9) {
                setTimeout(() => { if(!gameOver) finishTurn(); }, 600);
            }
        }

        function finishTurn() {
            if (gameOver) return;
            totalDartsUsed += dartsInTurn.length;
            if (totalDartsUsed >= 9 && score > 0) { showEnd(); return; }
            dartsInTurn = [];
            updateCounter();
            for(let i=0; i<3; i++) {
                document.getElementById(`d${i}`).innerText = "-";
                document.getElementById(`d${i}`).style.color = "#484f58";
            }
        }

        function undoLastDart() {
            if (gameOver || dartsInTurn.length === 0) return;
            score += dartsInTurn.pop();
            document.getElementById('scoreDisplay').innerText = score;
            updateCounter();
            const slot = document.getElementById(`d${dartsInTurn.length}`);
            slot.innerText = "-"; slot.style.color = "#484f58";
        }

        function showEnd() {
            gameOver = true;
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            const win = score <= 0;
            const fs = document.getElementById('final-score-display');
            const msg = document.getElementById('end-msg');
            const saveBtn = document.getElementById('btn-save-only');

            if (win) {
                document.getElementById('end-title-label').innerText = "RÉUSSI !";
                fs.innerText = "180"; fs.style.color = "var(--s-color)";
                msg.innerText = `${totalDartsUsed + dartsInTurn.length} fléchettes.`;
                if(!isGuest) saveBtn.style.display = 'block';
            } else {
                document.getElementById('end-title-label').innerText = "ÉCHOUÉ";
                fs.innerText = 180 - score; fs.style.color = "var(--t-color)";
                msg.innerText = `Il manquait ${score} pts.`;
                saveBtn.style.display = 'none';
            }
            displayTop3();
        }

        function handleJustSave() {
            const finalDarts = totalDartsUsed + dartsInTurn.length;
            const topRef = firebase.database().ref(`users/${pseudo}/games/darts_180/top`);
            topRef.once('value', (snapshot) => {
                let scores = snapshot.val() || [];
                scores.push({ date: new Date().toLocaleDateString('fr-FR'), score: finalDarts });
                scores.sort((a, b) => a.score - b.score);
                topRef.set(scores.slice(0, 3)).then(() => {
                    document.getElementById('btn-save-only').style.opacity = "0.5";
                    document.getElementById('btn-save-only').innerText = "ENREGISTRÉ !";
                    document.getElementById('btn-save-only').disabled = true;
                    displayTop3();
                });
            });
        }

        function displayTop3() {
            const listDiv = document.getElementById('top-list');
            if (isGuest) { listDiv.innerText = "Mode Invité"; return; }
            firebase.database().ref(`users/${pseudo}/games/darts_180/top`).once('value', (snapshot) => {
                const scores = snapshot.val() || [];
                if (scores.length === 0) { listDiv.innerText = "Aucun record."; return; }
                let html = "";
                scores.forEach((s, i) => {
                    html += `<div style="display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #222;">
                        <span>${i+1}. ${s.date}</span>
                        <span style="color:#fff; font-weight:bold;">${s.score} fl.</span>
                    </div>`;
                });
                listDiv.innerHTML = html;
            });
        }
    </script>
</body>
</html>
