<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Local Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --bg-dark: #121916;
            --accent-orange: #f39c12; --accent-green: #2ecc71; --accent-red: #e74c3c;
            --mode-color: var(--accent);
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; 
            position: fixed; width: 100%;
        }

        /* --- SETUP (Interface 1) --- */
        #setup-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:20px; }
        .setup-box { width: 100%; max-width: 320px; text-align: center; }
        .player-input-group { background: var(--card); padding: 8px; border-radius: 12px; border: 1px solid #30363d; display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 1rem; outline: none; }
        .btn-add { background: #238636; color: #fff; border: none; width: 45px; border-radius: 8px; font-weight: 900; }
        .player-tag { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--accent); font-weight: bold; }
        .btn-start { background: var(--accent); color: #fff; padding: 15px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; }
        .suggest-p { background: #21262d; border: 1px dashed var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8rem; cursor: pointer; display: none; }

        /* --- JEU (Interface 2) --- */
		
        #game-screen { display: none; height: 90dvh; flex-direction: column; background: #000; }

        .top-bar { height: 50px; background: #1a1a1a; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; border-bottom: 1px solid #333; }
        .back-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .top-title { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; color: #ccc; }

        .score-section { height: 45dvh; display: flex; flex-direction: column; background: var(--bg-dark); padding: 10px 0; }


        .header-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 10px; flex: 1; }
        
        .p-column { 
            background: #1a1a1a; border: 3px solid #333; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 10px 5px; opacity: 0.4; transition: 0.3s; color: #fff;
        }
        .p-column.active-0 { background: var(--accent-orange); border-color: #fff; opacity: 1; color: #000; }
        .p-column.active-1 { background: var(--accent-green); border-color: #fff; opacity: 1; color: #000; }
        .p-column.active-2 { background: var(--accent-red); border-color: #fff; opacity: 1; color: #000; }
        
.p-name { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; }
.p-score { font-size: 4rem; font-weight: 900; line-height: 0.70; margin: 5px 0; }
.p-last-v { font-size: 0.65rem; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
.p-stats { font-size: 0.65rem; font-weight: 900; width: 90%; }
		
        .turn-announcer { height: 35px; display: flex; align-items: center; justify-content: center; color: var(--accent-orange); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }

        .input-info { height: 75px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 15px; background: #000; }


        .dart-val { 
            width: 70px; height: 55px; background: white; color: black; 
            border-radius: 30px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem;
        }
        .dart-val small {font-size: 0.55rem; font-weight: bold; color: #555; }
        
        .btn-valid-darts {flex: 1; height: 55px; background: #222; border: none; color: #444; border-radius: 30px; font-weight: 900; font-size: 0.85rem; }
        .btn-valid-darts.ready { color: #fff; cursor: pointer; }

        .keyboard { 
            height: 55dvh; background: #1a1a1a; display: flex; flex-direction: column; padding: 2px;
            border-top: 4px solid var(--mode-color); transition: border-color 0.2s;
        }

        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #333; }
        .btn-m { background: #1a1a1a; color: #888; padding: 15px; border: none; font-weight: 900; font-size: 0.9rem; }
        
        #m1.active { color: #fff; border-bottom: 4px solid var(--accent); }
        #m2.active { color: #fff; border-bottom: 4px solid var(--accent-orange); }
        #m3.active { color: #fff; border-bottom: 4px solid var(--accent-red); }

        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); flex: 1; gap: 1px; background: #333; }
        .key { background: #121916; border: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .key span { font-size: 1.4rem; font-weight: 900; }
        .key small { font-size: 0.75rem; color: #555; font-weight: 900; display: block; min-height: 1.2em; } 

        .special-row { display: grid; grid-template-columns: 1fr 1.2fr 1.2fr 1.2fr; height: 70px; gap: 1px; background: #333; }
        .sp-key { background: #121916; color: white; border: none; font-weight: bold; font-size: 0.8rem; }

        /* --- OVERLAY VICTOIRE --- */
        .overlay { 
            display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); 
            z-index:999; flex-direction:column; justify-content: center; align-items:center; padding: 20px; 
        }
        .final-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 300px; text-align: center; }
        .btn-save { background: var(--accent) !important; font-size: 0.85rem; font-weight: 800; border-radius: 10px; height: 50px; width: 100%; margin: 10px 0; color: white; border:none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="back-icon" onclick="if(confirm('Quitter la partie ?')) window.location.href='menu.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <div class="top-title">🏠 501 - DARTS LOCAL</div>
    </div>
    
    <div id="setup-screen">
        <div class="setup-box">
            <div id="suggest-box" class="suggest-p" onclick="addSuggestedPlayer()">AJOUTER : <b id="suggest-name"></b> ?</div>
            <div class="player-input-group">
                <input type="text" id="pName" placeholder="NOM DU JOUEUR..." autocomplete="off">
                <button class="btn-add" id="btnAdd" onclick="addPlayerToGame()">+</button>
            </div>
            <div id="pList"></div>
            <button class="btn-start" id="startBtn" onclick="startGame()" style="display: none;">COMMENCER LA PARTIE</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="score-section">
            <div class="header-scores" id="gamePlayers"></div>
            <div class="turn-announcer" id="turn-txt">...</div>
        </div>
        
        <div class="input-info">
            <div class="dart-val" id="v0">--<small>-</small></div>
            <div class="dart-val" id="v1">--<small>-</small></div>
            <div class="dart-val" id="v2">--<small>-</small></div>
            <button class="btn-valid-darts" id="btn-validate" onclick="finishTurn()" disabled>VALIDER</button>
        </div>

        <div class="keyboard" id="kb-frame">
            <div class="mod-row">
                <button class="btn-m active" id="m1" onclick="setMod(1)">SIMPLE</button>
                <button class="btn-m" id="m2" onclick="setMod(2)">DOUBLE</button>
                <button class="btn-m" id="m3" onclick="setMod(3)">TRIPLE</button>
            </div>
            <div id="pad" class="num-grid"></div>
            <div class="special-row">
                <button class="sp-key" onclick="undoLastDart()" style="font-size:1.5rem;">↩</button>
                <button class="sp-key" onclick="addDart(0)">Out<br>0</button>
                <button class="sp-key" onclick="addDart(25)">25</button>
                <button class="sp-key" onclick="addDart(50)">BULL</button>
            </div>
        </div>
    </div>

<div id="end-screen" class="overlay">
	<div class="top-bar" style="width: 100%; position: absolute; top: 0; left: 0;">
		<div class="back-icon" onclick="window.location.href='menu.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
			<div class="top-title">🏠 501 - DARTS LOCAL</div>
	</div>
    <div class="final-box">
        <h1 style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase;">MATCH TERMINÉ</h1>
        <p id="winner-display" style="font-size: 1.8rem; font-weight: 900; margin: 10px 0; color:var(--accent-green);"></p>
        <div id="local-stats-list" style="background: #0b1410; border-radius: 8px; padding: 10px; border: 1px solid #30363d; text-align: left; font-size: 0.75rem;"></div>
        <button id="btn-save-only" class="btn-save" style="display:none;" onclick="saveGameData()">ENREGISTRER LA VICTOIRE</button>
        <button class="btn-save" style="background:#30363d !important;" onclick="location.reload()">REJOUER</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
        authDomain: "dartsclub-1aab9.firebaseapp.com",
        databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dartsclub-1aab9",
        storageBucket: "dartsclub-1aab9.firebasestorage.app",
        messagingSenderId: "769714266505",
        appId: "1:769714266505:web:ea1758db2c96702979c158"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Connexion automatique pour autoriser la lecture Firebase
    auth.onAuthStateChanged(async (user) => { if (!user) await auth.signInAnonymously(); });

    const currentPseudo = (localStorage.getItem('darts_pseudo') || "").toUpperCase();
    let players = [], currentPlayer = 0, dartsInTurn = [], visualDarts = [], multiplier = 1, isBust = false;
    let scoreAtStartOfTurn = 501;
    let retoursRestants = 0;

    window.onload = () => {
        if(currentPseudo && currentPseudo !== "INVITÉ") {
            document.getElementById('suggest-box').style.display = 'block';
            document.getElementById('suggest-name').innerText = currentPseudo;
        }
        renderPad();
    };

    function addSuggestedPlayer() { addPlayerToGame(currentPseudo); document.getElementById('suggest-box').style.display = 'none'; }

	async function addPlayerToGame(forcedName = null) {
        const input = document.getElementById('pName');
        const btnAdd = document.getElementById('btnAdd');
        const name = (forcedName || input.value).trim().toUpperCase();
        
        if(!name || players.length >= 3) return;
        if(players.some(p => p.name === name)) return;

        btnAdd.disabled = true; btnAdd.innerText = "...";

        try {
            const userSnap = await db.ref(`users/${name}`).once('value');
            let isVerified = false;
            let canAdd = true;

            if (userSnap.exists()) {
                // SI C'EST LE JOUEUR CONNECTÉ : On valide sans demander le PIN
                if (name === currentPseudo) {
                    isVerified = true;
                } else {
                    // SINON : On demande le PIN normalement
                    const pin = prompt(`Profil "${name}" détecté.\nEntrez le code PIN :`);
                    if (pin === String(userSnap.val().pin)) {
                        isVerified = true;
                    } else {
                        alert("PIN incorrect.");
                        canAdd = false;
                    }
                }
            }

            if (canAdd) {
                players.push({ 
                    name: name, score: 501, totalDarts: 0, lastV: "---",
                    isVerified: isVerified,
                    scoreAvantTour: 501, derniersPoints: [], derniersVisuels: [] 
                });
                input.value = "";
                renderSetup();
            }
        } catch(e) {
            players.push({ name, score: 501, totalDarts: 0, lastV: "---", isVerified: false });
            renderSetup();
        } finally {
            btnAdd.disabled = false; btnAdd.innerText = "+";
        }
    }

    function renderSetup() {
        document.getElementById('pList').innerHTML = players.map((p, i) => `
            <div class="player-tag">
                <span>${p.name} ${p.isVerified ? '✅' : ''}</span>
                <span onclick="players.splice(${i},1);renderSetup()" style="color:var(--accent-red); cursor:pointer">✕</span>
            </div>`).join('');
        document.getElementById('startBtn').style.display = players.length > 0 ? 'block' : 'none';
    }

    function startGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        scoreAtStartOfTurn = 501;
        retoursRestants = players.length;
        syncUI();
    }

    function renderPad() {
        const pad = document.getElementById('pad');
        pad.innerHTML = "";
        for(let i=1; i<=20; i++) {
            let sub = (multiplier > 1) ? (i * multiplier) : "&nbsp;"; 
            pad.innerHTML += `<button class="key" onclick="addDart(${i})"><span>${i}</span><small>${sub}</small></button>`;
        }
    }

    function setMod(m) {
        multiplier = m;
        document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('active'));
        document.getElementById('m'+m).classList.add('active');
        const colors = ["", "var(--accent)", "var(--accent-orange)", "var(--accent-red)"];
        document.documentElement.style.setProperty('--mode-color', colors[m]);
        renderPad();
    }

    function addDart(val) {
        if (dartsInTurn.length >= 3 || isBust) return;
        let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
        let pts = val * m;
        let p = players[currentPlayer];

        if (p.score - pts < 0 || p.score - pts === 1 || (p.score - pts === 0 && m !== 2 && val !== 50)) {
            isBust = true;
            p.score = scoreAtStartOfTurn;
            visualDarts.push("BUST");
            dartsInTurn.push(0);
        } else {
            p.score -= pts;
            let label = (val === 50) ? "BULL" : (val === 25) ? "B25" : (val === 0) ? "Out" : (m === 3 ? "T" : m === 2 ? "D" : "S") + val;
            visualDarts.push(label);
            dartsInTurn.push(pts);
        }
        setMod(1);
        updateVisuals();
        syncUI();
    }

    function updateVisuals() {
        const btn = document.getElementById('btn-validate');
        const colors = ["var(--accent-orange)", "var(--accent-green)", "var(--accent-red)"];
        for(let i=0; i<3; i++) {
            const el = document.getElementById('v'+i);
            el.innerHTML = visualDarts[i] ? `${dartsInTurn[i]}<small>${visualDarts[i]}</small>` : `--<small>-</small>`;
        }
        if(dartsInTurn.length === 3 || isBust || players[currentPlayer].score === 0) {
            btn.classList.add('ready');
            btn.style.background = colors[currentPlayer] || "#238636";
            btn.style.color = "#000";
            btn.disabled = false;
        } else {
            btn.classList.remove('ready');
            btn.style.background = "#222";
            btn.style.color = "#444";
            btn.disabled = true;
        }
    }

    function finishTurn() {
        let p = players[currentPlayer];
        p.scoreAvantTour = scoreAtStartOfTurn;
        p.derniersPoints = [...dartsInTurn];
        p.derniersVisuels = [...visualDarts];
        p.totalDarts += dartsInTurn.length;
        p.lastV = isBust ? "BUST" : visualDarts.join(' | ');

        if(p.score === 0) { showVictory(p); return; }

        currentPlayer = (currentPlayer + 1) % players.length;
        scoreAtStartOfTurn = players[currentPlayer].score;
        retoursRestants = players.length;
        dartsInTurn = []; visualDarts = []; isBust = false;
        updateVisuals();
        syncUI();
    }

    function undoLastDart() {
        if (dartsInTurn.length > 0) {
            let p = players[currentPlayer];
            let lastPts = dartsInTurn.pop();
            visualDarts.pop();
            if (isBust) {
                isBust = false;
                let reset = scoreAtStartOfTurn;
                dartsInTurn.forEach(v => reset -= v);
                p.score = reset;
            } else { p.score += lastPts; }
        } else if (retoursRestants > 0) {
            retoursRestants--;
            currentPlayer = (currentPlayer - 1 + players.length) % players.length;
            let p = players[currentPlayer];
            scoreAtStartOfTurn = p.scoreAvantTour;
            dartsInTurn = [...p.derniersPoints];
            visualDarts = [...p.derniersVisuels];
            p.score = p.scoreAvantTour;
            p.totalDarts -= dartsInTurn.length;
            isBust = visualDarts.includes("BUST");
            if (!isBust) { dartsInTurn.forEach(pts => p.score -= pts); }
        }
        updateVisuals();
        syncUI();
    }

    function syncUI() {
        const container = document.getElementById('gamePlayers');
        container.innerHTML = players.map((p, i) => {
            let nbFlechesTotal = p.totalDarts + (i === currentPlayer ? dartsInTurn.length : 0);
            let avg = nbFlechesTotal > 0 ? (((501 - p.score) / nbFlechesTotal) * 3).toFixed(1) : "0.0";
            return `<div class="p-column ${i === currentPlayer ? 'active-'+i : ''}">
                <div class="p-name">${p.name}</div>
                <div class="p-score">${p.score}</div>
                <div class="p-last-v">${p.lastV}</div>
                <div class="p-stats">MOY : ${avg}<br>${nbFlechesTotal} FLÉCHETTES</div>
            </div>`;
        }).join('');
        document.getElementById('turn-txt').innerText = `À TOI ${players[currentPlayer].name} !`;
    }

    async function showVictory(p) {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('winner-display').innerText = p.name + " GAGNE !";
        const btnSave = document.getElementById('btn-save-only');
        btnSave.style.display = p.isVerified ? 'block' : 'none';

        document.getElementById('local-stats-list').innerHTML = players.map(player => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; color:${player === p ? '#2ecc71':'#fff'}">
                <span>${player.name}</span><span><b>${player.totalDarts > 0 ? (501 / player.totalDarts * 3).toFixed(1) : "0"}</b> AVG (${player.totalDarts} fl.)</span>
            </div>`).join('');
    }

    async function saveGameData() {
        const btn = document.getElementById('btn-save-only');
        const winner = players.find(p => p.score === 0);
        if(!winner || !winner.isVerified) return;
        btn.innerText = "PATIENTEZ...";
        
        try {
            const avg = parseFloat((501 / winner.totalDarts * 3).toFixed(2));
            const ref = db.ref(`users/${winner.name}/games/local_501`);
            const snap = await ref.child('top').once('value');
            let top = snap.val() || [];
            top.push({ avg: avg, darts: winner.totalDarts, date: new Date().toLocaleDateString('fr-FR') });
            top.sort((a, b) => b.avg - a.avg);
            await ref.child('top').set(top.slice(0, 3));
            await ref.child('stats/wins').transaction(c => (c || 0) + 1);
            btn.innerText = "✅ ARCHIVÉ"; btn.disabled = true;
        } catch(e) { btn.innerText = "ERREUR"; }
    }
</script>
</body>
</html>
