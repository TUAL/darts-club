<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club</title>    
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DartsClub">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
            --accent: #00ff88;
            --live: #ffa500;
            --ia: #ff4444;
            --fun: #bc13fe;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 15px;
            /* Utilisation de 100dvh pour s'adapter dynamiquement */
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* HEADER COMPACTÉ ET REMONTÉ */
        header {
            text-align: center;
            padding-top: calc(env(safe-area-inset-top) + 15px); /* Moins de padding */
            padding-bottom: 5px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 2rem; /* Titre plus petit */
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--accent);
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 2px;
            opacity: 0.8;
        }

        /* Conteneur principal qui remonte le contenu */
        .main-content {
            flex: 1;
            display: flex;
            align-items: flex-start; /* Aligne en haut au lieu de centrer */
            justify-content: center;
            width: 100%;
            padding-top: 10px; /* Petit espace sous le header */
            overflow-y: auto; /* Scroll interne si vraiment trop petit */
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px; /* Gap réduit */
            width: 100%;
            max-width: 500px;
            padding-bottom: 15px; /* Espace de sécurité avant le footer */
        }

        /* BOUTONS PLUS COMPACTS */
        .menu-item {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid #222;
            border-radius: 18px; /* Arrondis légèrement réduits */
            padding: 12px; /* Padding réduit */
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            min-height: 100px; /* Hauteur minimale pour garder de la consistance */
        }

        .menu-item:active { transform: scale(0.96); background: #151515; }

        .live { border-top: 1px solid var(--live); }
        .online { border-top: 1px solid var(--accent); }
        .ia { border-top: 1px solid var(--ia); }
        .fun { border-top: 1px solid var(--fun); }

        .icon { font-size: 1.6rem; margin-bottom: 6px; } /* Icones plus petites */
        .title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
        .desc { font-size: 0.6rem; color: #888; line-height: 1.2; } /* Texte plus petit */

        .full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: flex-start;
            padding: 15px 20px;
            gap: 15px;
            text-align: left;
            min-height: 70px; /* Moins haut pour le bandeau large */
        }
        
        .full .icon { font-size: 1.8rem; margin-bottom: 0; }

        /* FOOTER COMPACT ET FIXE */
        footer {
            flex-shrink: 0;
            width: 100%;
            height: 70px; /* Hauteur réduite */
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
            background: var(--bg);
            border-top: 1px solid #161b22;
        }

        .info-link { 
            color: #888; 
            text-decoration: none; 
            font-size: 0.7rem; /* Texte plus petit */
            text-transform: uppercase; 
            letter-spacing: 2px; 
            padding: 8px 20px; 
            border: 1px solid #333; 
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
        }

        .badge-online {
            position: absolute;
            top: 8px;
            right: 10px;
            background: #FF0000;
            color: #FFF;
            font-size: 0.5rem;
            font-weight: 900;
            padding: 1px 6px;
            border-radius: 50px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>DARTS CLUB</h1>
        <div class="subtitle">Elite Scoring System</div>
    </header>

    <main class="main-content">
        <div class="menu-grid">
            <a href="darts-live.html" class="menu-item live full">
                <div class="badge-online">ONLINE</div>
                <div class="icon">📡</div>
                <div>
                    <div class="title" style="color: var(--live);">Darts LIVE</div>
                    <div class="desc">Compétition en temps réel via stands privés.</div>
                </div>
            </a>

            <a href="darts-local.html" class="menu-item online">
                <div class="icon">🎯</div>
                <div class="title">Darts Local</div>
                <div class="desc">En solo ou entre amis.</div>
            </a>

            <a href="darts-ia.html" class="menu-item ia">
                <div class="icon">🤖</div>
                <div class="title">VS IA</div>
                <div class="desc">Défiez l'algorithme.</div>
            </a>

            <a href="darts-bobs.html" class="menu-item fun">
                <div class="icon">🎡</div>
                <div class="title">Bob's 27</div>
                <div class="desc">Maîtrise des doubles.</div>
            </a>

            <a href="darts-180.html" class="menu-item fun">
                <div class="icon">🔥</div>
                <div class="title">Darts 180</div>
                <div class="desc">Quête de la perfection.</div>
            </a>
        </div>
    </main>

    <footer>
        <a href="infos.html" class="info-link">ℹ️ En savoir plus</a>
    </footer>

</body>
</html>
