<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Connexion</title>
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="apple-touch-icon" href="icone.png">
    
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --s-color: #238636; --t-color: #da3633;
            --border: #30363d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background: #05070a; 
            color: var(--text); font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden;
        }

        header {
            text-align: center;
            padding-top: calc(env(safe-area-inset-top) + 15px);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.1rem;
            letter-spacing: 5px;
            margin: 0;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--accent);
            font-size: 0.65rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 5px;
            opacity: 0.8;
        }

        #app-container {
            width: 100%; max-width: 430px; height: 100dvh;
            background: var(--bg); position: relative;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 25px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .brand-section { text-align: center; margin-bottom: 40px; }
        
        .app-icon { 
            width: 100px; height: 100px; 
            border-radius: 22px; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .auth-card {
            width: 100%; background: var(--card);
            padding: 25px; border-radius: 20px;
            border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; font-weight: 700; color: #8b949e; letter-spacing: 1px; margin-left: 5px; }

        input {
            width: 100%; background: #010409; border: 1px solid var(--border);
            padding: 16px; border-radius: 12px; color: white;
            font-size: 1rem; text-align: center; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; font-size: 1rem; 
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }

        .btn-login { background: var(--accent); color: white; margin-top: 5px; }
        
        .btn-guest { 
            background: transparent; color: #8b949e; 
            border: 1px solid var(--border); margin-top: 10px;
        }

        #msg { 
            text-align: center; font-size: 0.8rem; font-weight: 600;
            min-height: 20px; margin-top: 10px; 
        }

        .footer-info {
            margin-top: auto; font-size: 0.65rem; color: #484f58;
            letter-spacing: 1px; text-align: center;
        }

		.btn-guest { 
			background: rgba(255, 255, 255, 0.05); /* Fond très sombre mais visible */
			color: #8b949e; 
			border: 1px solid #30363d; 
			margin-top: 15px;
			font-size: 0.85rem; /* Un peu plus petit pour la hiérarchie */
		}

		.btn-guest span {
			display: block;
			font-size: 0.65rem;
			font-weight: 400;
			color: #484f58;
			margin-top: 2px;
			text-transform: uppercase;
			letter-spacing: 1px;
		}
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h1>DARTS CLUB</h1>
        <div class="subtitle">Elite Scoring System</div>
    </header>

	<div class="auth-card">
		<div class="input-group">
			<label>JOUEUR</label>
			<input type="text" id="pseudo" placeholder="TON PSEUDO" maxlength="12" style="text-transform: uppercase;" autocomplete="off">
		</div>

		<div class="input-group">
			<label>CLÉ DE SÉCURITÉ</label>
			<input type="password" id="pin" placeholder="4 CHIFFRES" inputmode="numeric" maxlength="4">
		</div>
		
		<button class="btn btn-login" onclick="handleAuth()">SE CONNECTER / CRÉER</button>
		
		<button class="btn btn-guest" onclick="continueGuest()">
			SESSION LIBRE
			<span>Sans Historique, ni Stats</span>
		</button>
		
		<div id="msg"></div>
	</div>
    
    <div class="footer-info">
        MARS 2026 • VERSION 2.0
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script>
    // Configuration Firebase avec tes vraies clés
    const firebaseConfig = {
        apiKey: "AIzaSyD8AIw0f3L65XMZM9OBX8wDWNbSvl4ACZM",
        authDomain: "dartsclub-1aab9.firebaseapp.com",
        databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dartsclub-1aab9",
        storageBucket: "dartsclub-1aab9.firebasestorage.app",
        messagingSenderId: "769714266505",
        appId: "1:769714266505:web:ea1758db2c96702979c158"
    };

    // Initialisation du SDK Compat
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    async function handleAuth() {
        const pseudoInput = document.getElementById('pseudo');
        const pinInput = document.getElementById('pin');
        const msg = document.getElementById('msg');
        
        const pseudo = pseudoInput.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
        const pin = pinInput.value.trim();

        if (pseudo.length < 2 || pin.length !== 4) {
            showError("Pseudo (min 2) et Code (4 chiffres) requis.");
            return;
        }

        const userRef = firebase.database().ref('users/' + pseudo);

        try {
            const snapshot = await userRef.once('value');

            if (snapshot.exists()) {
                const userData = snapshot.val();
                if (userData.pin === pin) {
                    showSuccess("Bon retour " + pseudo + " !");
                    login(pseudo, false);
                } else {
                    showError("Ce pseudo est déjà réservé.");
                }
            } else {
                // Création du nouveau profil
                await userRef.set({
                    pin: pin,
                    createdAt: Date.now(),
                    games: {
                        darts_live: { top: [] }, darts_local: { top: [] },
                        darts_ia: { top: [] }, darts_bobs: { top: [] },
                        darts_180: { top: [] }, darts_bull: { top: [] },
                        darts_checkout: { top: [] }
                    }
                });
                showSuccess("Bienvenue au club, " + pseudo + " !");
                login(pseudo, false);
            }
        } catch (error) {
            console.error(error);
            showError("Erreur : Vérifiez vos règles Firebase.");
        }
    }

    function continueGuest() {
        login("INVITÉ", true);
    }

    function login(pseudo, isGuest) {
        localStorage.setItem('darts_pseudo', pseudo);
        localStorage.setItem('is_guest', isGuest);
        setTimeout(() => {
            window.location.href = 'menu.html';
        }, 1200);
    }

    function showError(text) {
        const msg = document.getElementById('msg');
        msg.style.color = "var(--t-color)";
        msg.innerText = text;
    }

    function showSuccess(text) {
        const msg = document.getElementById('msg');
        msg.style.color = "var(--s-color)";
        msg.innerText = text;
    }
</script>
</body>
</html>
