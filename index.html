<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Connexion</title>
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="apple-touch-icon" href="icone.png">
    
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --s-color: #238636; --t-color: #da3633;
            --border: #30363d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background: #05070a; 
            color: var(--text); font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 430px; height: 100dvh;
            background: var(--bg); position: relative;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 25px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .brand-section { text-align: center; margin-bottom: 40px; }
        
        .app-icon { 
            width: 100px; height: 100px; 
            border-radius: 22px; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        h1 { 
            font-size: 1.4rem; letter-spacing: 5px; font-weight: 900;
            color: var(--text); margin: 0; text-transform: uppercase;
        }

        .auth-card {
            width: 100%; background: var(--card);
            padding: 25px; border-radius: 20px;
            border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; font-weight: 700; color: #8b949e; letter-spacing: 1px; margin-left: 5px; }

        input {
            width: 100%; background: #010409; border: 1px solid var(--border);
            padding: 16px; border-radius: 12px; color: white;
            font-size: 1rem; text-align: center; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; font-size: 1rem; 
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }

        .btn-login { background: var(--accent); color: white; margin-top: 5px; }
        
        .btn-guest { 
            background: transparent; color: #8b949e; 
            border: 1px solid var(--border); margin-top: 10px;
        }

        #msg { 
            text-align: center; font-size: 0.8rem; font-weight: 600;
            min-height: 20px; margin-top: 10px; 
        }

        .footer-info {
            margin-top: auto; font-size: 0.65rem; color: #484f58;
            letter-spacing: 1px; text-align: center;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="brand-section">
        <img src="icone.png" alt="Darts Club" class="app-icon" onerror="this.src='icon.png'">
        <h1>DARTS CLUB</h1>
    </div>

    <div class="auth-card">
        <div class="input-group">
            <label>JOUEUR</label>
            <input type="text" id="pseudo" placeholder="TON PSEUDO" maxlength="12" style="text-transform: uppercase;" autocomplete="off">
        </div>

        <div class="input-group">
            <label>CLÉ DE SÉCURITÉ</label>
            <input type="password" id="pin" placeholder="4 CHIFFRES" inputmode="numeric" maxlength="4">
        </div>
        
        <button class="btn btn-login" onclick="handleAuth()">SE CONNECTER / CRÉER</button>
        
        <button class="btn btn-guest" onclick="continueGuest()">MODE INVITÉ (SANS RECORD)</button>
        
        <div id="msg"></div>
    </div>
    
    <div class="footer-info">
        ESTABLISHED 2026 • VERSION 2.1
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    // --- ICI TU DEVRAS METTRE TA CONFIG FIREBASE ---
    // const firebaseConfig = { ... };
    // firebase.initializeApp(firebaseConfig);

    async function handleAuth() {
        const pseudoInput = document.getElementById('pseudo');
        const pinInput = document.getElementById('pin');
        const msg = document.getElementById('msg');
        
        // Nettoyage : Majuscules et lettres/chiffres uniquement pour le pseudo
        const pseudo = pseudoInput.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
        const pin = pinInput.value.trim();

        if (pseudo.length < 2 || pin.length !== 4) {
            showError("Pseudo (min 2) et Code (4 chiffres) requis.");
            return;
        }

        msg.style.color = "var(--accent)";
        msg.innerText = "Vérification...";

        try {
            const userRef = firebase.database().ref('users/' + pseudo);
            const snapshot = await userRef.once('value');

            if (snapshot.exists()) {
                const userData = snapshot.val();
                if (userData.pin === pin) {
                    showSuccess("Content de te revoir !");
                    login(pseudo, false);
                } else {
                    showError("Ce pseudo est déjà pris (code erroné).");
                }
            } else {
                // Création d'un nouveau profil unique
                await userRef.set({
                    pin: pin,
                    created: Date.now(),
                    stats: {}
                });
                showSuccess("Profil créé avec succès !");
                login(pseudo, false);
            }
        } catch (e) {
            // Si Firebase n'est pas encore configuré, on permet de tester l'ergonomie
            console.error(e);
            showError("Mode démo (Firebase non configuré)");
            setTimeout(() => login(pseudo, false), 1500);
        }
    }

    function continueGuest() {
        login("INVITÉ", true);
    }

    function login(pseudo, isGuest) {
        localStorage.setItem('darts_pseudo', pseudo);
        localStorage.setItem('is_guest', isGuest);
        setTimeout(() => {
            window.location.href = 'menu.html';
        }, 1000);
    }

    function showError(text) {
        const msg = document.getElementById('msg');
        msg.style.color = "var(--t-color)";
        msg.innerText = text;
    }

    function showSuccess(text) {
        const msg = document.getElementById('msg');
        msg.style.color = "var(--s-color)";
        msg.innerText = text;
    }
</script>

</body>
</html>
