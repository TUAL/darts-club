<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Darts Club - Login</title>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --s-color: #238636;
        }
        body { 
            margin: 0; background: #05070a; color: var(--text);
            font-family: -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100dvh;
        }
        #app-container {
            width: 100%; max-width: 430px; height: 100dvh;
            background: var(--bg); display: flex; flex-direction: column;
            padding: 40px 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .logo { font-size: 4rem; text-align: center; margin-bottom: 10px; }
        h1 { text-align: center; font-size: 1.2rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 40px; }
        
        .auth-box { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #30363d; }
        input {
            width: 100%; background: #010409; border: 1px solid #30363d;
            padding: 15px; border-radius: 8px; color: white; margin-bottom: 15px;
            font-size: 1rem; text-align: center; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 15px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .btn-login { background: var(--accent); color: white; margin-bottom: 20px; }
        .btn-guest { background: transparent; color: #8b949e; border: 1px solid #30363d; }
        
        #msg { text-align: center; font-size: 0.8rem; height: 20px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="logo">🎯</div>
    <h1>DARTS CLUB</h1>

    <div class="auth-box">
        <input type="text" id="pseudo" placeholder="PSEUDO" maxlength="12" style="text-transform: uppercase;">
        <input type="password" id="pin" placeholder="CODE PIN (4 CHIFFRES)" inputmode="numeric" maxlength="4">
        
        <button class="btn btn-login" onclick="handleAuth('member')">CONNEXION / CRÉER</button>
        
        <div style="text-align: center; margin-bottom: 20px; color: #484f58; font-size: 0.8rem;">— OU —</div>
        
        <button class="btn btn-guest" onclick="handleAuth('guest')">CONTINUER EN INVITÉ</button>
        <div id="msg"></div>
    </div>
    
    <div style="margin-top: auto; text-align: center; font-size: 0.7rem; color: #484f58;">
        V 2.0 - 2026 | SESSION SÉCURISÉE
    </div>
</div>

<script>
    function handleAuth(mode) {
        const msg = document.getElementById('msg');
        
        if (mode === 'guest') {
            localStorage.setItem('darts_player_id', 'GUEST');
            localStorage.setItem('is_guest', 'true');
            window.location.href = 'menu.html'; // On redirige vers un nouveau fichier menu.html
            return;
        }

        const pseudo = document.getElementById('pseudo').value.trim().toUpperCase().replace(/[- ]/g, "");
        const pin = document.getElementById('pin').value.trim();

        if (pseudo.length < 2 || pin.length !== 4) {
            msg.innerText = "Pseudo et PIN (4 chiffres) invalides";
            msg.style.color = "#da3633";
            return;
        }

        // Stockage de l'ID Unique (Pseudo + PIN)
        const playerID = pseudo + pin;
        localStorage.setItem('darts_player_id', playerID);
        localStorage.setItem('is_guest', 'false');
        
        msg.innerText = "Authentification...";
        msg.style.color = "var(--s-color)";

        // Ici, on pourrait ajouter la vérification Firebase, 
        // mais pour l'instant on redirige pour tester le flux
        setTimeout(() => { window.location.href = 'menu.html'; }, 800);
    }
</script>

</body>
</html>
