<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club</title>    
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
            --accent: #00ff88;
            --live: #ffa500;
            --ia: #ff4444;
            --fun: #bc13fe;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 15px;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding-top: calc(env(safe-area-inset-top) + 15px);
            padding-bottom: 15px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--accent);
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 2px;
        }

        /* CONTENEUR PRINCIPAL AVEC ESPACE POUR LE FOOTER */
        .main-content {
            width: 100%;
            display: flex;
            justify-content: center;
            /* On laisse de la place en bas pour ne pas que le footer cache les boutons */
            padding-bottom: 120px; 
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .menu-item {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid #222;
            border-radius: 18px;
            padding: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .live { border-top: 1px solid var(--live); }
        .online { border-top: 1px solid var(--accent); }
        .ia { border-top: 1px solid var(--ia); }
        .fun { border-top: 1px solid var(--fun); }

        .icon { font-size: 1.6rem; margin-bottom: 6px; }
        .title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; }
        .desc { font-size: 0.6rem; color: #888; line-height: 1.2; }

        .full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: flex-start;
            padding: 15px 25px;
            gap: 20px;
            text-align: left;
        }

        /* FOOTER FIXÉ EN BAS DE L'ÉCRAN */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85px;
            background: linear-gradient(to top, black 70%, transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .info-link { 
            color: #ccc; 
            text-decoration: none; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            padding: 10px 30px; 
            border: 1px solid #444; 
            border-radius: 25px;
            background: black;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .badge-online {
            position: absolute; top: 10px; right: 12px;
            background: #FF0000; color: #FFF; font-size: 0.55rem;
            font-weight: 900; padding: 2px 7px; border-radius: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>DARTS CLUB</h1>
        <div class="subtitle">Elite Scoring System</div>
    </header>

    <div class="main-content">
        <div class="menu-grid">
            <a href="darts-live.html" class="menu-item live full">
                <div class="badge-online">ONLINE</div>
                <div class="icon">📡</div>
                <div>
                    <div class="title" style="color: var(--live);">Darts LIVE</div>
                    <div class="desc">Compétition en temps réel via stands privés.</div>
                </div>
            </a>

            <a href="darts-local.html" class="menu-item online">
                <div class="icon">🎯</div>
                <div class="title">Darts Local</div>
                <div class="desc">En solo ou entre amis.</div>
            </a>

            <a href="darts-ia.html" class="menu-item ia">
                <div class="icon">🤖</div>
                <div class="title">VS IA</div>
                <div class="desc">Défiez l'algorithme.</div>
            </a>

            <a href="darts-bobs.html" class="menu-item fun">
                <div class="icon">🎡</div>
                <div class="title">Bob's 27</div>
                <div class="desc">Maîtrise des doubles.</div>
            </a>

            <a href="darts-180.html" class="menu-item fun">
                <div class="icon">🔥</div>
                <div class="title">Darts 180</div>
                <div class="desc">Quête de la perfection.</div>
            </a>
        </div>
    </div>

    <footer>
        <a href="infos.html" class="info-link">ℹ️ En savoir plus</a>
    </footer>

</body>
</html>
