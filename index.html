<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Connexion</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
let deferredPrompt;
const addBtn = document.getElementById('btn-install');

window.addEventListener('beforeinstallprompt', (e) => {
    // Empêche Chrome 67 et versions antérieures d'afficher automatiquement l'invite
    e.preventDefault();
    // Stocke l'événement pour qu'il puisse être déclenché plus tard
    deferredPrompt = e;
    // Met à jour l'interface pour montrer le bouton d'installation
    addBtn.style.display = 'block';

    addBtn.addEventListener('click', (e) => {
        // Cache notre bouton
        addBtn.style.display = 'none';
        // Montre l'invite d'installation
        deferredPrompt.prompt();
        // Attend la réponse de l'utilisateur
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('L\'utilisateur a accepté l\'installation');
            } else {
                console.log('L\'utilisateur a refusé l\'installation');
            }
            deferredPrompt = null;
        });
    });
});

// Cache le bouton une fois l'app installée
window.addEventListener('appinstalled', (evt) => {
    addBtn.style.display = 'none';
    console.log('Darts Club a été installée');
});
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --s-color: #238636; --t-color: #da3633;
            --border: #30363d; --install-color: #3F647F;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background: #05070a; 
            color: var(--text); font-family: -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 430px; height: 100dvh;
            background: var(--bg); position: relative;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 25px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.1rem; letter-spacing: 5px; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase;
        }
        .subtitle { color: var(--install-color); font-size: 0.65rem; letter-spacing: 5px; text-transform: uppercase; font-weight: bold; margin-top: 5px; opacity: 0.8; }

        .auth-card {
            width: 100%; background: var(--card);
            padding: 25px; border-radius: 20px;
            border: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; font-weight: 700; color: #8b949e; letter-spacing: 1px; margin-left: 5px; }

        input {
            width: 100%; background: #010409; border: 1px solid var(--border);
            padding: 16px; border-radius: 12px; color: white;
            font-size: 1rem; text-align: center; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; font-size: 1rem; 
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-login { background: var(--accent); color: white; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-guest { 
            background: rgba(255, 255, 255, 0.05); color: #8b949e; 
            border: 1px solid var(--border); margin-top: 5px;
        }

        #btn-install {
            display: none;
            background: linear-gradient(145deg, #004422, #001a0d);
            color: var(--install-color);
            border: 1px solid var(--install-color);
            margin-top: 20px;
            font-size: 0.8rem;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #msg { text-align: center; font-size: 0.8rem; font-weight: 600; min-height: 20px; margin-top: 10px; padding: 0 10px; }
        .footer-info { margin-top: auto; font-size: 0.65rem; color: #484f58; letter-spacing: 1px; text-align: center; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h1>DARTS CLUB</h1>
        <div class="subtitle">Elite Scoring System</div>
    </header>

    <div class="auth-card">
        <div class="input-group">
            <label>JOUEUR</label>
            <input type="text" id="pseudo" placeholder="TON PSEUDO" maxlength="12" style="text-transform: uppercase;" autocomplete="off">
        </div>

        <div class="input-group">
            <label>CLÉ DE SÉCURITÉ</label>
            <input type="password" id="pin" placeholder="4 CHIFFRES" inputmode="numeric" maxlength="4">
        </div>
        
        <button id="auth-submit" class="btn btn-login" onclick="handleAuth()">SE CONNECTER / CRÉER</button>
        
        <button class="btn btn-guest" onclick="continueGuest()">SESSION LIBRE</button>

        <button id="btn-install" class="btn" onclick="installApp()">
            ✨ INSTALLER L'APPLICATION
        </button>
        
        <div id="msg"></div>
    </div>
    
    <div class="footer-info">
        MARS 2026 • VERSION 2.1
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<script>
// 3. CONFIGURATION FIREBASE (Vérifiée avec vos images)
const firebaseConfig = {
    apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
    authDomain: "dartsclub-1aab9.firebaseapp.com",
    databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dartsclub-1aab9",
    storageBucket: "dartsclub-1aab9.firebasestorage.app",
    messagingSenderId: "769714266505",
    appId: "1:769714266505:web:ea1758db2c96702979c158"
};

// Initialisation sécurisée
if (!firebase.apps.length) { 
    firebase.initializeApp(firebaseConfig); 
}
const auth = firebase.auth();
const db = firebase.database();

// 4. AUTHENTIFICATION SÉCURISÉE
async function handleAuth() {
    const btn = document.getElementById('auth-submit');
    const pseudo = document.getElementById('pseudo').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
    const pin = document.getElementById('pin').value.trim();
    const msg = document.getElementById('msg');

    if (pseudo.length < 2 || pin.length !== 4) {
        showError("Pseudo (min 2) et Code (4 chiffres) requis.");
        return;
    }

    try {
        // ÉTAPE CRUCIALE : On force la connexion AVANT de toucher à la base
        // Cela valide le "auth != null" de vos règles Firebase
        if (!auth.currentUser) {
            await auth.signInAnonymously();
        }
        
        const userRef = db.ref('users/' + pseudo);
        const snapshot = await userRef.once('value');

        if (snapshot.exists()) {
            const userData = snapshot.val();
            if (String(userData.pin) === String(pin)) {
                showSuccess("Bon retour " + pseudo + " !");
                login(pseudo, false);
            } else {
                showError("PIN incorrect pour ce pseudo.");
            }
        } else {
            // Création si le pseudo est libre
            await userRef.set({ 
                pin: pin, 
                createdAt: Date.now(),
                stats: { wins: 0, games_played: 0 }
            });
            showSuccess("Profil créé ! Bienvenue " + pseudo);
            login(pseudo, false);
        }
    } catch (error) { 
        console.error("Erreur détaillée:", error);
        // Si ça bloque encore ici, c'est que l'URL ou le domaine bloquent
        showError("Erreur de connexion. Vérifiez la console (F12)."); 
    }
}

    function continueGuest() { login("INVITÉ", true); }

    function login(pseudo, isGuest) {
        localStorage.setItem('darts_pseudo', pseudo);
        localStorage.setItem('is_guest', isGuest);
        setTimeout(() => { window.location.href = 'menu.html'; }, 800);
    }

    function showError(t) { 
        const m = document.getElementById('msg'); 
        m.style.color = "var(--t-color)"; 
        m.innerText = t; 
    }

    function showSuccess(t) { 
        const m = document.getElementById('msg'); 
        m.style.color = "var(--s-color)"; 
        m.innerText = t; 
    }

    // PWA & Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
	
	// Bloquer le menu contextuel (clic droit)
	document.addEventListener('contextmenu', (e) => {
		e.preventDefault();
	}, false);

	// Bloquer les raccourcis clavier (F12, Ctrl+Maj+I, etc.)
	document.addEventListener('keydown', (e) => {
		// F12
		if (e.keyCode === 123) {
			e.preventDefault();
			return false;
		}
		// Ctrl+Maj+I ou Ctrl+Maj+J ou Ctrl+Maj+C
		if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
			e.preventDefault();
			return false;
		}
		// Ctrl+U (Afficher la source)
		if (e.ctrlKey && e.keyCode === 85) {
			e.preventDefault();
			return false;
		}
	}, false);
</script>
</body>
</html>
