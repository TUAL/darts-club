<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Cricket Live Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --bg-dark: #121916;
            --accent-orange: #f39c12; --accent-green: #2ecc71; --accent-red: #e74c3c;
            --mode-color: var(--accent);
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }
        
        /* HEADER */
        .top-bar { height: 50px; background: #1a1a1a; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; border-bottom: 1px solid #333; z-index: 100; }
        .back-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .top-title { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; color: #ccc; }

        /* SETUP SCREEN */
        #setup-screen { flex:1; display:flex; flex-direction:column; align-items:center; padding:20px; overflow-y:auto; }
        .setup-box { width: 100%; max-width: 320px; text-align: center; }
        .input-field { width: 100%; background: var(--card); border: 1px solid #30363d; color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; outline: none; }
        .stand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 15px; }
        .stand-btn { background: var(--card); border: 1px solid #30363d; padding: 12px; border-radius: 10px; text-align: left; cursor: pointer; border-left: 4px solid #30363d; transition: 0.2s; }
        .stand-btn.active-room { border-left-color: var(--accent-green); background: rgba(46, 204, 113, 0.05); }
        .stand-name { display: block; font-weight: 800; font-size: 0.75rem; color: #fff; text-transform: uppercase; }
        .stand-status { font-size: 0.6rem; color: #8b949e; }
        
        .mode-selector { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        .mode-btn { background: var(--card); border: 2px solid #30363d; color: #fff; padding: 12px 15px; border-radius: 12px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .mode-btn.selected { border-color: var(--accent-orange); background: rgba(243,156,18,0.1); }

        /* GAME SCREEN */
        #game-screen { display: none; height: calc(100dvh - 50px); flex-direction: column; background: #000; }
        .score-section { height: 42dvh; display: flex; flex-direction: column; background: var(--bg-dark); padding: 10px 0; }
        .header-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 0 10px; flex: 1; }
        
        .p-column { background: #1a1a1a; border: 3px solid #333; border-radius: 12px; display: flex; flex-direction: column; padding: 5px; opacity: 0.4; transition: 0.3s; position: relative; overflow: hidden; }
        .p-column.active { border-color: var(--accent-orange); opacity: 1; }
        .p-name { font-size: 0.7rem; font-weight: 900; text-align: center; text-transform: uppercase; color: #fff; }
        .p-score { font-size: 1.4rem; font-weight: 900; text-align: center; color: var(--accent-orange); margin: 2px 0; }
        
        /* CRICKET GRID */
        .cricket-grid { display: flex; flex-direction: column; gap: 1px; flex: 1; justify-content: center; }
        .segment-row { display: flex; justify-content: space-between; padding: 1px 6px; border-bottom: 1px solid #222; font-size: 0.65rem; font-weight: bold; }
        .mark-symbol { font-size: 0.9rem; width: 18px; text-align: center; }

        /* LIVE CAMERA OVERLAY */
        .p-column.has-video video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .score-overlay { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%); }

        /* INPUT ZONE */
        .input-info { height: 70px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 10px; background: #000; }
        .dart-val { width: 65px; height: 50px; background: white; color: black; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; }
        .btn-validate { flex: 1; max-width: 100px; height: 50px; background: #222; border: none; color: #444; border-radius: 25px; font-weight: 900; }
        .btn-validate.ready { background: var(--accent-green) !important; color: #fff !important; }

        #video-frame { flex: 1; background: #000; position: relative; display: flex; justify-content: center; align-items: center; }
        #remote-video { height: 90%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; border: 2px solid var(--accent-orange); }

        /* KEYBOARD */
        .keyboard { flex: 1; background: #1a1a1a; display: flex; flex-direction: column; padding: 2px; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #333; }
        .btn-m { background: #1a1a1a; color: #888; padding: 12px; border: none; font-weight: 900; }
        .btn-m.active { color: #fff; border-bottom: 3px solid var(--accent-orange); }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); flex: 1; gap: 1px; background: #333; }
        .key { background: #121916; border: none; color: white; font-weight: 900; font-size: 1.2rem; }
        .special-row { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 60px; gap: 1px; background: #333; }
        .sp-key { background: #121916; color: #fff; border: none; font-weight: bold; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #121212; padding: 20px; border-radius: 15px; border-left: 5px solid #f39c12; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="back-icon" onclick="openQuitModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="top-title" id="room-display">CRICKET LIVE PREMIUM</div>
    </div>

    <div id="setup-screen">
        <div class="setup-box">
            <h2 style="color:var(--accent-orange); font-size:0.7rem; letter-spacing:2px;">CRICKET MODE</h2>
            <input type="text" id="pName" class="input-field" placeholder="TON PSEUDO...">
            <input type="number" id="qualifInput" class="input-field" placeholder="SCORE BULLE (ORDRE)">
            <div class="mode-selector">
                <div class="mode-btn selected" id="m0" onclick="setPlayerMode(0)"><span>🎯</span> 1 APPAREIL (SANS CAM)</div>
                <div class="mode-btn" id="m2" onclick="setPlayerMode(2)"><span>📸</span> 1 APPAREIL (AVEC CAM)</div>
            </div>
            <div id="standGrid" class="stand-grid"></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="score-section">
            <div class="header-scores" id="players-list"></div>
            <div id="turn-announcer" style="text-align:center; color:var(--accent-orange); font-weight:900; font-size:0.7rem; padding:5px;">CHARGEMENT...</div>
        </div>

        <div class="input-info">
            <div class="dart-val" id="d0">-</div>
            <div class="dart-val" id="d1">-</div>
            <div class="dart-val" id="d2">-</div>
            <button class="btn-validate" id="btn-finish" onclick="finishTurn()" disabled>VALIDER</button>
        </div>

        <div id="video-frame">
            <video id="remote-video" autoplay playsinline></video>
            <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:10px; font-size:0.6rem; font-weight:bold; border:1px solid var(--accent-orange);">DIRECT ADVERSAIRE</div>
        </div>

        <div class="keyboard">
            <div class="mod-row">
                <button class="btn-m active" id="btn-s" onclick="setMult(1)">SIMPLE</button>
                <button class="btn-m" id="btn-d" onclick="setMult(2)">DOUBLE</button>
                <button class="btn-m" id="btn-t" onclick="setMult(3)">TRIPLE</button>
            </div>
            <div class="num-grid" id="kb-cricket">
                <!-- Généré par JS -->
            </div>
            <div class="special-row">
                <button class="sp-key" style="background:#222;" onclick="undoLast()">ANNULER</button>
                <button class="sp-key" onclick="handleDart(25)">BULL</button>
                <button class="sp-key" style="background:var(--accent-red);" onclick="handleDart(0)">MISS</button>
            </div>
        </div>
    </div>

    <!-- MODAL QUITTER -->
    <div id="quitModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color:#fff;">QUITTER ?</h3>
            <p style="color:#888; font-size:0.8rem;">La partie sera perdue.</p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeQuitModal()" style="flex:1; padding:12px; border:none; border-radius:8px; background:#333; color:white;">RESTER</button>
                <button onclick="location.reload()" style="flex:1; padding:12px; border:none; border-radius:8px; background:var(--accent-red); color:white;">QUITTER</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
        authDomain: "dartsclub-1aab9.firebaseapp.com",
        databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dartsclub-1aab9",
        storageBucket: "dartsclub-1aab9.firebasestorage.app",
        messagingSenderId: "769714266505",
        appId: "1:769714266505:web:ea1758db2c96702979c158"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    
    // Auth anonyme pour les droits d'écriture
    auth.signInAnonymously();

    const STANDS = ["1 - LITTLER", "2 - HUMPHRIES", "3 - PRICE", "4 - VAN VEEN", "5 - VAN GERWEN", "6 - TRICOLE"];
    const TARGETS = [20, 19, 18, 17, 16, 15];
    
    let myName, myId, roomName, myIndex = -1;
    let playerMode = 0; // 0: No Cam, 2: 1 Device Cam
    let multiplier = 1;
    let dartsInTurn = [];
    let gameState = { players: [], currentPlayer: 0 };
    let localMarks = {}, localScore = 0;
    let peer;

    // Initialisation
    window.onload = () => {
        const saved = localStorage.getItem('darts_pseudo');
        if(saved) document.getElementById('pName').value = saved;
        
        const kb = document.getElementById('kb-cricket');
        TARGETS.forEach(val => {
            kb.innerHTML += `<button class="key" onclick="handleDart(${val})">${val}</button>`;
        });
        
        initStands();
    };

    function setPlayerMode(m) {
        playerMode = m;
        document.getElementById('m0').classList.toggle('selected', m === 0);
        document.getElementById('m2').classList.toggle('selected', m === 2);
    }

    function initStands() {
        db.ref('rooms').on('value', snap => {
            const rooms = snap.val() || {};
            const grid = document.getElementById('standGrid');
            grid.innerHTML = STANDS.map(name => {
                const count = rooms[name]?.players ? Object.keys(rooms[name].players).length : 0;
                return `<div class="stand-btn ${count > 0 ? 'active-room' : ''}" onclick="joinStand('${name}', ${count})">
                    <span class="stand-name">${name}</span>
                    <span class="stand-status">${count}/3 JOUEURS</span>
                </div>`;
            }).join('');
        });
    }

    async function joinStand(name, count) {
        if(count >= 3) return;
        myName = document.getElementById('pName').value.trim().toUpperCase();
        if(!myName) return alert("PSEUDO REQUIS");
        localStorage.setItem('darts_pseudo', myName);
        roomName = name;

        if(count === 0) {
            await db.ref(`rooms/${name}`).set({ status: "playing", currentPlayer: 0, gameType: "cricket" });
        }

        const pRef = db.ref(`rooms/${name}/players`).push();
        myId = pRef.key;
        
        await pRef.set({
            name: myName, score: 0, 
            marks: {20:0, 19:0, 18:0, 17:0, 16:0, 15:0, 25:0},
            q: parseInt(document.getElementById('qualifInput').value) || 0
        });

        if(playerMode === 2) initPeer();
        startListening();
    }

    function initPeer() {
        peer = new Peer();
        peer.on('open', id => db.ref(`rooms/${roomName}/players/${myId}/peerId`).set(id));
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({video: {facingMode:"user"}, audio:false}).then(stream => {
                call.answer(stream);
                call.on('stream', rs => document.getElementById('remote-video').srcObject = rs);
            });
        });
    }

    function startListening() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        
        db.ref(`rooms/${roomName}`).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            
            const players = Object.entries(data.players).map(([id, p]) => ({...p, id})).sort((a,b) => b.q - a.q);
            gameState = {...data, players};
            myIndex = players.findIndex(p => p.id === myId);

            if(gameState.currentPlayer !== window._lastIdx) {
                dartsInTurn = [];
                localMarks = {...players[myIndex].marks};
                localScore = players[myIndex].score;
                window._lastIdx = gameState.currentPlayer;
                
                // Appel auto si caméra
                if(gameState.currentPlayer !== myIndex && playerMode === 2 && players[gameState.currentPlayer].peerId) {
                    callPlayer(players[gameState.currentPlayer].peerId);
                }
            }
            renderUI();
        });
    }

    async function callPlayer(peerId) {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}, audio:false});
        peer.call(peerId, stream).on('stream', rs => document.getElementById('remote-video').srcObject = rs);
    }

    function handleDart(val) {
        if(gameState.currentPlayer !== myIndex || dartsInTurn.length >= 3) return;
        
        const m = (val === 25 || val === 0) ? 1 : multiplier;
        const pts = val;
        
        // Logique Cricket
        for(let i=0; i<m; i++) {
            if(val > 0) {
                if(localMarks[val] < 3) {
                    localMarks[val]++;
                } else {
                    // Vérifier si quelqu'un d'autre n'a pas fermé
                    const everyoneClosed = gameState.players.every(p => (p.id === myId ? localMarks[val] : (p.marks?.[val]||0)) >= 3);
                    if(!everyoneClosed) localScore += val;
                }
            }
        }

        dartsInTurn.push({val, m});
        setMult(1);
        renderUI();
    }

    function undoLast() {
        dartsInTurn.pop();
        localMarks = {...gameState.players[myIndex].marks};
        localScore = gameState.players[myIndex].score;
        const history = [...dartsInTurn];
        dartsInTurn = [];
        history.forEach(d => { multiplier = d.m; handleDart(d.val); });
        renderUI();
    }

    function renderUI() {
        const container = document.getElementById('players-list');
        container.innerHTML = gameState.players.map((p, i) => {
            const isMe = p.id === myId;
            const marks = isMe ? localMarks : (p.marks || {});
            const score = isMe ? localScore : p.score;
            const active = i === gameState.currentPlayer;
            
            return `
                <div class="p-column ${active ? 'active' : ''}">
                    <div class="p-name">${p.name}</div>
                    <div class="p-score">${score}</div>
                    <div class="cricket-grid">
                        ${[20,19,18,17,16,15,25].map(v => {
                            const count = marks[v] || 0;
                            const sym = count >= 3 ? "⭕" : count === 2 ? "X" : count === 1 ? "/" : "·";
                            return `<div class="segment-row"><span>${v==25?'B':v}</span><span class="mark-symbol">${sym}</span></div>`;
                        }).join('')}
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('turn-announcer').innerText = (gameState.currentPlayer === myIndex) ? "À TOI DE JOUER !" : "ATTENTE...";
        
        for(let i=0; i<3; i++) {
            const d = dartsInTurn[i];
            document.getElementById('d'+i).innerText = d ? (d.val === 0 ? "M" : (d.m > 1 ? (d.m === 3 ? 'T' : 'D') : '') + d.val) : "-";
        }
        
        document.getElementById('btn-finish').disabled = dartsInTurn.length < 3;
        document.getElementById('btn-finish').classList.toggle('ready', dartsInTurn.length === 3);
    }

    async function finishTurn() {
        await db.ref(`rooms/${roomName}/players/${myId}`).update({
            marks: localMarks,
            score: localScore
        });
        const next = (gameState.currentPlayer + 1) % gameState.players.length;
        db.ref(`rooms/${roomName}`).update({ currentPlayer: next });
    }

    function setMult(m) {
        multiplier = m;
        document.getElementById('btn-s').classList.toggle('active', m === 1);
        document.getElementById('btn-d').classList.toggle('active', m === 2);
        document.getElementById('btn-t').classList.toggle('active', m === 3);
    }

    function openQuitModal() { document.getElementById('quitModal').style.display = 'flex'; }
    function closeQuitModal() { document.getElementById('quitModal').style.display = 'none'; }
</script>
</body>
</html>
