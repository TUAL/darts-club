<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - Bull Challenge</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --accent: #58a6ff; --bg-dark: #121916;--accent-miss: #fff;
            --accent-orange: #f39c12; --accent-green: #2ecc71; --accent-red: #e74c3c;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
	body { 
		font-family: -apple-system, system-ui, sans-serif; 
		background: var(--bg); color: var(--text); 
		margin: 0; padding: 0; 
		height: 91%; 
		min-height: 91%; 
		max-height: 91%;
		flex-shrink: 0;   /* Empêche le flexbox parent de réduire ce bloc */		
		display: flex; flex-direction: column; 
		overflow: hidden; 
		position: fixed; width: 100%;
	
	}


        .top-bar { height: 50px; background: #1a1a1a; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; border-bottom: 1px solid #333; }
        .back-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .top-title { flex: 1; text-align: center; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; color: #ccc; }

.score-section { 
    height: 30%; 
    min-height: 30%; 
    max-height: 30%;
    display: flex; 
    flex-direction: column; 
    background: var(--bg-dark); 
    padding: 10px 0;
    overflow: hidden; /* Empêche le contenu interne de pousser les bords */
    flex-shrink: 0;   /* Empêche le flexbox parent de réduire ce bloc */
}

        .header-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 10px; flex: 1; }

        .turn-announcer { height: 35px; display: flex; align-items: center; justify-content: center; color: var(--accent-orange); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }
        
        .p-column { 
            background: #1a1a1a; border: 3px solid #333; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 10px 5px; opacity: 1; color: #fff;
        }
        .p-column.active { background: var(--accent-orange); border-color: #fff; color: #000; }
        .p-column.blue { background: var(--accent); border-color: #fff; color: #000; }
        
.p-name { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; }
.p-score { font-size: 3rem; font-weight: 900; line-height: 0.70; margin: 5px 0; }
.p-score-flech { font-size: 2rem; font-weight: 900; line-height: 0.70; margin: 5px 0;align-items: center; }
.p-last-v { font-size: 0.65rem; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
.p-stats { font-size: 0.65rem; font-weight: 900; width: 90%; }
        .target-sub { font-size: 0.65rem; font-weight: 900; margin-top: 10px; text-transform: uppercase; opacity: 0.8; }

.input-info { 
    height: 60px !important; 
    min-height: 60px !important;
    max-height: 60px !important;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 10px; 
    padding: 0 15px; 
    background: #000;
    flex-shrink: 0; /* Empêche la section de se faire écraser */
}

        .dart-val { 
            width: 70px; height: 55px; background: white; color: black; 
            border-radius: 30px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem;
        }
        .dart-val small { font-size: 0.55rem; font-weight: bold; color: #555; text-transform: uppercase; }
        
        .btn-valid-darts { flex: 1; height: 55px; background: #222; border: none; color: #444; border-radius: 30px; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; }
        .btn-valid-darts.ready { background: var(--accent-orange) !important; color: #000 !important; }


        .keyboard {flex: 1; background: #1a1a1a; display: flex; flex-direction: column; padding: 2px; }		
		
        .num-grid {display: grid; grid-template-columns: 1fr 1fr 1fr; flex: 1;height: 180px; gap: 1px; }
	
		
        .key { background: #121916; border: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .key span { font-size: 1.2rem; font-weight: 900; }
        .key small { font-size: 0.6rem; color: #666; font-weight: 900; text-transform: uppercase; margin-top: 5px; }
        .key.red { border-bottom: 5px solid var(--accent-red);margin-top: 25px;margin-bottom: 100px; }
        .key.green {border-bottom: 5px solid var(--accent-green);margin-top: 25px;margin-bottom: 100px;}
        .key.miss {border-bottom: 5px solid var(--accent-miss);margin-top: 25px;margin-bottom: 100px;border-left:1px solid #333; border-right:1px solid #333; }
		
        .special-row { display: grid; grid-template-columns: 1fr; height: 60px;gap: 1px; background: #333;border-top: 4px solid var(--accent);  }
		
        .sp-key { background: #121916; color: #888; border: none; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .final-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #30363d; width: 100%; max-width: 260px; text-align: center; }
        .end-btn-container { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 260px; margin-top: 15px; }
        .end-btn { height: 50px; border-radius: 10px; font-size: 0.85rem; text-transform: uppercase; font-weight: 800; border: none; color: white; }
        .btn-save { background: var(--accent-green) !important; }
        .btn-valid { background: var(--accent) !important; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="back-icon" onclick="window.location.href='menu.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <div class="top-title">🎯 BULL</div>
    </div>

    <div class="score-section">
        <div class="header-scores">
            <div class="p-column active">
                <div class="p-name">POINTS</div>
                <div id="val-score" class="p-score">0</div>
                <div class="target-sub">&nbsp;</div>
                <div class="p-stats">&nbsp;<br>OBJECTIF : 10pts</div>	
            </div>
            <div class="p-column blue">
                <div class="p-name">JETS</div>
                <div id="val-darts" class="p-score-flech">0</div>
                <div class="target-sub">18 FLÉCHETTES MAX</div>
                <div class="p-stats">&nbsp;<br>&nbsp;</div>	
            </div>
            <div style="visibility: hidden;"></div>
        </div>
        <div class="turn-announcer" id="msg-txt">À TOI DE JOUER !</div>
    </div>
    
    <div class="input-info">
        <div class="dart-val" id="v0">--<small>-</small></div>
        <div class="dart-val" id="v1">--<small>-</small></div>
        <div class="dart-val" id="v2">--<small>-</small></div>
        <button class="btn-valid-darts" id="btn-validate" onclick="validateTurn()" disabled>VALIDER</button>
    </div>

    <div class="keyboard">
        <div class="special-row">
            <button class="sp-key" onclick="undo()">RETOUR ⌫</button>
        </div>  
        <div class="num-grid">
            <button class="key green" onclick="addDart(2, 'red')"><span>BULLSEYE</span><small>2 PTS</small></button>
            <button class="key miss" onclick="addDart(1, 'green')"><span>BULL</span><small>1 PT</small></button>
            <button class="key red" onclick="addDart(0, 'miss')"><span>ZÉRO</span><small>0 PT</small></button>
        </div>
    </div>

    <div id="end-screen" class="overlay">
		<div class="top-bar" style="width: 100%; position: absolute; top: 0; left: 0;">
			<div class="back-icon" onclick="window.location.href='menu.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
			<div class="top-title">🎯 BULL</div>
		</div>
        <div class="final-box">
            <h1 id="end-status" style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin: 0;">Résultat Final</h1>
            <div id="final-score-display" style="font-size: 3.5rem; font-weight: 900; margin: 5px 0; line-height: 1;">--</div>
            <p id="end-msg" style="font-size: 0.85rem; color: #fff; font-weight: bold; margin: 10px 0 0 0; background: #1a1a1a; display: inline-block; padding: 4px 12px; border-radius: 4px;"></p>
        </div>
        <div id="top-scores" style="margin: 15px 0; width: 100%; max-width: 260px; font-size: 0.75rem;">
            <div style="color: var(--accent-orange); font-weight: bold; text-align: center; margin-bottom: 8px; text-transform: uppercase;">🏆 Top 3 Records</div>
            <div id="top-list" style="background: var(--card); border-radius: 10px; padding: 5px 10px; border: 1px solid #333;">...</div>
        </div>
        <div class="end-btn-container">
            <button id="btn-save-only" class="end-btn btn-save" style="display:none;" onclick="saveRecord()">ENREGISTRER</button>
            <button class="end-btn btn-valid" onclick="location.reload()">REJOUER</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCSeggBmTOXR_XyspjuAsbhMfncp9MYUBA",
        authDomain: "dartsclub-1aab9.firebaseapp.com",
        databaseURL: "https://dartsclub-1aab9-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dartsclub-1aab9",
        storageBucket: "dartsclub-1aab9.firebasestorage.app",
        messagingSenderId: "769714266505",
        appId: "1:769714266505:web:ea1758db2c96702979c158"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => { if (!user) await auth.signInAnonymously(); });

    const pseudo = localStorage.getItem('darts_pseudo') || "INVITÉ";
    const isGuest = pseudo === "INVITÉ";

    let totalScore = 0;
    let totalDarts = 0;
    let turnDarts = [];
    let gameOver = false;

    function addDart(pts, type) {
        if(gameOver || turnDarts.length >= 3) return;
        turnDarts.push({pts, type});
        updateUI();
    }

    function undo() {
        if(gameOver) return;
        turnDarts.pop();
        updateUI();
    }

    function updateUI() {
        const currentTurnSum = turnDarts.reduce((acc, d) => acc + d.pts, 0);
        document.getElementById('val-score').innerText = totalScore + currentTurnSum;
        document.getElementById('val-darts').innerText = totalDarts + turnDarts.length;

        for(let i=0; i<3; i++) {
            const slot = document.getElementById('v'+i);
            if(turnDarts[i]) {
                slot.innerHTML = turnDarts[i].type === 'miss' ? `MISS<small>0 PT</small>` : `HIT<small>${turnDarts[i].pts} PT</small>`;
            } else {
                slot.innerHTML = `--<small>-</small>`;
            }
        }
        
        const btn = document.getElementById('btn-validate');
        // LE BOUTON S'ALLUME SI : 3 fléchettes OU si les 10 points sont atteints
        const canValidate = turnDarts.length === 3 || (totalScore + currentTurnSum >= 10);
        btn.disabled = !canValidate;
        if(!btn.disabled) btn.classList.add('ready');
        else btn.classList.remove('ready');
    }

    function validateTurn() {
        if(gameOver) return;
        totalScore += turnDarts.reduce((acc, d) => acc + d.pts, 0);
        totalDarts += turnDarts.length;

        // ARRÊT DU JEU UNIQUEMENT LORS DE LA VALIDATION
        if(totalScore >= 10 || totalDarts >= 18) {
            if(totalScore > 10) totalScore = 10;
            showEnd();
        } else {
            turnDarts = [];
            updateUI();
        }
    }

    function showEnd() {
        gameOver = true;
        document.getElementById('game-screen-content')?.style.setProperty('display', 'none');
        document.getElementById('end-screen').style.display = 'flex';
        const fs = document.getElementById('final-score-display');
        fs.innerText = totalScore;
        
        const success = totalScore >= 10;
        document.getElementById('end-status').innerText = success ? "RÉUSSI !" : "ÉCHOUÉ";
        fs.style.color = success ? "var(--accent-green)" : "var(--accent-red)";
        document.getElementById('end-msg').innerText = `${totalScore} pts / ${totalDarts} fl.`;
        
        if(!isGuest) document.getElementById('btn-save-only').style.display = 'block';
        displayTop3();
    }

    async function saveRecord() {
        const btn = document.getElementById('btn-save-only');
        try {
            btn.disabled = true; btn.innerText = "Mise à jour...";
            const ref = db.ref(`users/${pseudo.toUpperCase()}/games/bull_challenge/top`);
            const snap = await ref.once('value');
            let topScores = snap.exists() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())) : [];

            topScores.push({ pts: totalScore, darts: totalDarts, date: new Date().toLocaleDateString('fr-FR') });
            
            // RÈGLE DU PODIUM : POINTS PUIS FLÉCHETTES
            topScores.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                return a.darts - b.darts;
            });

            await ref.set(topScores.slice(0, 3));
            btn.innerText = "✅ ENREGISTRÉ";
            displayTop3();
        } catch (e) { btn.innerText = "ERREUR"; }
    }

    function displayTop3() {
        const listDiv = document.getElementById('top-list');
        if (isGuest) { listDiv.innerHTML = "Mode Invité"; return; }
        db.ref(`users/${pseudo.toUpperCase()}/games/bull_challenge/top`).once('value', (snapshot) => {
            const data = snapshot.val() || [];
            let html = "";
            const scoreArray = Array.isArray(data) ? data : Object.values(data);
            scoreArray.forEach((s, i) => {
                html += `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:${i===scoreArray.length-1?'none':'1px solid #222'};">
                    <span>${i+1}. <b>${s.pts} pts</b> <small style="color:#8b949e; margin-left:5px;">${s.darts} fl.</small></span>
                    <span style="color:#444; font-size:0.6rem;">${s.date}</span>
                </div>`;
            });
            listDiv.innerHTML = html || "Aucun record.";
        });
    }

    updateUI();
</script>
</body>
</html>
