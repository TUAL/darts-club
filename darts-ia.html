<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - IA</title>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        .app-brand { height: 40px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
        .app-title { font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; color: var(--d-color); text-transform: uppercase; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 10px 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
            text-align: center; z-index: 100; border-top: 1px solid #161b22;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; padding: 5px 15px; border: 1px solid #333; border-radius: 20px; }

        #level-screen, #game-screen { 
            flex: 1; display: flex; flex-direction: column; padding: 10px; 
            padding-bottom: 100px; 
            overflow: hidden; 
        }

        .selection-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lvl-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; max-width: 320px; }
        .lvl-btn { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 14px; color: white; display: flex; align-items: center; gap: 15px; text-align: left; }
        .lvl-btn.lvl-1 { border-left: 5px solid #8b949e; }
        .lvl-btn.lvl-2 { border-left: 5px solid var(--d-color); }
        .lvl-btn.lvl-3 { border-left: 5px solid var(--t-color); }
        .lvl-btn.lvl-4 { border-left: 5px solid var(--s-color); }

        .header { height: 12dvh; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
        .score-card { background: var(--card); border-radius: 12px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; }
        .score-card.active { opacity: 1; border-color: var(--accent); border-width: 2px; }
        .score-val { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }
        .avg-val { font-size: 0.65rem; color: var(--accent); font-weight: bold; margin-top: 4px; }

        .ia-history { height: 25px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: var(--d-color); font-weight: bold; }
        .turn-tracking { display: flex; justify-content: center; gap: 8px; height: 38px; flex-shrink: 0; margin-bottom: 6px; }
        .dart-slot { flex: 1; background: #010409; border: 1px solid #30363d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; color: #484f58; }

        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; min-height: 0; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex: 0 0 42px; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; min-height: 0; }
        .special-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex: 0 0 42px; }
        .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 4px; flex: 0 0 55px; }

        button { border: none; border-radius: 8px; font-weight: 700; color: #fff; width: 100%; height: 100%; }
        .btn-mod { background: #21262d; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }

        .num-btn { background: #21262d; font-size: 1.1rem; border-bottom: 2px solid transparent; }
        .grid.mode-s .num-btn { border-bottom-color: var(--s-color); }
        .grid.mode-d .num-btn { border-bottom-color: var(--d-color); }
        .grid.mode-t .num-btn { border-bottom-color: var(--t-color); }

        .btn-valid { background: var(--accent) !important; font-size: 0.9rem; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.5rem; }
        .btn-reset { background: #161b22; color: #f85149; font-size: 0.6rem; }

        .overlay { display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); z-index: 999; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="level-screen">
    <div class="app-brand"><span class="app-logo">🎯</span><span class="app-title">Darts IA</span></div>
    <div class="selection-content">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">🤖</div>
        <h2 style="color: var(--accent); letter-spacing: 2px; margin-bottom: 25px; font-size: 1.2rem;">GEMINI IA</h2>
        <div class="lvl-grid">
            <button class="lvl-btn lvl-1" onclick="startGame(1)"><div><div style="font-weight:900">1. DÉBUTANT</div><div style="font-size:0.7rem; color:#888">AVG : 40-50</div></div></button>
            <button class="lvl-btn lvl-2" onclick="startGame(2)"><div><div style="font-weight:900">2. INTERMÉDIAIRE</div><div style="font-size:0.7rem; color:#888">AVG : 50-65</div></div></button>
            <button class="lvl-btn lvl-3" onclick="startGame(3)"><div><div style="font-weight:900">3. EXPERT</div><div style="font-size:0.7rem; color:#888">AVG : 65-80</div></div></button>
            <button class="lvl-btn lvl-4" onclick="startGame(4)"><div><div style="font-weight:900">4. LÉGENDE</div><div style="font-size:0.7rem; color:#888">AVG : 80+</div></div></button>
        </div>
    </div>
</div>

<div id="game-screen" style="display:none;">
    <div class="app-brand"><span class="app-logo">🎯</span><span class="app-title">Darts IA</span></div>
    <div class="header">
        <div class="score-card active" id="card-p">
            <div style="font-size:0.55rem; font-weight:900">TOI</div>
            <div id="p-score" class="score-val">501</div>
            <div id="p-avg" class="avg-val">AVG: 0.0 | FLE: 0</div>
        </div>
        <div class="score-card" id="card-ia">
            <div style="font-size:0.55rem; font-weight:900">GEMINI (NIV <span id="ia-lvl-txt">1</span>)</div>
            <div id="ia-score" class="score-val" style="color:var(--d-color)">501</div>
            <div id="ia-avg" class="avg-val">AVG: 0.0 | FLE: 0</div>
        </div>
    </div>

    <div class="ia-history" id="ia-history">À TOI DE JOUER</div>

    <div class="turn-tracking">
        <div class="dart-slot" id="d0">-</div>
        <div class="dart-slot" id="d1">-</div>
        <div class="dart-slot" id="d2">-</div>
    </div>

    <div class="grid mode-s" id="gameGrid">
        <div class="mod-row">
            <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
            <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
            <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
        </div>
        <div id="numPad" class="num-grid"></div>
        <div class="special-row">
            <button class="num-btn" onclick="addDart(0)">0</button>
            <button class="num-btn" onclick="addDart(25)">25</button>
            <button class="num-btn" onclick="addDart(50)">BULL</button>
        </div>
        <div class="action-row">
            <button class="btn-reset" onclick=""></button>
            <button class="btn-valid" onclick="confirmTurn()">VALIDER VOLÉE</button>
            <button class="btn-del" onclick="undoLast()">⌫</button>
        </div>
    </div>
</div>

<footer>
    <a href="index.html" class="back-btn">⬅ Menu Principal</a>
</footer>

<div id="end-screen" class="overlay">
    <h1 id="end-title" style="color: var(--accent); font-size: 2.2rem; margin: 0;">FIN</h1>
    <div id="final-stats" style="margin: 15px 0 25px 0; font-size: 1.1rem; line-height: 1.8; text-align: center;"></div>
    <button class="btn-valid" style="height:55px; width:200px; border-radius: 30px; margin-bottom: 20px;" onclick="location.reload()">REJOUER</button>
    <a href="index.html" style="color:#888; text-decoration:none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">RETOUR MENU</a>
</div>

<script>
    let pScore = 501, iaScore = 501, iaLevel = 1;
    let pDarts = 0, pPoints = 0, iaDarts = 0, iaPoints = 0;
    let multiplier = 1, turnDarts = [], isBust = false;

    function startGame(lvl) {
        iaLevel = lvl;
        document.getElementById('ia-lvl-txt').innerText = lvl;
        document.getElementById('level-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        initNumPad();
    }

    function initNumPad() {
        const pad = document.getElementById('numPad');
        pad.innerHTML = "";
        for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
    }

    function setMod(m) {
        multiplier = m;
        document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
        document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
        document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
    }

    function addDart(val) {
        if(turnDarts.length >= 3 || isBust) return;
        let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
        let pts = (val === 50) ? 50 : val * m;
        const slot = document.getElementById(`d${turnDarts.length}`);
        
        if(pScore - pts < 0 || pScore - pts === 1 || (pScore - pts === 0 && m !== 2 && val !== 50)) {
            isBust = true; slot.innerText = "BUST"; slot.style.color = "var(--t-color)";
        } else {
            pScore -= pts;
            turnDarts.push(pts);
            let label = (val === 50) ? "BULL" : (val === 0) ? "0" : (m===3?'T':m===2?'D':'')+val;
            slot.innerText = label;
            slot.style.color = (m===3?"var(--t-color)":m===2?"var(--d-color)":"var(--s-color)");
            document.getElementById('p-score').innerText = pScore;
            if(pScore === 0) confirmTurn(true);
        }
        setMod(1);
    }

    function confirmTurn(victory = false) {
        if(turnDarts.length === 0 && !isBust) return;
        let dartsThisTurn = isBust ? 3 : turnDarts.length;
        pDarts += dartsThisTurn;
        pPoints += isBust ? 0 : turnDarts.reduce((a,b)=>a+b, 0);
        let avg = pDarts > 0 ? ((pPoints / pDarts) * 3).toFixed(1) : "0.0";
        document.getElementById('p-avg').innerText = `AVG: ${avg} | FLE: ${pDarts}`;
        if(victory) showEnd("VICTOIRE !");
        else startIaTurn();
    }

    function startIaTurn() {
        document.getElementById('gameGrid').style.pointerEvents = "none";
        document.getElementById('card-p').classList.remove('active');
        document.getElementById('card-ia').classList.add('active');
        document.getElementById('ia-history').innerText = "IA RÉFLÉCHIT...";
        setTimeout(() => {
            let iaVolley = calcIAPoints();
            iaScore -= iaVolley; iaPoints += iaVolley; iaDarts += 3;
            let avg = ((iaPoints / iaDarts) * 3).toFixed(1);
            document.getElementById('ia-score').innerText = iaScore;
            document.getElementById('ia-avg').innerText = `AVG: ${avg} | FLE: ${iaDarts}`;
            document.getElementById('ia-history').innerText = `IA : ${iaVolley} POINTS`;
            if(iaScore === 0) showEnd("IA GAGNE !");
            else resetTurnUI();
        }, 600);
    }

    function resetTurnUI() {
        turnDarts = []; isBust = false;
        for(let i=0; i<3; i++) {
            const s = document.getElementById(`d${i}`);
            s.innerText = "-"; s.style.color = "#484f58";
        }
        document.getElementById('gameGrid').style.pointerEvents = "auto";
        document.getElementById('card-ia').classList.remove('active');
        document.getElementById('card-p').classList.add('active');
    }

    function calcIAPoints() {
        const targets = [0, 42, 58, 72, 92];
        let base = targets[iaLevel];
        let variation = Math.floor(Math.random() * 40) - 20;
        return Math.min(iaScore, Math.max(0, Math.round(base + variation)));
    }

    function undoLast() {
        if(turnDarts.length === 0 || isBust) return;
        pScore += turnDarts.pop();
        document.getElementById('p-score').innerText = pScore;
        document.getElementById(`d${turnDarts.length}`).innerText = "-";
    }

    function showEnd(title) {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-title').innerText = title;
        let pAvg = ((pPoints / pDarts) * 3).toFixed(1);
        let iaAvg = ((iaPoints / iaDarts) * 3).toFixed(1);
        document.getElementById('final-stats').innerHTML = 
            `TOI: ${pAvg} AVG (${pDarts} FLE)<br>IA: ${iaAvg} AVG (${iaDarts} FLE)`;
    }
</script>
</body>
</html>
