<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darts Club - IA</title>
    <style>
        :root { 
            --bg: #0b0e14; --card: #161b22; --text: #f0f6fc;
            --s-color: #238636; --d-color: #d29922; --t-color: #da3633;
            --accent: #58a6ff;
            --c-moyen: #8b949e; --c-bon: #d29922; --c-tresbon: #da3633; --c-pro: #238636;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100dvh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* BANDEAU LOGO */
        .app-brand { 
            height: 35px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0;
        }
        .app-title { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; color: var(--d-color); text-transform: uppercase; }

        /* FOOTER FIXÉ */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 10px 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
            text-align: center; z-index: 100; border-top: 1px solid #161b22;
        }
        .back-btn { color: #888; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; padding: 5px 15px; border: 1px solid #333; border-radius: 20px; }

        /* STRUCTURES PRINCIPALES */
        #level-screen, #game-screen { 
            flex: 1; display: flex; flex-direction: column; padding: 10px; 
            padding-bottom: 105px; /* Confort de 60px + footer */
            overflow: hidden;
        }

        /* ECRAN SELECTION IA */
        .selection-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ia-header { text-align: center; margin-bottom: 25px; }
        .ia-header h2 { color: var(--accent); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .lvl-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; max-width: 340px; }
        .lvl-btn { 
            background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 14px;
            color: white; text-align: left; display: flex; align-items: center; gap: 15px;
        }
        .lvl-btn.lvl-1 { border-left: 5px solid var(--c-moyen); }
        .lvl-btn.lvl-2 { border-left: 5px solid var(--c-bon); }
        .lvl-btn.lvl-3 { border-left: 5px solid var(--c-tresbon); }
        .lvl-btn.lvl-4 { border-left: 5px solid var(--c-pro); }
        .lvl-name { font-weight: 800; font-size: 1rem; display: block; }
        .lvl-avg { font-size: 0.75rem; color: #8b949e; }

        /* JEU IA */
        #game-screen { display: none; gap: 5px; }
        .header { height: 12dvh; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
        .score-card { 
            background: var(--card); border-radius: 12px; border: 1px solid #30363d;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0.4; transition: 0.3s;
        }
        .score-card.active { opacity: 1; border-color: var(--accent); border-width: 2px; }
        .player-label { font-size: 0.6rem; color: #8b949e; text-transform: uppercase; font-weight: 900; }
        .score-val { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }
        .avg-val { font-size: 0.6rem; color: var(--accent); font-weight: bold; }

        .ia-history { height: 25px; text-align: center; font-size: 0.7rem; color: var(--d-color); font-weight: bold; flex-shrink: 0; }
        .turn-tracking { display: flex; justify-content: center; gap: 8px; height: 35px; flex-shrink: 0; }
        .dart-slot { flex: 1; background: #010409; border: 1px solid #30363d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #484f58; }

        /* GRILLE CLAVIER FLEXIBLE */
        .grid { flex: 1; display: flex; flex-direction: column; gap: 4px; min-height: 0; }
        .mod-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex: 0 0 40px; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; min-height: 0; }
        
        .grid.mode-s .num-btn { border-bottom: 3px solid var(--s-color); }
        .grid.mode-d .num-btn { border-bottom: 3px solid var(--d-color); }
        .grid.mode-t .num-btn { border-bottom: 3px solid var(--t-color); }

        .special-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex: 0 0 40px; }
        .action-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 4px; flex: 0 0 60px; }

        button { border: none; border-radius: 8px; font-weight: 700; color: #fff; cursor: pointer; }
        .btn-mod { background: #21262d; border: 1px solid #30363d; }
        #modS.selected { background: var(--s-color); }
        #modD.selected { background: var(--d-color); }
        #modT.selected { background: var(--t-color); }
        .num-btn { background: #21262d; font-size: 1.1rem; }
        .btn-valid { background: var(--accent) !important; font-size: 0.9rem; text-transform: uppercase; }
        .btn-del { background: #21262d; color: #8b949e; font-size: 1.4rem; }
        .btn-reset { background: #161b22; color: #f85149; font-size: 0.55rem; text-transform: uppercase; }

        .overlay { 
            display:none; position:fixed; inset:0; background: rgba(13,17,23,0.98); 
            z-index:999; flex-direction:column; justify-content:center; align-items:center; padding: 30px;
        }
    </style>
</head>
<body>

<div id="level-screen">
    <div class="app-brand">
        <span class="app-logo">🎯</span>
        <span class="app-title">Darts Club</span>
    </div>
    <div class="selection-content">
        <div class="ia-header">
            <div style="font-size: 2rem; margin-bottom: 10px;">🤖</div>
            <h2>ADVERSAIRE VIRTUEL</h2>
        </div>
        <div class="lvl-grid">
            <button class="lvl-btn lvl-1" onclick="startGame(1)">
                <div class="lvl-info"><span class="lvl-name">1. MOYEN</span><span class="lvl-avg">AVG : 40-50</span></div>
            </button>
            <button class="lvl-btn lvl-2" onclick="startGame(2)">
                <div class="lvl-info"><span class="lvl-name">2. BON</span><span class="lvl-avg">AVG : 50-65</span></div>
            </button>
            <button class="lvl-btn lvl-3" onclick="startGame(3)">
                <div class="lvl-info"><span class="lvl-name">3. EXPERT</span><span class="lvl-avg">AVG : 65-80</span></div>
            </button>
            <button class="lvl-btn lvl-4" onclick="startGame(4)">
                <div class="lvl-info"><span class="lvl-name">4. MAÎTRE</span><span class="lvl-avg">AVG : 80+</span></div>
            </button>
        </div>
    </div>
</div>

<div id="game-screen">
    <div class="app-brand">
        <span class="app-logo">🎯</span>
        <span class="app-title">Darts Club</span>
    </div>
    <div class="header">
        <div class="score-card active" id="card-p">
            <div class="player-label">TOI</div>
            <div id="p-score" class="score-val">501</div>
            <div id="p-avg" class="avg-val">AVG:0.0</div>
        </div>
        <div class="score-card" id="card-ia">
            <div class="player-label">IA (Niv.<span id="ia-lvl-txt">1</span>)</div>
            <div id="ia-score" class="score-val" style="color:var(--d-color)">501</div>
            <div id="ia-avg" class="avg-val">AVG:0.0</div>
        </div>
    </div>

    <div class="ia-history" id="ia-history">À toi de jouer !</div>

    <div class="turn-tracking">
        <div class="dart-slot" id="d0">-</div>
        <div class="dart-slot" id="d1">-</div>
        <div class="dart-slot" id="d2">-</div>
    </div>

    <div class="grid mode-s" id="gameGrid">
        <div class="mod-row">
            <button class="btn-mod selected" id="modS" onclick="setMod(1)">S</button>
            <button class="btn-mod" id="modD" onclick="setMod(2)">D</button>
            <button class="btn-mod" id="modT" onclick="setMod(3)">T</button>
        </div>
        <div id="numPad" class="num-grid"></div>
        <div class="special-row">
            <button class="num-btn" onclick="addDart(0)">0</button>
            <button class="num-btn" onclick="addDart(25)">25</button>
            <button class="num-btn" onclick="addDart(50)">BULL</button>
        </div>
        <div class="action-row">
            <button class="btn-reset" onclick=""></button>
            <button class="btn-valid" onclick="confirmTurn()">VALIDER VOLEE</button>
            <button class="btn-del" onclick="undoLast()">⌫</button>
        </div>
    </div>
</div>

<footer>
    <a href="index.html" class="back-btn">⬅ Menu Principal</a>
</footer>

<div id="end-screen" class="overlay">
    <h1 id="end-title" style="font-size: 2rem; color: var(--accent);">FIN</h1>
    <div id="final-stats" style="margin-bottom: 25px; text-align: center;"></div>
    <button class="btn-valid" style="padding: 15px 40px; border-radius: 30px;" onclick="location.reload()">REJOUER</button>
    <a href="index.html" style="margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem;">RETOUR MENU</a>
</div>

<script>
    let pScore = 501, iaScore = 501, iaLevel = 1;
    let pDarts = 0, pPoints = 0, iaDarts = 0, iaPoints = 0;
    let multiplier = 1, turnDarts = [], isBust = false;

    function startGame(lvl) {
        iaLevel = lvl;
        document.getElementById('ia-lvl-txt').innerText = lvl;
        document.getElementById('level-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        initNumPad();
    }

    function initNumPad() {
        const pad = document.getElementById('numPad');
        pad.innerHTML = "";
        for(let i=1; i<=20; i++) pad.innerHTML += `<button class="num-btn" onclick="addDart(${i})">${i}</button>`;
    }

    function setMod(m) {
        multiplier = m;
        document.querySelectorAll('.btn-mod').forEach(b => b.classList.remove('selected'));
        document.getElementById(['modS','modD','modT'][m-1]).classList.add('selected');
        document.getElementById('gameGrid').className = "grid mode-" + ['s','d','t'][m-1];
    }

    function addDart(val) {
        if(turnDarts.length >= 3 || isBust) return;
        let m = (val === 50 || val === 25 || val === 0) ? 1 : multiplier;
        let pts = (val === 50) ? 50 : val * m;
        const slot = document.getElementById(`d${turnDarts.length}`);
        
        if(pScore - pts < 0 || pScore - pts === 1 || (pScore - pts === 0 && m !== 2 && val !== 50)) {
            isBust = true;
            slot.innerText = "BUST"; slot.style.color = "var(--t-color)";
        } else {
            pScore -= pts;
            turnDarts.push(pts);
            const prefix = (m === 3 ? 'T' : m === 2 ? 'D' : '');
            slot.innerText = (val === 50) ? "BULL" : (val === 0) ? "0" : prefix + val;
            slot.style.color = (m === 3 ? "var(--t-color)" : m === 2 ? "var(--d-color)" : "var(--s-color)");
            document.getElementById('p-score').innerText = pScore;
            if(pScore === 0) confirmTurn(true);
        }
        setMod(1);
    }

    function confirmTurn(victory = false) {
        if(turnDarts.length === 0 && !isBust) return;
        pDarts += 3;
        pPoints += isBust ? 0 : turnDarts.reduce((a,b)=>a+b, 0);
        document.getElementById('p-avg').innerText = `AVG:${(pPoints/(pDarts/3)).toFixed(1)}`;
        if(victory) showEnd("TU AS GAGNÉ !");
        else startIaTurn();
    }

    function startIaTurn() {
        document.getElementById('gameGrid').style.pointerEvents = "none";
        document.getElementById('card-p').classList.remove('active');
        document.getElementById('card-ia').classList.add('active');
        document.getElementById('ia-history').innerText = "L'IA réfléchit...";
        setTimeout(() => {
            let iaVolley = calcIAPoints();
            iaScore -= iaVolley; iaPoints += iaVolley; iaDarts += 3;
            document.getElementById('ia-score').innerText = iaScore;
            document.getElementById('ia-avg').innerText = `AVG:${(iaPoints/(iaDarts/3)).toFixed(1)}`;
            document.getElementById('ia-history').innerText = `IA a fait : ${iaVolley} pts`;
            if(iaScore === 0) showEnd("L'IA A GAGNÉ");
            else resetTurnUI();
        }, 800);
    }

    function resetTurnUI() {
        turnDarts = []; isBust = false;
        for(let i=0; i<3; i++) {
            const s = document.getElementById(`d${i}`);
            s.innerText = "-"; s.style.color = "#484f58";
        }
        document.getElementById('gameGrid').style.pointerEvents = "auto";
        document.getElementById('card-ia').classList.remove('active');
        document.getElementById('card-p').classList.add('active');
    }

    function calcIAPoints() {
        const targets = [0, 42, 58, 75, 92];
        let base = targets[iaLevel];
        let variation = Math.floor(Math.random() * 26) - 13;
        return Math.min(iaScore, Math.max(0, Math.round(base + variation)));
    }

    function undoLast() {
        if(turnDarts.length === 0 || isBust) return;
        pScore += turnDarts.pop();
        document.getElementById('p-score').innerText = pScore;
        document.getElementById(`d${turnDarts.length}`).innerText = "-";
    }

    function showEnd(title) {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-title').innerText = title;
        document.getElementById('final-stats').innerHTML = `TOI: ${(pPoints/(pDarts/3)).toFixed(1)} AVG<br>IA: ${(iaPoints/(iaDarts/3)).toFixed(1)} AVG`;
    }
</script>
</body>
</html>
